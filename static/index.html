<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloseTool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d1117;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d1117}::-webkit-scrollbar-thumb{background:#1e2d3d;border-radius:3px}
    select{appearance:none;-webkit-appearance:none}select option{background:#111827}
    input,textarea,select{font-family:inherit}
    .modal-overlay{position:fixed;inset:0;background:#0009;z-index:200;display:flex;align-items:center;justify-content:center}
    .modal-box{background:#111827;border:1px solid #1e2d3d;border-radius:16px;padding:28px;width:460px;max-height:85vh;overflow-y:auto}
    .form-group{margin-bottom:14px}
    .form-label{font-size:11px;color:#64748b;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
    .form-input{width:100%;background:#0d1117;border:1px solid #1e2d3d;border-radius:8px;color:#e2e8f0;padding:9px 12px;font-size:13px;outline:none;transition:border-color .15s}
    .form-input:focus{border-color:#4f8ef7}
    .form-select{width:100%;background:#0d1117;border:1px solid #1e2d3d;border-radius:8px;color:#e2e8f0;padding:9px 12px;font-size:13px;outline:none}
    .btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn-primary{background:#4f8ef7;color:#fff}
    .btn-success{background:#4fd9a018;border:1px solid #4fd9a040;color:#4fd9a0}
    .btn-danger{background:#f8717118;border:1px solid #f8717140;color:#f87171}
    .btn-ghost{background:#1e2d3d;border:1px solid #334155;color:#94a3b8}
    .tag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;font-weight:600}
    .tag-admin{background:#4f8ef718;color:#4f8ef7;border:1px solid #4f8ef730}
    .tag-user{background:#1e2d3d;color:#64748b;border:1px solid #334155}
    tr:hover td{background:#1a2535 !important}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

async function api(path,opts={}){
  const res=await fetch(path,{headers:{"Content-Type":"application/json"},credentials:"include",...opts});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`HTTP ${res.status}`)}
  return res.json();
}
function fmt(n){if(n==null)return"—";return"$"+parseFloat(n).toLocaleString("en-US",{minimumFractionDigits:2})}
function fmtDate(d){if(!d)return"—";return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}

const SC={complete:{label:"Complete",color:"#4fd9a0",bg:"rgba(79,217,160,.12)"},in_progress:{label:"In Progress",color:"#f7c948",bg:"rgba(247,201,72,.12)"},open:{label:"Open",color:"#94a3b8",bg:"rgba(148,163,184,.1)"}};
const RC={approved:{label:"Approved",color:"#4fd9a0",icon:"✓"},pending:{label:"Pending Review",color:"#94a3b8",icon:"○"},needs_revision:{label:"Needs Revision",color:"#f87171",icon:"!"}};
const XC={reconciled:{label:"Reconciled",color:"#4fd9a0"},needs_attention:{label:"Variance",color:"#f87171"},open:{label:"Open",color:"#94a3b8"}};

function Avatar({user,size=28}){
  if(!user)return null;
  const color=user.color||user.assignee_color||"#64748b";
  const init=user.initials||user.assignee_initials||"?";
  return <span style={{width:size,height:size,borderRadius:"50%",background:color+"22",border:`1.5px solid ${color}55`,color,fontSize:size*.38,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace",flexShrink:0}}>{init}</span>;
}
function Badge({status,type="status"}){
  const cfg=type==="review"?RC[status]:type==="recon"?XC[status]:SC[status];
  if(!cfg)return null;
  return <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,color:cfg.color,background:cfg.bg||cfg.color+"15",border:`1px solid ${cfg.color}30`,letterSpacing:.3,fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>{type==="review"?cfg.icon+" ":""}{cfg.label}</span>;
}
function ProgressBar({pct,color}){
  return <div style={{height:4,borderRadius:2,background:"#1e2d3d",overflow:"hidden",marginTop:6}}><div style={{height:"100%",width:Math.min(pct||0,100)+"%",background:color,borderRadius:2,transition:"width .6s ease"}}/></div>;
}
function Spinner(){return <div style={{color:"#64748b",padding:40,textAlign:"center",fontFamily:"'DM Mono',monospace"}}>Loading…</div>}
function Modal({title,onClose,children}){
  return <div className="modal-overlay" onClick={onClose}><div className="modal-box" onClick={e=>e.stopPropagation()}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
      <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{title}</div>
      <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>×</button>
    </div>
    {children}
  </div></div>;
}

// ── Login Screen ──────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  async function handleLogin(e){
    e.preventDefault();setError("");setLoading(true);
    try{
      const user=await api("/api/auth/login",{method:"POST",body:JSON.stringify({username,password})});
      onLogin(user);
    }catch(err){setError(err.message);}
    setLoading(false);
  }
  return(
    <div style={{minHeight:"100vh",background:"#0d1117",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:380,background:"#111827",border:"1px solid #1e2d3d",borderRadius:20,padding:40}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:24,fontWeight:800,color:"#fff",letterSpacing:-1}}>CloseTool <span style={{fontSize:11,background:"#4f8ef722",color:"#4f8ef7",border:"1px solid #4f8ef740",padding:"2px 8px",borderRadius:6,fontFamily:"'DM Mono',monospace",verticalAlign:"middle"}}>QB</span></div>
          <div style={{fontSize:13,color:"#475569",marginTop:6}}>Month-End Close Management</div>
        </div>
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label className="form-label">Username</label>
            <input className="form-input" value={username} onChange={e=>setUsername(e.target.value)} placeholder="Enter your username" autoFocus/>
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Enter your password"/>
          </div>
          {error&&<div style={{color:"#f87171",fontSize:12,marginBottom:12,padding:"8px 12px",background:"#f8717118",borderRadius:6,border:"1px solid #f8717130"}}>{error}</div>}
          <button type="submit" className="btn btn-primary" style={{width:"100%",padding:"11px",fontSize:14}} disabled={loading}>
            {loading?"Signing in…":"Sign In"}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function CloseApp(){
  const [currentUser,setCurrentUser]=useState(null);
  const [authChecked,setAuthChecked]=useState(false);
  const [tab,setTab]=useState("dashboard");
  const [period,setPeriod]=useState(null);
  const [tasks,setTasks]=useState([]);
  const [recons,setRecons]=useState([]);
  const [dash,setDash]=useState(null);
  const [users,setUsers]=useState([]);
  const [cats,setCats]=useState([]);
  const [selectedTask,setSelectedTask]=useState(null);
  const [filterUser,setFilterUser]=useState(null);
  const [filterCat,setFilterCat]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [loading,setLoading]=useState(true);
  const [bulkSelected,setBulkSelected]=useState(new Set());
  const [calendarMonth,setCalendarMonth]=useState(null);
  const [activityLog,setActivityLog]=useState([]);
  const [activityLoading,setActivityLoading]=useState(false);
  const [templates,setTemplates]=useState([]);
  const [attachRecon,setAttachRecon]=useState(null);
  const [periodsAll,setPeriodsAll]=useState([]);
  const [tbSnapshots,setTbSnapshots]=useState([]);
  const [tbDetail,setTbDetail]=useState(null);
  const [tbLoading,setTbLoading]=useState(false);
  const [tbTaking,setTbTaking]=useState(false);
  const [tbMode,setTbMode]=useState("snapshots");   // snapshots | flux
  const [allSnapshots,setAllSnapshots]=useState([]);
  const [fluxOpts,setFluxOpts]=useState({current:"",prior:"",pct:10,dollar:1000});
  const [fluxData,setFluxData]=useState(null);
  const [fluxLoading,setFluxLoading]=useState(false);
  const [queue,setQueue]=useState([]);
  const [queueStatusFilter,setQueueStatusFilter]=useState("pending");
  const [queueSourceFilter,setQueueSourceFilter]=useState("");
  const [queueSelected,setQueueSelected]=useState(null);
  const [qbStatus,setQbStatus]=useState(null);

  const isAdmin=currentUser?.role==="admin";

  useEffect(()=>{
    api("/api/auth/me").then(u=>{if(u.authenticated)setCurrentUser(u);setAuthChecked(true);}).catch(()=>setAuthChecked(true));
  },[]);

  const loadAll=useCallback(async()=>{
    setLoading(true);
    try{
      const [p,u,c,pa]=await Promise.all([api("/api/periods/active"),api("/api/users"),api("/api/categories"),api("/api/periods").catch(()=>[])]);
      setPeriod(p);setUsers(u);setCats(c);setPeriodsAll(pa);
      if(!calendarMonth&&p?.start_date){setCalendarMonth(new Date(p.start_date+"T00:00:00"));}
      const [t,r,d]=await Promise.all([api(`/api/tasks?period_id=${p.id}`),api(`/api/reconciliations?period_id=${p.id}`),api(`/api/dashboard?period_id=${p.id}`)]);
      setTasks(t);setRecons(r);setDash(d);
    }catch(e){console.error(e);}
    setLoading(false);
  },[calendarMonth]);

  async function loadActivity(){
    if(!period)return;
    setActivityLoading(true);
    try{const a=await api(`/api/activity?period_id=${period.id}&limit=500`);setActivityLog(a);}
    catch(e){console.error(e);}
    setActivityLoading(false);
  }
  async function loadTemplates(){
    try{const t=await api("/api/templates");setTemplates(t);}catch(e){console.error(e);}
  }
  async function loadTbSnapshots(){
    if(!period)return;
    setTbLoading(true);
    try{const s=await api(`/api/periods/${period.id}/tb_snapshots`);setTbSnapshots(s);}
    catch(e){console.error(e);}
    setTbLoading(false);
  }
  async function takeTbSnapshot(){
    if(!period)return;
    if(!confirm(`Take a trial balance snapshot for ${period.label}? This pulls current account balances from QuickBooks and freezes them.`))return;
    setTbTaking(true);
    try{
      const res=await api(`/api/periods/${period.id}/tb_snapshots`,{method:"POST",body:JSON.stringify({})});
      await loadTbSnapshots();
      alert(`Snapshot created with ${res.rows} accounts.`);
    }catch(e){alert(e.message);}
    setTbTaking(false);
  }
  async function openTbSnapshot(sid){
    try{const d=await api(`/api/tb_snapshots/${sid}`);setTbDetail(d);}catch(e){alert(e.message);}
  }
  async function deleteTbSnapshot(sid){
    if(!confirm("Delete this snapshot?"))return;
    try{await api(`/api/tb_snapshots/${sid}`,{method:"DELETE"});await loadTbSnapshots();if(tbDetail?.id===sid)setTbDetail(null);}
    catch(e){alert(e.message);}
  }
  async function loadAllSnapshots(){
    try{const s=await api("/api/tb_snapshots");setAllSnapshots(s);
      if(s.length&&!fluxOpts.current)setFluxOpts(p=>({...p,current:s[0].id,prior:s[1]?.id||""}));
    }catch(e){console.error(e);}
  }
  async function runFlux(){
    if(!fluxOpts.current){alert("Pick a current snapshot");return;}
    setFluxLoading(true);
    try{
      const qs=new URLSearchParams({current_snapshot_id:fluxOpts.current,pct_threshold:fluxOpts.pct,dollar_threshold:fluxOpts.dollar});
      if(fluxOpts.prior)qs.set("prior_snapshot_id",fluxOpts.prior);
      const d=await api(`/api/flux?${qs}`);setFluxData(d);
    }catch(e){alert(e.message);setFluxData(null);}
    setFluxLoading(false);
  }
  async function loadQueue(){
    const qs=new URLSearchParams();
    if(queueStatusFilter)qs.set("status",queueStatusFilter);
    if(queueSourceFilter)qs.set("source",queueSourceFilter);
    try{const rows=await api(`/api/pending_posts?${qs}`);setQueue(rows);}
    catch(e){console.error(e);}
  }
  async function loadQbStatus(){
    try{const s=await api("/api/qb/status");setQbStatus(s);}catch(e){setQbStatus(null);}
  }

  useEffect(()=>{if(currentUser)loadAll();},[currentUser,loadAll]);

  async function patchTask(id,patch){
    try{
      const updated=await api(`/api/tasks/${id}`,{method:"PATCH",body:JSON.stringify(patch)});
      setTasks(prev=>prev.map(t=>t.id===id?{...t,...updated}:t));
      if(selectedTask?.id===id)setSelectedTask(prev=>({...prev,...updated}));
      const d=await api(`/api/dashboard?period_id=${period.id}`);setDash(d);
    }catch(e){alert(e.message);}
  }

  async function patchRecon(id,patch){
    try{const updated=await api(`/api/reconciliations/${id}`,{method:"PATCH",body:JSON.stringify(patch)});setRecons(prev=>prev.map(r=>r.id===id?{...r,...updated}:r));}
    catch(e){alert(e.message);}
  }

  async function syncQB(){
    setSyncing(true);
    try{await api("/api/qb/sync",{method:"POST"});const r=await api(`/api/reconciliations?period_id=${period?.id}`);setRecons(r);}
    catch(e){console.error(e);}
    setSyncing(false);
  }

  async function handleLogout(){
    await api("/api/auth/logout",{method:"POST"}).catch(()=>{});
    setCurrentUser(null);setTab("dashboard");
  }

  const filteredTasks=tasks.filter(t=>(!filterUser||t.assignee_id===filterUser||t.reviewer_id===filterUser)&&(!filterCat||t.category_id===filterCat));
  const groupedTasks=cats.reduce((acc,c)=>{const ct=filteredTasks.filter(t=>t.category_id===c.id);if(ct.length)acc[c.name]={cat:c,tasks:ct};return acc},{});

  const S={
    app:{minHeight:"100vh",background:"#0d1117",color:"#e2e8f0",display:"flex"},
    sidebar:{width:230,background:"#111827",borderRight:"1px solid #1e2d3d",padding:"24px 0",display:"flex",flexDirection:"column",gap:4,flexShrink:0},
    main:{flex:1,overflow:"auto",padding:"28px 32px"},
    card:{background:"#111827",border:"1px solid #1e2d3d",borderRadius:12,padding:"18px 22px"},
    kpiGrid:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24},
    th:{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase",padding:"8px 12px",borderBottom:"1px solid #1e2d3d",textAlign:"left",fontWeight:500},
    td:{padding:"11px 12px",borderBottom:"1px solid #0d1117",fontSize:13.5,verticalAlign:"middle"},
    filterBar:{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"},
    filterBtn:(a)=>({padding:"5px 12px",borderRadius:20,border:`1px solid ${a?"#4f8ef7":"#1e2d3d"}`,background:a?"#4f8ef718":"transparent",color:a?"#4f8ef7":"#64748b",fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}),
    navBtn:(a)=>({padding:"9px 20px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",border:"none",background:a?"#1e2d3d":"transparent",color:a?"#e2e8f0":"#64748b",fontSize:13.5,fontWeight:a?600:400,borderLeft:a?"2px solid #4f8ef7":"2px solid transparent",textAlign:"left",width:"100%",transition:"all .15s"}),
    sel:(color)=>({background:color+"15",color,border:`1px solid ${color}40`,borderRadius:12,padding:"2px 8px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Mono',monospace",appearance:"none"}),
  };

  if(!authChecked)return <div style={{minHeight:"100vh",background:"#0d1117",display:"flex",alignItems:"center",justifyContent:"center",color:"#475569",fontFamily:"'DM Mono',monospace"}}>Loading…</div>;
  if(!currentUser)return <LoginScreen onLogin={setCurrentUser}/>;

  // ── Dashboard ───────────────────────────────────────────────────────────────
  function Dashboard(){
    if(!dash)return <Spinner/>;
    const kpis=[
      {label:"Close Progress",value:dash.close_pct+"%",sub:`${dash.tasks_complete} of ${dash.tasks_total} tasks`,color:"#4f8ef7",pct:dash.close_pct},
      {label:"Approved",value:dash.approval_pct+"%",sub:`${dash.tasks_approved} reviewed & signed`,color:"#4fd9a0",pct:dash.approval_pct},
      {label:"Reconciliations",value:dash.recon_pct+"%",sub:`${dash.recon_done} of ${dash.recon_total} accounts`,color:"#c084fc",pct:dash.recon_pct},
      {label:"Days to Close",value:"8",sub:"Target: 7 business days",color:"#f7c948",pct:80},
    ];
    return(<div>
      <div style={S.kpiGrid}>{kpis.map(k=>(
        <div key={k.label} style={S.card}>
          <div style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase"}}>{k.label}</div>
          <div style={{fontSize:32,fontWeight:800,color:k.color,lineHeight:1.1,margin:"6px 0 4px"}}>{k.value}</div>
          <div style={{fontSize:11.5,color:"#64748b"}}>{k.sub}</div>
          <ProgressBar pct={k.pct} color={k.color}/>
        </div>
      ))}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={S.card}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:14}}>Progress by Team Member</div>
          {dash.by_user.filter(u=>u.tasks_total>0).map(u=>{
            const pct=u.tasks_total?Math.round(u.tasks_complete/u.tasks_total*100):0;
            return(<div key={u.id} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><Avatar user={u} size={24}/><span style={{fontSize:13}}>{u.name}</span></div>
                <span style={{fontSize:12,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{u.tasks_complete}/{u.tasks_total}</span>
              </div>
              <div style={{height:5,background:"#1e2d3d",borderRadius:3}}><div style={{height:"100%",width:pct+"%",background:u.color,borderRadius:3,transition:"width .5s"}}/></div>
            </div>);
          })}
        </div>
        <div style={S.card}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:14}}>Progress by Category</div>
          {dash.by_category.filter(c=>c.tasks_total>0).map(c=>{
            const pct=Math.round(c.tasks_complete/c.tasks_total*100);
            const col=pct===100?"#4fd9a0":pct>50?"#4f8ef7":"#f7c948";
            return(<div key={c.id} style={{marginBottom:11}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13}}>{c.name}</span><span style={{fontSize:12,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{pct}%</span></div>
              <div style={{height:5,background:"#1e2d3d",borderRadius:3}}><div style={{height:"100%",width:pct+"%",background:col,borderRadius:3}}/></div>
            </div>);
          })}
        </div>
      </div>
      <div style={{...S.card,marginTop:16}}>
        <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:12}}>Needs Attention</div>
        {dash.attention.length===0&&<div style={{fontSize:13,color:"#475569"}}>All clear! 🎉</div>}
        {dash.attention.map(t=>(
          <div key={t.id} onClick={()=>{const full=tasks.find(x=>x.id===t.id);if(full){setSelectedTask(full);setTab("checklist");}}}
            style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid #1a2535",cursor:"pointer"}}>
            <span style={{color:"#f87171",fontSize:12}}>⚠</span>
            <span style={{fontSize:13,flex:1}}>{t.name}</span>
            <span style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{t.category_name}</span>
            <Badge status={t.review_status} type="review"/>
          </div>
        ))}
      </div>
    </div>);
  }

  // ── Checklist ───────────────────────────────────────────────────────────────
  function Checklist(){
    if(loading)return <Spinner/>;
    const canEdit=(t)=>isAdmin||t.assignee_id===currentUser.id||t.reviewer_id===currentUser.id;
    const selectedArr=Array.from(bulkSelected);
    function toggleOne(id){const s=new Set(bulkSelected);s.has(id)?s.delete(id):s.add(id);setBulkSelected(s);}
    function toggleGroup(ids,allSelected){const s=new Set(bulkSelected);if(allSelected)ids.forEach(id=>s.delete(id));else ids.forEach(id=>s.add(id));setBulkSelected(s);}
    async function bulkPatch(patch){
      if(selectedArr.length===0)return;
      try{
        await api("/api/tasks/bulk",{method:"POST",body:JSON.stringify({ids:selectedArr,patch})});
        setBulkSelected(new Set());await loadAll();
      }catch(e){alert(e.message);}
    }
    return(<div>
      <div style={S.filterBar}>
        <button style={S.filterBtn(!filterUser&&!filterCat)} onClick={()=>{setFilterUser(null);setFilterCat(null);}}>All</button>
        {users.map(u=><button key={u.id} style={S.filterBtn(filterUser===u.id)} onClick={()=>setFilterUser(filterUser===u.id?null:u.id)}>{u.initials}</button>)}
        <span style={{width:1,background:"#1e2d3d",margin:"0 4px",height:20,display:"inline-block"}}/>
        {cats.map(c=><button key={c.id} style={S.filterBtn(filterCat===c.id)} onClick={()=>setFilterCat(filterCat===c.id?null:c.id)}>{c.name}</button>)}
      </div>
      {selectedArr.length>0&&
        <div style={{...S.card,marginBottom:14,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",background:"#1a2535",borderColor:"#4f8ef740"}}>
          <span style={{fontSize:12,color:"#4f8ef7",fontFamily:"'DM Mono',monospace",fontWeight:700}}>{selectedArr.length} selected</span>
          <span style={{fontSize:11,color:"#64748b"}}>Set status:</span>
          {["open","in_progress","complete"].map(s=>
            <button key={s} className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>bulkPatch({status:s})}>{SC[s].label}</button>
          )}
          {isAdmin&&<>
            <span style={{fontSize:11,color:"#64748b",marginLeft:6}}>Assign to:</span>
            <select className="form-select" style={{width:140,padding:"5px 8px",fontSize:12}} defaultValue="" onChange={e=>{if(e.target.value){bulkPatch({assignee_id:parseInt(e.target.value)});e.target.value="";}}}>
              <option value="">— pick —</option>
              {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
            </select>
            <span style={{fontSize:11,color:"#64748b"}}>Reviewer:</span>
            <select className="form-select" style={{width:140,padding:"5px 8px",fontSize:12}} defaultValue="" onChange={e=>{if(e.target.value){bulkPatch({reviewer_id:parseInt(e.target.value)});e.target.value="";}}}>
              <option value="">— pick —</option>
              {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
            </select>
          </>}
          <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px",marginLeft:"auto"}} onClick={()=>setBulkSelected(new Set())}>Clear</button>
        </div>
      }
      {Object.entries(groupedTasks).map(([catName,{tasks:ct}])=>{
        const allIds=ct.map(t=>t.id);
        const allSelected=allIds.length>0&&allIds.every(id=>bulkSelected.has(id));
        const someSelected=allIds.some(id=>bulkSelected.has(id));
        return(<div key={catName} style={{...S.card,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:700,color:"#4f8ef7",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase"}}>{catName}</span>
            <span style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{ct.filter(t=>t.status==="complete").length}/{ct.length} complete</span>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>
              <th style={{...S.th,width:30}}>
                <input type="checkbox" checked={allSelected} ref={el=>{if(el)el.indeterminate=someSelected&&!allSelected;}} onChange={()=>toggleGroup(allIds,allSelected)}/>
              </th>
              {["Task","Assignee","Due","Status","Reviewer","Review"].map(h=><th key={h} style={S.th}>{h}</th>)}
            </tr></thead>
            <tbody>{ct.map(t=>(
              <tr key={t.id} style={{cursor:"pointer",background:bulkSelected.has(t.id)?"#1a2535":undefined}} onClick={()=>setSelectedTask(t)}>
                <td style={S.td} onClick={e=>e.stopPropagation()}>
                  <input type="checkbox" checked={bulkSelected.has(t.id)} onChange={()=>toggleOne(t.id)}/>
                </td>
                <td style={{...S.td,fontWeight:500}}>{t.notes&&<span style={{color:"#f7c948",marginRight:6,fontSize:11}}>●</span>}{t.name}</td>
                <td style={S.td}><Avatar user={{initials:t.assignee_initials,color:t.assignee_color}}/></td>
                <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{fmtDate(t.due_date)}</td>
                <td style={S.td}>
                  {canEdit(t)
                    ?<select value={t.status} style={S.sel(SC[t.status]?.color||"#94a3b8")} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();patchTask(t.id,{status:e.target.value});}}>
                      <option value="open">Open</option><option value="in_progress">In Progress</option><option value="complete">Complete</option>
                    </select>
                    :<Badge status={t.status}/>}
                </td>
                <td style={S.td}><Avatar user={{initials:t.reviewer_initials,color:"#64748b"}}/></td>
                <td style={S.td}>
                  {(isAdmin||t.reviewer_id===currentUser.id)
                    ?<select value={t.review_status} style={S.sel(RC[t.review_status]?.color||"#94a3b8")} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();patchTask(t.id,{review_status:e.target.value});}}>
                      <option value="pending">Pending Review</option><option value="approved">Approved</option><option value="needs_revision">Needs Revision</option>
                    </select>
                    :<Badge status={t.review_status} type="review"/>}
                </td>
              </tr>
            ))}</tbody>
          </table>
        </div>);
      })}
    </div>);
  }

  // ── Reconciliations ─────────────────────────────────────────────────────────
  function Reconciliations(){
    if(loading)return <Spinner/>;
    return(<div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Account Reconciliations</div>
          <div style={{fontSize:11.5,color:"#64748b",marginTop:2}}>Synced from QuickBooks Online</div>
        </div>
        {isAdmin&&<button onClick={syncQB} disabled={syncing} style={{padding:"6px 14px",background:"#4f8ef718",border:"1px solid #4f8ef740",color:syncing?"#64748b":"#4f8ef7",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{syncing?"Syncing…":"↻ Sync QB"}</button>}
      </div>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>{["Account","QB Balance","Expected","Variance","Assignee","Status","Updated","Files"].map((h,i)=><th key={h} style={{...S.th,textAlign:i>=1&&i<=3?"right":"left"}}>{h}</th>)}</tr></thead>
        <tbody>{recons.map(r=>{
          const variance=r.expected_balance!=null?r.qb_balance-r.expected_balance:null;
          const vc=variance===0?"#4fd9a0":variance!=null?"#f87171":"#475569";
          return(<tr key={r.id}>
            <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12.5}}>{r.account_number} – {r.account_name}</td>
            <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5}}>{fmt(r.qb_balance)}</td>
            <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5}}>
              <input type="text" defaultValue={r.expected_balance!=null?r.expected_balance:""} placeholder="—"
                onBlur={e=>{const v=parseFloat(e.target.value.replace(/[$,]/g,""));if(!isNaN(v))patchRecon(r.id,{expected_balance:v});}}
                style={{background:"transparent",border:"none",color:"#e2e8f0",fontFamily:"'DM Mono',monospace",fontSize:12.5,textAlign:"right",width:110,outline:"none",borderBottom:"1px dashed #1e2d3d"}}/>
            </td>
            <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5,color:vc,fontWeight:variance!==0&&variance!=null?700:400}}>{variance!=null?(variance===0?"—":fmt(Math.abs(variance))):"—"}</td>
            <td style={S.td}><Avatar user={{initials:r.assignee_initials,color:r.assignee_color}}/></td>
            <td style={S.td}>
              <select value={r.status} style={S.sel(XC[r.status]?.color||"#94a3b8")} onChange={e=>patchRecon(r.id,{status:e.target.value})}>
                <option value="open">Open</option><option value="needs_attention">Variance</option><option value="reconciled">Reconciled</option>
              </select>
            </td>
            <td style={{...S.td,fontSize:12,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{r.last_updated_at?new Date(r.last_updated_at).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"—"}</td>
            <td style={S.td}>
              <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setAttachRecon(r)} title="Supporting documents">📎</button>
            </td>
          </tr>);
        })}</tbody>
      </table>
    </div>);
  }

  // ── Task Modal ──────────────────────────────────────────────────────────────
  function TaskModal(){
    const [notes,setNotes]=useState(selectedTask?.notes||"");
    const [editMode,setEditMode]=useState(false);
    const [editData,setEditData]=useState({});
    const [modalActivity,setModalActivity]=useState([]);
    const [actLoading,setActLoading]=useState(false);
    useEffect(()=>{
      setNotes(selectedTask?.notes||"");setEditMode(false);
      if(!selectedTask?.id)return;
      setActLoading(true);
      api(`/api/tasks/${selectedTask.id}/activity`).then(setModalActivity).catch(()=>{}).finally(()=>setActLoading(false));
    },[selectedTask?.id]);
    if(!selectedTask)return null;
    const t=selectedTask;
    const assignee=users.find(u=>u.id===t.assignee_id);
    const reviewer=users.find(u=>u.id===t.reviewer_id);
    const canEdit=isAdmin||t.assignee_id===currentUser.id||t.reviewer_id===currentUser.id;

    async function saveEdit(){
      await patchTask(t.id,{...editData,notes});
      setEditMode(false);setEditData({});
    }

    return(<div style={{position:"fixed",inset:0,background:"#0008",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setSelectedTask(null)}>
      <div style={{background:"#111827",border:"1px solid #1e2d3d",borderRadius:16,width:520,padding:28,maxHeight:"80vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
          <div>
            <div style={{fontSize:11,color:"#4f8ef7",fontFamily:"'DM Mono',monospace",marginBottom:4}}>{t.category_name}</div>
            {editMode&&isAdmin
              ?<input className="form-input" defaultValue={t.name} onChange={e=>setEditData(p=>({...p,name:e.target.value}))} style={{fontSize:15,fontWeight:700,width:"100%"}}/>
              :<div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{t.name}</div>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
            {isAdmin&&!editMode&&<button onClick={()=>setEditMode(true)} className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}}>Edit</button>}
            <button onClick={()=>setSelectedTask(null)} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>×</button>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
            <div className="form-label">Assigned To</div>
            {editMode&&isAdmin
              ?<select className="form-select" defaultValue={t.assignee_id} onChange={e=>setEditData(p=>({...p,assignee_id:parseInt(e.target.value)}))}>
                {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
              :<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><Avatar user={assignee}/>{assignee?.name}</div>}
          </div>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
            <div className="form-label">Reviewer</div>
            {editMode&&isAdmin
              ?<select className="form-select" defaultValue={t.reviewer_id} onChange={e=>setEditData(p=>({...p,reviewer_id:parseInt(e.target.value)}))}>
                {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
              :<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><Avatar user={reviewer}/>{reviewer?.name}</div>}
          </div>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
            <div className="form-label">Due Date</div>
            {editMode&&isAdmin
              ?<input type="date" className="form-input" defaultValue={t.due_date||""} onChange={e=>setEditData(p=>({...p,due_date:e.target.value}))}/>
              :<span style={{fontFamily:"'DM Mono',monospace",fontSize:13}}>{fmtDate(t.due_date)}</span>}
          </div>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
            <div className="form-label">Category</div>
            {editMode&&isAdmin
              ?<select className="form-select" defaultValue={t.category_id} onChange={e=>setEditData(p=>({...p,category_id:parseInt(e.target.value)}))}>
                {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              :<span style={{fontSize:13}}>{t.category_name}</span>}
          </div>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}><div className="form-label">Status</div><Badge status={t.status}/></div>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}><div className="form-label">Review</div><Badge status={t.review_status} type="review"/></div>
        </div>

        <div style={{marginBottom:14}}>
          <div className="form-label">Notes</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Add notes or comments…" disabled={!canEdit}
            style={{width:"100%",background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:8,color:"#e2e8f0",padding:"10px 12px",fontSize:13,resize:"vertical",minHeight:80,fontFamily:"'DM Sans',sans-serif",opacity:canEdit?1:.6}}/>
        </div>

        <div style={{marginBottom:14}}>
          <div className="form-label">Activity</div>
          <div style={{background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:8,maxHeight:180,overflow:"auto",padding:"6px 10px"}}>
            {actLoading?<div style={{color:"#64748b",fontSize:12,padding:"8px 0"}}>Loading…</div>:
             modalActivity.length===0?<div style={{color:"#475569",fontSize:12,padding:"8px 0"}}>No activity yet.</div>:
             modalActivity.map(a=>(
               <div key={a.id} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:"1px solid #1a2535",fontSize:12}}>
                 <Avatar user={{initials:a.user_initials,color:a.user_color}} size={20}/>
                 <div style={{flex:1,minWidth:0}}>
                   <div style={{color:"#cbd5e1"}}><span style={{fontWeight:600}}>{a.user_name}</span> <span style={{color:"#64748b"}}>{a.action==="note"?"added a note":a.action.startsWith("bulk_")?"bulk-updated "+a.action.slice(5).replace(/_/g," "):a.action.replace(/_/g," ")}</span>{a.action!=="note"&&a.old_value!==null&&<span style={{color:"#64748b",fontFamily:"'DM Mono',monospace",fontSize:11}}>: {a.old_value} → <span style={{color:"#4fd9a0"}}>{a.new_value}</span></span>}</div>
                   {a.action==="note"&&<div style={{color:"#cbd5e1",fontStyle:"italic",fontSize:11.5,marginTop:2,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>"{a.new_value}"</div>}
                   <div style={{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",marginTop:2}}>{new Date(a.created_at+"Z").toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</div>
                 </div>
               </div>
             ))}
          </div>
        </div>

        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          {editMode&&isAdmin&&<><button onClick={()=>{setEditMode(false);setEditData({});}} className="btn btn-ghost">Cancel</button><button onClick={saveEdit} className="btn btn-primary">Save Changes</button></>}
          {!editMode&&canEdit&&<>
            <button onClick={()=>patchTask(t.id,{notes}).then(()=>setSelectedTask(null))} className="btn btn-ghost">Save Note</button>
            <button onClick={()=>patchTask(t.id,{status:"complete",notes}).then(()=>setSelectedTask(null))} className="btn btn-success">Mark Complete</button>
            {(isAdmin||t.reviewer_id===currentUser.id)&&<button onClick={()=>patchTask(t.id,{review_status:"approved",notes}).then(()=>setSelectedTask(null))} className="btn btn-primary">Approve ✓</button>}
          </>}
        </div>
      </div>
    </div>);
  }

  // ── Settings (Admin Only) ───────────────────────────────────────────────────
  function Settings(){
    const [settingsTab,setSettingsTab]=useState("users");
    const [showAddUser,setShowAddUser]=useState(false);
    const [showAddCat,setShowAddCat]=useState(false);
    const [showAddTask,setShowAddTask]=useState(false);
    const [editUser,setEditUser]=useState(null);
    const [editCat,setEditCat]=useState(null);

    // Add User Form
    const [newUser,setNewUser]=useState({name:"",initials:"",username:"",email:"",role:"preparer",color:"#4f8ef7",password:""});
    async function addUser(){
      try{await api("/api/users",{method:"POST",body:JSON.stringify(newUser)});await loadAll();setShowAddUser(false);setNewUser({name:"",initials:"",username:"",email:"",role:"preparer",color:"#4f8ef7",password:""});}
      catch(e){alert(e.message);}
    }
    async function deleteUser(id){
      if(!confirm("Delete this user?"))return;
      try{await api(`/api/users/${id}`,{method:"DELETE"});await loadAll();}catch(e){alert(e.message);}
    }
    async function saveEditUser(){
      try{await api(`/api/users/${editUser.id}`,{method:"PATCH",body:JSON.stringify(editUser)});await loadAll();setEditUser(null);}
      catch(e){alert(e.message);}
    }

    // Add Category Form
    const [newCat,setNewCat]=useState({name:"",sort_order:99});
    async function addCat(){
      try{await api("/api/categories",{method:"POST",body:JSON.stringify(newCat)});await loadAll();setShowAddCat(false);setNewCat({name:"",sort_order:99});}
      catch(e){alert(e.message);}
    }
    async function deleteCat(id){
      if(!confirm("Delete this category?"))return;
      try{await api(`/api/categories/${id}`,{method:"DELETE"});await loadAll();}catch(e){alert(e.message);}
    }
    async function saveEditCat(){
      try{await api(`/api/categories/${editCat.id}`,{method:"PATCH",body:JSON.stringify(editCat)});await loadAll();setEditCat(null);}
      catch(e){alert(e.message);}
    }

    // Add Task Form
    const [newTask,setNewTask]=useState({name:"",category_id:"",assignee_id:"",reviewer_id:"",due_date:"",notes:""});
    async function addTask(){
      if(!newTask.name||!newTask.category_id||!newTask.assignee_id||!newTask.reviewer_id){alert("Name, category, assignee, and reviewer are required.");return;}
      try{
        await api("/api/tasks",{method:"POST",body:JSON.stringify({...newTask,period_id:period.id,category_id:parseInt(newTask.category_id),assignee_id:parseInt(newTask.assignee_id),reviewer_id:parseInt(newTask.reviewer_id)})});
        await loadAll();setShowAddTask(false);setNewTask({name:"",category_id:"",assignee_id:"",reviewer_id:"",due_date:"",notes:""});
      }catch(e){alert(e.message);}
    }
    async function deleteTask(id){
      if(!confirm("Delete this task?"))return;
      try{await api(`/api/tasks/${id}`,{method:"DELETE"});await loadAll();}catch(e){alert(e.message);}
    }

    // Templates state
    const [tmplDetail,setTmplDetail]=useState(null);
    const [showAddTmpl,setShowAddTmpl]=useState(false);
    const [newTmpl,setNewTmpl]=useState({name:"",description:""});
    const [newItem,setNewItem]=useState({name:"",category_id:"",default_assignee_id:"",default_reviewer_id:"",days_offset:0});
    const [showInstantiate,setShowInstantiate]=useState(false);
    const [instOpts,setInstOpts]=useState({period_id:"",default_assignee_id:"",default_reviewer_id:""});
    const [showSaveAsTmpl,setShowSaveAsTmpl]=useState(false);
    const [saveTmplName,setSaveTmplName]=useState("");
    const [showRollFwd,setShowRollFwd]=useState(false);
    const [rollOpts,setRollOpts]=useState({source_period_id:"",target_period_id:"",shift_days:30});

    async function createTmpl(){
      if(!newTmpl.name.trim()){alert("Name required");return;}
      try{await api("/api/templates",{method:"POST",body:JSON.stringify(newTmpl)});await loadTemplates();setShowAddTmpl(false);setNewTmpl({name:"",description:""});}
      catch(e){alert(e.message);}
    }
    async function deleteTmpl(id){
      if(!confirm("Delete this template and all its items?"))return;
      try{await api(`/api/templates/${id}`,{method:"DELETE"});await loadTemplates();if(tmplDetail?.id===id)setTmplDetail(null);}
      catch(e){alert(e.message);}
    }
    async function openTmpl(id){
      try{const d=await api(`/api/templates/${id}`);setTmplDetail(d);}catch(e){alert(e.message);}
    }
    async function addItem(){
      if(!newItem.name.trim()||!newItem.category_id){alert("Name and category required");return;}
      try{
        await api(`/api/templates/${tmplDetail.id}/items`,{method:"POST",body:JSON.stringify({
          name:newItem.name,category_id:parseInt(newItem.category_id),
          default_assignee_id:newItem.default_assignee_id?parseInt(newItem.default_assignee_id):null,
          default_reviewer_id:newItem.default_reviewer_id?parseInt(newItem.default_reviewer_id):null,
          days_offset:parseInt(newItem.days_offset||0),
        })});
        await openTmpl(tmplDetail.id);
        setNewItem({name:"",category_id:"",default_assignee_id:"",default_reviewer_id:"",days_offset:0});
      }catch(e){alert(e.message);}
    }
    async function delItem(iid){
      try{await api(`/api/templates/${tmplDetail.id}/items/${iid}`,{method:"DELETE"});await openTmpl(tmplDetail.id);}
      catch(e){alert(e.message);}
    }
    async function doInstantiate(){
      if(!instOpts.period_id){alert("Pick a target period");return;}
      try{
        const res=await api(`/api/templates/${tmplDetail.id}/instantiate`,{method:"POST",body:JSON.stringify({
          period_id:parseInt(instOpts.period_id),
          default_assignee_id:instOpts.default_assignee_id?parseInt(instOpts.default_assignee_id):null,
          default_reviewer_id:instOpts.default_reviewer_id?parseInt(instOpts.default_reviewer_id):null,
        })});
        alert(`Created ${res.created} tasks${res.skipped?` (${res.skipped} skipped — missing assignee/reviewer/category)`:""}`);
        setShowInstantiate(false);await loadAll();
      }catch(e){alert(e.message);}
    }
    async function doSaveAsTmpl(){
      if(!saveTmplName.trim()){alert("Template name required");return;}
      try{
        const res=await api("/api/templates/from_period",{method:"POST",body:JSON.stringify({period_id:period.id,name:saveTmplName})});
        alert(`Saved template with ${res.items} items`);
        setShowSaveAsTmpl(false);setSaveTmplName("");await loadTemplates();
      }catch(e){alert(e.message);}
    }
    async function doRollFwd(){
      if(!rollOpts.source_period_id||!rollOpts.target_period_id){alert("Pick source and target periods");return;}
      try{
        const res=await api("/api/periods/rollforward",{method:"POST",body:JSON.stringify({
          source_period_id:parseInt(rollOpts.source_period_id),
          target_period_id:parseInt(rollOpts.target_period_id),
          shift_days:parseInt(rollOpts.shift_days||30),
        })});
        alert(`Rolled forward ${res.created} tasks`);
        setShowRollFwd(false);await loadAll();
      }catch(e){alert(e.message);}
    }

    const stabs=["users","categories","tasks","templates","integrations"];
    return(<div>
      <div style={{display:"flex",gap:0,marginBottom:24,background:"#111827",border:"1px solid #1e2d3d",borderRadius:10,padding:4,width:"fit-content"}}>
        {stabs.map(t=><button key={t} onClick={()=>setSettingsTab(t)} style={{padding:"7px 18px",borderRadius:7,border:"none",background:settingsTab===t?"#1e2d3d":"transparent",color:settingsTab===t?"#e2e8f0":"#64748b",fontSize:13,cursor:"pointer",fontWeight:settingsTab===t?600:400,textTransform:"capitalize"}}>{t}</button>)}
      </div>

      {/* USERS */}
      {settingsTab==="users"&&<div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Team Members</div>
          <button className="btn btn-primary" style={{fontSize:12,padding:"6px 14px"}} onClick={()=>setShowAddUser(true)}>+ Add User</button>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Name","Username","Role","Color","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{users.map(u=>(
            <tr key={u.id}>
              <td style={S.td}><div style={{display:"flex",alignItems:"center",gap:8}}><Avatar user={u} size={26}/><span style={{fontWeight:500}}>{u.name}</span></div></td>
              <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{u.username}</td>
              <td style={S.td}><span className={`tag ${u.role==="admin"?"tag-admin":"tag-user"}`}>{u.role}</span></td>
              <td style={S.td}><div style={{width:22,height:22,borderRadius:6,background:u.color}}/></td>
              <td style={S.td}><div style={{display:"flex",gap:6}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setEditUser({...u})}>Edit</button>
                {u.id!==currentUser.id&&<button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteUser(u.id)}>Delete</button>}
              </div></td>
            </tr>
          ))}</tbody>
        </table>
      </div>}

      {/* CATEGORIES */}
      {settingsTab==="categories"&&<div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Categories</div>
          <button className="btn btn-primary" style={{fontSize:12,padding:"6px 14px"}} onClick={()=>setShowAddCat(true)}>+ Add Category</button>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Category","Sort Order","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{cats.map(c=>(
            <tr key={c.id}>
              <td style={{...S.td,fontWeight:500}}>{c.name}</td>
              <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{c.sort_order}</td>
              <td style={S.td}><div style={{display:"flex",gap:6}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setEditCat({...c})}>Edit</button>
                <button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteCat(c.id)}>Delete</button>
              </div></td>
            </tr>
          ))}</tbody>
        </table>
      </div>}

      {/* TASKS */}
      {settingsTab==="tasks"&&<div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>All Tasks — {period?.label}</div>
          <div style={{display:"flex",gap:6}}>
            <button className="btn btn-ghost" style={{fontSize:12,padding:"6px 12px"}} onClick={()=>setShowSaveAsTmpl(true)}>⇣ Save as Template</button>
            <button className="btn btn-ghost" style={{fontSize:12,padding:"6px 12px"}} onClick={()=>{setRollOpts({source_period_id:period?.id||"",target_period_id:"",shift_days:30});setShowRollFwd(true);}}>⇆ Roll Forward</button>
            <button className="btn btn-primary" style={{fontSize:12,padding:"6px 14px"}} onClick={()=>setShowAddTask(true)}>+ Add Task</button>
          </div>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Task","Category","Assignee","Due","Status","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{tasks.map(t=>(
            <tr key={t.id}>
              <td style={{...S.td,fontWeight:500,maxWidth:260}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div></td>
              <td style={{...S.td,fontSize:12,color:"#94a3b8"}}>{t.category_name}</td>
              <td style={S.td}><Avatar user={{initials:t.assignee_initials,color:t.assignee_color}} size={24}/></td>
              <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{fmtDate(t.due_date)}</td>
              <td style={S.td}><Badge status={t.status}/></td>
              <td style={S.td}><div style={{display:"flex",gap:6}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setSelectedTask(t)}>Edit</button>
                <button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteTask(t.id)}>Delete</button>
              </div></td>
            </tr>
          ))}</tbody>
        </table>
      </div>}

      {/* Modals */}
      {showAddUser&&<Modal title="Add Team Member" onClose={()=>setShowAddUser(false)}>
        {[["Full Name","name","text"],["Initials (2-3 chars)","initials","text"],["Username","username","text"],["Email","email","email"],["Password","password","password"]].map(([label,key,type])=>(
          <div key={key} className="form-group"><label className="form-label">{label}</label><input type={type} className="form-input" value={newUser[key]} onChange={e=>setNewUser(p=>({...p,[key]:e.target.value}))}/></div>
        ))}
        <div className="form-group"><label className="form-label">Role</label>
          <select className="form-select" value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value}))}>
            <option value="preparer">User (Preparer)</option><option value="reviewer">Reviewer</option><option value="admin">Admin</option>
          </select>
        </div>
        <div className="form-group"><label className="form-label">Color</label><input type="color" value={newUser.color} onChange={e=>setNewUser(p=>({...p,color:e.target.value}))} style={{width:"100%",height:36,border:"1px solid #1e2d3d",borderRadius:8,background:"#0d1117",cursor:"pointer"}}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowAddUser(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={addUser}>Add User</button>
        </div>
      </Modal>}

      {editUser&&<Modal title="Edit Team Member" onClose={()=>setEditUser(null)}>
        {[["Full Name","name","text"],["Initials","initials","text"],["Username","username","text"],["Email","email","email"],["New Password (leave blank to keep)","password","password"]].map(([label,key,type])=>(
          <div key={key} className="form-group"><label className="form-label">{label}</label><input type={type} className="form-input" value={editUser[key]||""} onChange={e=>setEditUser(p=>({...p,[key]:e.target.value}))}/></div>
        ))}
        <div className="form-group"><label className="form-label">Role</label>
          <select className="form-select" value={editUser.role} onChange={e=>setEditUser(p=>({...p,role:e.target.value}))}>
            <option value="preparer">User (Preparer)</option><option value="reviewer">Reviewer</option><option value="admin">Admin</option>
          </select>
        </div>
        <div className="form-group"><label className="form-label">Color</label><input type="color" value={editUser.color} onChange={e=>setEditUser(p=>({...p,color:e.target.value}))} style={{width:"100%",height:36,border:"1px solid #1e2d3d",borderRadius:8,background:"#0d1117",cursor:"pointer"}}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setEditUser(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={saveEditUser}>Save Changes</button>
        </div>
      </Modal>}

      {showAddCat&&<Modal title="Add Category" onClose={()=>setShowAddCat(false)}>
        <div className="form-group"><label className="form-label">Category Name</label><input className="form-input" value={newCat.name} onChange={e=>setNewCat(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Sort Order</label><input type="number" className="form-input" value={newCat.sort_order} onChange={e=>setNewCat(p=>({...p,sort_order:parseInt(e.target.value)}))}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowAddCat(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={addCat}>Add Category</button>
        </div>
      </Modal>}

      {editCat&&<Modal title="Edit Category" onClose={()=>setEditCat(null)}>
        <div className="form-group"><label className="form-label">Category Name</label><input className="form-input" value={editCat.name} onChange={e=>setEditCat(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Sort Order</label><input type="number" className="form-input" value={editCat.sort_order} onChange={e=>setEditCat(p=>({...p,sort_order:parseInt(e.target.value)}))}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setEditCat(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={saveEditCat}>Save Changes</button>
        </div>
      </Modal>}

      {/* TEMPLATES */}
      {settingsTab==="templates"&&<div>
        {!tmplDetail&&<div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Checklist Templates</div>
              <div style={{fontSize:11.5,color:"#64748b",marginTop:2}}>Save reusable task lists and spin them up into new periods in one click.</div>
            </div>
            <button className="btn btn-primary" style={{fontSize:12,padding:"6px 14px"}} onClick={()=>setShowAddTmpl(true)}>+ New Template</button>
          </div>
          {templates.length===0?<div style={{color:"#475569",fontSize:13,padding:"20px 0"}}>No templates yet. Create one, or use "Save as Template" from the Tasks tab.</div>:
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["Template","Items","Created","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>{templates.map(t=>(
              <tr key={t.id}>
                <td style={{...S.td,fontWeight:500}}>{t.name}<div style={{fontSize:11,color:"#64748b",marginTop:2}}>{t.description}</div></td>
                <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{t.item_count}</td>
                <td style={{...S.td,fontSize:12,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{new Date(t.created_at+"Z").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</td>
                <td style={S.td}><div style={{display:"flex",gap:6}}>
                  <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openTmpl(t.id)}>Open</button>
                  <button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteTmpl(t.id)}>Delete</button>
                </div></td>
              </tr>
            ))}</tbody>
          </table>}
        </div>}
        {tmplDetail&&<div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,alignItems:"center"}}>
            <div>
              <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px",marginBottom:6}} onClick={()=>setTmplDetail(null)}>‹ Back</button>
              <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>{tmplDetail.name}</div>
              <div style={{fontSize:11.5,color:"#64748b",marginTop:2}}>{tmplDetail.description||"No description"}</div>
            </div>
            <button className="btn btn-primary" style={{fontSize:12,padding:"6px 14px"}} onClick={()=>{setInstOpts({period_id:period?.id||"",default_assignee_id:"",default_reviewer_id:""});setShowInstantiate(true);}}>↪ Instantiate into Period</button>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",marginBottom:14}}>
            <thead><tr>{["Task","Category","Assignee","Reviewer","Day Offset",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>{(tmplDetail.items||[]).map(it=>(
              <tr key={it.id}>
                <td style={{...S.td,fontWeight:500}}>{it.name}</td>
                <td style={{...S.td,fontSize:12,color:"#94a3b8"}}>{it.category_name||"—"}</td>
                <td style={S.td}>{it.assignee_initials?<Avatar user={{initials:it.assignee_initials,color:it.assignee_color}} size={22}/>:<span style={{fontSize:11,color:"#64748b"}}>any</span>}</td>
                <td style={S.td}>{it.reviewer_initials?<Avatar user={{initials:it.reviewer_initials,color:"#64748b"}} size={22}/>:<span style={{fontSize:11,color:"#64748b"}}>any</span>}</td>
                <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>+{it.days_offset}d</td>
                <td style={S.td}><button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>delItem(it.id)}>×</button></td>
              </tr>
            ))}</tbody>
          </table>
          <div style={{background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:8,padding:12}}>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:8,fontWeight:600}}>Add item</div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr .6fr auto",gap:8,alignItems:"end"}}>
              <div><label className="form-label">Task name</label><input className="form-input" value={newItem.name} onChange={e=>setNewItem(p=>({...p,name:e.target.value}))}/></div>
              <div><label className="form-label">Category</label>
                <select className="form-select" value={newItem.category_id} onChange={e=>setNewItem(p=>({...p,category_id:e.target.value}))}>
                  <option value="">—</option>{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div><label className="form-label">Assignee</label>
                <select className="form-select" value={newItem.default_assignee_id} onChange={e=>setNewItem(p=>({...p,default_assignee_id:e.target.value}))}>
                  <option value="">default</option>{users.map(u=><option key={u.id} value={u.id}>{u.initials}</option>)}
                </select>
              </div>
              <div><label className="form-label">Reviewer</label>
                <select className="form-select" value={newItem.default_reviewer_id} onChange={e=>setNewItem(p=>({...p,default_reviewer_id:e.target.value}))}>
                  <option value="">default</option>{users.map(u=><option key={u.id} value={u.id}>{u.initials}</option>)}
                </select>
              </div>
              <div><label className="form-label">Days</label><input type="number" className="form-input" value={newItem.days_offset} onChange={e=>setNewItem(p=>({...p,days_offset:e.target.value}))}/></div>
              <button className="btn btn-primary" style={{fontSize:12,padding:"9px 14px"}} onClick={addItem}>+ Add</button>
            </div>
          </div>
        </div>}
      </div>}

      {/* INTEGRATIONS */}
      {settingsTab==="integrations"&&<div style={S.card}>
        <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:4}}>Integrations</div>
        <div style={{fontSize:11.5,color:"#64748b",marginBottom:16}}>Connect external systems so the close tracker can read balances and post journal entries, invoices, bills, and payments.</div>
        <div style={{display:"grid",gap:10}}>
          {[
            {key:"qb",name:"QuickBooks Online",desc:"Read balances, pull trial balance, post invoices / sales receipts / bills / payments.",connected:!!qbStatus?.connected,connectUrl:"/qb/connect",extra:qbStatus?.connected?`Token expires in ~${Math.round((qbStatus.token_expires_in||0)/60)}m`:""},
            {key:"billcom",name:"Bill.com",desc:"Pull bills & payments to reconcile AP into QuickBooks.",connected:false,connectUrl:null,extra:"Not yet wired — scheduled after QB write foundation."},
            {key:"authnet",name:"Authorize.net",desc:"Pull settled batches; match to invoices or propose sales receipts for the review queue.",connected:false,connectUrl:null,extra:"Not yet wired."},
            {key:"pandadoc",name:"PandaDoc",desc:"Watch for completed sales documents; propose invoices for the review queue.",connected:false,connectUrl:null,extra:"Not yet wired."},
            {key:"shopify",name:"Shopify",desc:"Pull daily payouts; propose sales receipts or reconcile clearing account.",connected:false,connectUrl:null,extra:"Not yet wired."},
            {key:"jira",name:"Jira",desc:"Read epic + device tickets; link ops tickets to QB documents for price/delivery tie-out.",connected:false,connectUrl:null,extra:"Not yet wired."},
            {key:"teams",name:"Microsoft Teams",desc:"Post notifications when tasks go overdue or reviews need revision.",connected:false,connectUrl:null,extra:"Paste an Incoming Webhook URL (coming soon)."},
          ].map(i=>(
            <div key={i.key} style={{background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:10,padding:"14px 16px",display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:8,height:40,borderRadius:4,background:i.connected?"#4fd9a0":"#1e2d3d"}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:"#e2e8f0"}}>{i.name}{i.connected?<span style={{fontSize:10,marginLeft:8,padding:"1px 8px",background:"#4fd9a018",color:"#4fd9a0",border:"1px solid #4fd9a040",borderRadius:4,fontFamily:"'DM Mono',monospace"}}>CONNECTED</span>:<span style={{fontSize:10,marginLeft:8,padding:"1px 8px",background:"#1e2d3d",color:"#64748b",border:"1px solid #334155",borderRadius:4,fontFamily:"'DM Mono',monospace"}}>NOT CONNECTED</span>}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:3}}>{i.desc}</div>
                {i.extra&&<div style={{fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace",marginTop:4}}>{i.extra}</div>}
              </div>
              {i.connectUrl&&<a href={i.connectUrl} className="btn btn-primary" style={{fontSize:12,padding:"7px 14px",textDecoration:"none"}}>{i.connected?"Reconnect":"Connect"}</a>}
            </div>
          ))}
        </div>
      </div>}

      {/* Template Modals */}
      {showAddTmpl&&<Modal title="New Template" onClose={()=>setShowAddTmpl(false)}>
        <div className="form-group"><label className="form-label">Name</label><input className="form-input" value={newTmpl.name} onChange={e=>setNewTmpl(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Description</label><input className="form-input" value={newTmpl.description} onChange={e=>setNewTmpl(p=>({...p,description:e.target.value}))}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowAddTmpl(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={createTmpl}>Create</button>
        </div>
      </Modal>}
      {showInstantiate&&<Modal title={`Instantiate "${tmplDetail?.name}"`} onClose={()=>setShowInstantiate(false)}>
        <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>Creates a task for each item in the selected period. Due dates are computed as period start + days offset.</div>
        <div className="form-group"><label className="form-label">Target period</label>
          <select className="form-select" value={instOpts.period_id} onChange={e=>setInstOpts(p=>({...p,period_id:e.target.value}))}>
            <option value="">— pick —</option>
            {periodsAll.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Fallback assignee (used if item has no default)</label>
          <select className="form-select" value={instOpts.default_assignee_id} onChange={e=>setInstOpts(p=>({...p,default_assignee_id:e.target.value}))}>
            <option value="">— none —</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Fallback reviewer</label>
          <select className="form-select" value={instOpts.default_reviewer_id} onChange={e=>setInstOpts(p=>({...p,default_reviewer_id:e.target.value}))}>
            <option value="">— none —</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowInstantiate(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={doInstantiate}>Instantiate</button>
        </div>
      </Modal>}
      {showSaveAsTmpl&&<Modal title="Save Current Period as Template" onClose={()=>setShowSaveAsTmpl(false)}>
        <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>Snapshots every task in <b style={{color:"#cbd5e1"}}>{period?.label}</b> into a reusable template. Due dates become day-offsets from the period start.</div>
        <div className="form-group"><label className="form-label">Template name</label><input className="form-input" value={saveTmplName} onChange={e=>setSaveTmplName(e.target.value)} placeholder="e.g. Standard Monthly Close"/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowSaveAsTmpl(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={doSaveAsTmpl}>Save</button>
        </div>
      </Modal>}
      {showRollFwd&&<Modal title="Roll Forward Tasks" onClose={()=>setShowRollFwd(false)}>
        <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>Copies all tasks from the source period into the target period, shifting due dates by the given number of days.</div>
        <div className="form-group"><label className="form-label">Source period</label>
          <select className="form-select" value={rollOpts.source_period_id} onChange={e=>setRollOpts(p=>({...p,source_period_id:e.target.value}))}>
            <option value="">— pick —</option>{periodsAll.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Target period</label>
          <select className="form-select" value={rollOpts.target_period_id} onChange={e=>setRollOpts(p=>({...p,target_period_id:e.target.value}))}>
            <option value="">— pick —</option>{periodsAll.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Shift due dates by (days)</label><input type="number" className="form-input" value={rollOpts.shift_days} onChange={e=>setRollOpts(p=>({...p,shift_days:e.target.value}))}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>

  // ── Calendar View ───────────────────────────────────────────────────────────
  function CalendarView(){
    const month=calendarMonth||new Date();
    const y=month.getFullYear(),m=month.getMonth();
    const first=new Date(y,m,1),last=new Date(y,m+1,0);
    const startPad=first.getDay();
    const days=[];
    for(let i=0;i<startPad;i++)days.push(null);
    for(let d=1;d<=last.getDate();d++)days.push(new Date(y,m,d));
    while(days.length%7!==0)days.push(null);
    const byDay={};
    tasks.forEach(t=>{if(t.due_date){const k=t.due_date;if(!byDay[k])byDay[k]=[];byDay[k].push(t);}});
    const todayISO=new Date().toISOString().slice(0,10);
    const monthLabel=month.toLocaleDateString("en-US",{month:"long",year:"numeric"});
    function shift(n){const d=new Date(y,m+n,1);setCalendarMonth(d);}
    return(<div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{monthLabel}</div>
        <div style={{display:"flex",gap:6}}>
          <button className="btn btn-ghost" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>shift(-1)}>‹ Prev</button>
          <button className="btn btn-ghost" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>{const p=period?.start_date?new Date(period.start_date+"T00:00:00"):new Date();setCalendarMonth(p);}}>Period</button>
          <button className="btn btn-ghost" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>shift(1)}>Next ›</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:6}}>
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>
          <div key={d} style={{fontSize:10,color:"#64748b",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:.5,textAlign:"center",padding:"4px 0"}}>{d}</div>
        )}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
        {days.map((d,i)=>{
          if(!d)return <div key={i} style={{minHeight:90,background:"#0b0f15",borderRadius:8,border:"1px solid #111827"}}/>;
          const iso=d.toISOString().slice(0,10);
          const dayTasks=byDay[iso]||[];
          const isToday=iso===todayISO;
          return(<div key={i} style={{minHeight:90,background:"#0d1117",border:`1px solid ${isToday?"#4f8ef7":"#1e2d3d"}`,borderRadius:8,padding:8,display:"flex",flexDirection:"column",gap:4}}>
            <div style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:isToday?"#4f8ef7":"#64748b",fontWeight:isToday?700:400}}>{d.getDate()}</div>
            {dayTasks.slice(0,3).map(t=>{
              const col=SC[t.status]?.color||"#94a3b8";
              return(<div key={t.id} onClick={()=>setSelectedTask(t)}
                style={{fontSize:11,background:col+"15",color:col,border:`1px solid ${col}30`,borderRadius:5,padding:"2px 6px",cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={t.name}>
                {t.assignee_initials} · {t.name}
              </div>);
            })}
            {dayTasks.length>3&&<div style={{fontSize:10,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>+{dayTasks.length-3} more</div>}
          </div>);
        })}
      </div>
    </div>);
  }

  // ── Attachments Modal ───────────────────────────────────────────────────────
  function AttachmentsModal({recon,onClose}){
    const [files,setFiles]=useState([]);
    const [loading,setLoading]=useState(true);
    const [uploading,setUploading]=useState(false);
    const inputRef=useRef(null);
    async function load(){
      setLoading(true);
      try{const rows=await api(`/api/reconciliations/${recon.id}/attachments`);setFiles(rows);}
      catch(e){console.error(e);}
      setLoading(false);
    }
    useEffect(()=>{load();},[recon.id]);
    async function upload(e){
      const f=e.target.files?.[0];if(!f)return;
      setUploading(true);
      const fd=new FormData();fd.append("file",f);
      try{
        const res=await fetch(`/api/reconciliations/${recon.id}/attachments`,{method:"POST",body:fd,credentials:"include"});
        if(!res.ok){const j=await res.json().catch(()=>({}));throw new Error(j.error||"Upload failed");}
        await load();
      }catch(err){alert(err.message);}
      setUploading(false);
      if(inputRef.current)inputRef.current.value="";
    }
    async function remove(id){
      if(!confirm("Delete this attachment?"))return;
      try{await api(`/api/reconciliations/${recon.id}/attachments/${id}`,{method:"DELETE"});await load();}
      catch(e){alert(e.message);}
    }
    function fmtSize(b){if(b==null)return"";if(b<1024)return b+" B";if(b<1048576)return(b/1024).toFixed(1)+" KB";return(b/1048576).toFixed(1)+" MB";}
    return(<div className="modal-overlay" onClick={onClose}><div className="modal-box" style={{width:540}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <div>
          <div style={{fontSize:11,color:"#4f8ef7",fontFamily:"'DM Mono',monospace",marginBottom:4}}>{recon.account_number}</div>
          <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{recon.account_name} — Attachments</div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>×</button>
      </div>
      <div style={{fontSize:11.5,color:"#64748b",marginBottom:16}}>Bank statements, screenshots, or supporting docs. Max 25 MB per file.</div>
      <div style={{marginBottom:14}}>
        <input ref={inputRef} type="file" onChange={upload} style={{display:"none"}}/>
        <button className="btn btn-primary" style={{width:"100%"}} onClick={()=>inputRef.current?.click()} disabled={uploading}>
          {uploading?"Uploading…":"+ Upload File"}
        </button>
      </div>
      {loading?<Spinner/>:files.length===0?
        <div style={{fontSize:13,color:"#475569",textAlign:"center",padding:"20px 0"}}>No attachments yet.</div>:
        <div>{files.map(f=>(
          <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:8,marginBottom:6}}>
            <div style={{flex:1,minWidth:0}}>
              <a href={`/api/reconciliations/${recon.id}/attachments/${f.id}`} style={{fontSize:13,color:"#e2e8f0",textDecoration:"none",fontWeight:500,display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.filename}</a>
              <div style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace",marginTop:2}}>
                {fmtSize(f.size_bytes)} · {f.uploader_initials||"—"} · {new Date(f.created_at+"Z").toLocaleDateString("en-US",{month:"short",day:"numeric"})}
              </div>
            </div>
            <button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>remove(f.id)}>Delete</button>
          </div>
        ))}</div>}
    </div></div>);
  }

              <td style={{...S.td,fontSize:12.5}}>
                <span style={{fontFamily:"'DM Mono',monospace",color:"#94a3b8",marginRight:6}}>{r.account_number||"—"}</span>{r.account_name}
                {r.new_account&&<span style={{fontSize:10,marginLeft:6,padding:"1px 6px",background:"#4fd9a018",color:"#4fd9a0",borderRadius:4,fontFamily:"'DM Mono',monospace"}}>NEW</span>}
                {r.removed_account&&<span style={{fontSize:10,marginLeft:6,padding:"1px 6px",background:"#f8717118",color:"#f87171",borderRadius:4,fontFamily:"'DM Mono',monospace"}}>REMOVED</span>}

            </tr>);
          })}</tbody>
        </table>
      </div>}
    </div>);
  }
