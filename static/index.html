              </tr>);
            })}</tbody>
          </table>
        </div>
      ))}
    </div>);
  }

  // ── Reconciliations ─────────────────────────────────────────────────────────
  function Reconciliations(){
    const [reconPeriods,setReconPeriods]=useState([]);
    const [reconPeriodId,setReconPeriodId]=useState(null);
    const [reconBusy,setReconBusy]=useState(false);
    const [reconErr,setReconErr]=useState(null);

    useEffect(()=>{
      const months=allPeriods.filter(p=>(p.period_type||"month")==="month")
                             .sort((a,b)=>b.start_date.localeCompare(a.start_date));
      setReconPeriods(months);
    },[allPeriods]);

    // Follow the global close period by default; user can still override.
    useEffect(()=>{
      if(period?.id&&reconPeriodId!==period.id)setReconPeriodId(period.id);
    },[period?.id]);

    useEffect(()=>{
      if(!reconPeriodId)return;
      api(`/api/reconciliations?period_id=${reconPeriodId}`)
        .then(rs=>setRecons(Array.isArray(rs)?rs:[]))
        .catch(e=>{setReconErr(e.message);setRecons([]);});
    },[reconPeriodId]);

    const selPeriod=reconPeriods.find(p=>p.id===reconPeriodId)||period;
    const stale=selPeriod?.end_date&&((new Date()-new Date(selPeriod.end_date+"T00:00:00"))/86400000>60);

    async function syncThisPeriod(){
      if(!reconPeriodId)return;
      setReconBusy(true);setReconErr(null);setSyncMsg(null);
      try{
        const r=await api("/api/qb/sync_reports",{method:"POST",body:JSON.stringify({period_id:reconPeriodId,types:["bs"],derive_recons:true})});
        if(!r.ok){
          const msgs=Object.entries(r.results||{}).filter(([_,v])=>!v.ok).map(([t,v])=>`${t.toUpperCase()}: ${v.error||"unknown"}`).join(" · ");
          setReconErr(msgs||"Sync failed");
        }else{
          const rc=r.recons||{};
          setSyncMsg({kind:"ok",text:`Synced ${selPeriod?.label||"period"} · ${rc.created||0} new accounts, ${rc.updated||0} updated`});
        }
        const rr=await api(`/api/reconciliations?period_id=${reconPeriodId}`);setRecons(rr);
      }catch(e){setReconErr(e.message);}
      setReconBusy(false);
    }

    if(loading&&!reconPeriods.length)return <Spinner/>;
    return(<div style={S.card}>
      {stale&&!reconBusy&&<div style={{padding:"10px 14px",marginBottom:14,borderRadius:8,background:"#f59e0b18",border:"1px solid #f59e0b40",color:"#f59e0b",fontSize:12.5,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span>⚠ Period "{selPeriod?.label}" ended more than 60 days ago — QB Balance shows ending balances as of {selPeriod?.end_date}. To refresh, click <b>↻ Sync This Period</b>.</span>
      </div>}
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,gap:10,flexWrap:"wrap",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Account Reconciliations</div>
          <div style={{fontSize:11.5,color:"#64748b",marginTop:2}}>Synced from QuickBooks Online · {selPeriod?.label||"—"}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <label style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>PERIOD</label>
          <select value={reconPeriodId||""} onChange={e=>setReconPeriodId(parseInt(e.target.value))}
            style={{padding:"6px 10px",background:"#111827",border:"1px solid #1e2d3d",color:"#e2e8f0",borderRadius:7,fontSize:12,fontFamily:"'DM Mono',monospace",minWidth:140}}>
            {reconPeriods.map(p=><option key={p.id} value={p.id}>{p.label}{p.is_active?" ●":""}</option>)}
          </select>
          {isAdmin&&recons.length===0&&qbStatus?.connected&&<button onClick={bootstrapQB} disabled={syncing||reconBusy} style={{padding:"6px 14px",background:"#2CA01C",border:"none",color:"#fff",borderRadius:8,fontSize:12,fontWeight:600,cursor:syncing?"default":"pointer"}}>{syncing?"Working…":"⇣ Initialize from QuickBooks"}</button>}
          {isAdmin&&qbStatus?.connected&&<button onClick={syncThisPeriod} disabled={reconBusy||syncing} title="Pull this period's Balance Sheet from QuickBooks and derive account balances" style={{padding:"6px 14px",background:"#4f8ef718",border:"1px solid #4f8ef740",color:(reconBusy||syncing)?"#64748b":"#4f8ef7",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{reconBusy?"Syncing…":"↻ Sync This Period"}</button>}
        </div>
      </div>
      {reconErr&&<div style={{marginBottom:14,padding:"10px 14px",borderRadius:8,fontSize:12,fontFamily:"'DM Mono',monospace",background:"#f8717118",border:"1px solid #f8717140",color:"#f87171"}}>{reconErr}</div>}
      {syncMsg&&<div style={{marginBottom:14,padding:"10px 14px",borderRadius:8,fontSize:12,fontFamily:"'DM Mono',monospace",background:syncMsg.kind==="ok"?"#4fd9a018":"#f8717118",border:`1px solid ${syncMsg.kind==="ok"?"#4fd9a040":"#f8717140"}`,color:syncMsg.kind==="ok"?"#4fd9a0":"#f87171"}}>{syncMsg.text}</div>}
      {recons.length===0&&<div style={{padding:30,textAlign:"center",color:"#64748b",fontSize:13,fontFamily:"'DM Mono',monospace"}}>
        {qbStatus?.connected?`No reconciliations for ${selPeriod?.label||"this period"}. Click ↻ Sync This Period to pull it from QuickBooks.`:"Connect QuickBooks in Settings, then Initialize."}
      </div>}
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>{["Account","QB Balance","Expected","Variance","Assignee","Status","Updated"].map((h,i)=><th key={h} style={{...S.th,textAlign:i>=1&&i<=3?"right":"left"}}>{h}</th>)}</tr></thead>
        <tbody>{recons.map(r=>{
          const variance=r.expected_balance!=null?r.qb_balance-r.expected_balance:null;
          const vc=variance===0?"#4fd9a0":variance!=null?"#f87171":"#475569";
          return(<tr key={r.id}>
            <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12.5}}>{r.account_number} – {r.account_name}</td>
            <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5}}>{fmt(r.qb_balance)}</td>
            <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5}}>
              <input type="text" defaultValue={r.expected_balance!=null?r.expected_balance:""} placeholder="—"
                onBlur={e=>{const v=parseFloat(e.target.value.replace(/[$,]/g,""));if(!isNaN(v))patchRecon(r.id,{expected_balance:v});}}
                style={{background:"transparent",border:"none",color:"#e2e8f0",fontFamily:"'DM Mono',monospace",fontSize:12.5,textAlign:"right",width:110,outline:"none",borderBottom:"1px dashed #1e2d3d"}}/>
            </td>
            <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5,color:vc,fontWeight:variance!==0&&variance!=null?700:400}}>{variance!=null?(variance===0?"—":fmt(Math.abs(variance))):"—"}</td>
            <td style={S.td}><Avatar user={{initials:r.assignee_initials,color:r.assignee_color}}/></td>
            <td style={S.td}>
              <select value={r.status} style={S.sel(XC[r.status]?.color||"#94a3b8")} onChange={e=>patchRecon(r.id,{status:e.target.value})}>
                <option value="open">Open</option><option value="needs_attention">Variance</option><option value="reconciled">Reconciled</option>
              </select>
            </td>
            <td style={{...S.td,fontSize:12,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{r.last_updated_at?new Date(r.last_updated_at).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"—"}</td>
          </tr>);
        })}</tbody>
      </table>
    </div>);
  }

  // ── Task Modal ──────────────────────────────────────────────────────────────
  function TaskModal(){
    const [notes,setNotes]=useState(selectedTask?.notes||"");
    const [editMode,setEditMode]=useState(false);
    const [editData,setEditData]=useState({});
    const [deps,setDeps]=useState([]);
    const [attachments,setAttachments]=useState([]);
    const [activity,setActivity]=useState([]);
    const [activeSection,setActiveSection]=useState("details");
    const [uploading,setUploading]=useState(false);
    const fileRef=useRef(null);

    useEffect(()=>{
      if(!selectedTask?.id)return;
      setNotes(selectedTask?.notes||"");setEditMode(false);setEditData({});setActiveSection("details");
      api(`/api/tasks/${selectedTask.id}/dependencies`).then(setDeps).catch(()=>{});
      api(`/api/attachments?task_id=${selectedTask.id}`).then(setAttachments).catch(()=>{});
      api(`/api/tasks/${selectedTask.id}/activity`).then(setActivity).catch(()=>{});
    },[selectedTask?.id]);

    if(!selectedTask)return null;
    const t=selectedTask;
    const assignee=users.find(u=>u.id===t.assignee_id);
    const reviewer=users.find(u=>u.id===t.reviewer_id);
    const canEdit=isAdmin||t.assignee_id===currentUser.id||t.reviewer_id===currentUser.id;
    const isAssignee=t.assignee_id===currentUser.id;
    const isReviewer=t.reviewer_id===currentUser.id;
    const isBlocked=deps.some(d=>d.status!=="complete");

    async function saveEdit(){
      await patchTask(t.id,{...editData,notes});
      setEditMode(false);setEditData({});
    }
    async function addDep(depId){
      if(!depId)return;
      await api(`/api/tasks/${t.id}/dependencies`,{method:"POST",body:JSON.stringify({depends_on_id:parseInt(depId)})});
      const d=await api(`/api/tasks/${t.id}/dependencies`);setDeps(d);
    }
    async function removeDep(depId){
      await api(`/api/tasks/${t.id}/dependencies/${depId}`,{method:"DELETE"});
      setDeps(prev=>prev.filter(d=>d.id!==depId));
    }
    async function uploadFile(file){
      if(!file)return;
      setUploading(true);
      const fd=new FormData();fd.append("file",file);fd.append("task_id",String(t.id));
      try{
        await fetch("/api/attachments",{method:"POST",headers:{"X-CSRF-Token":_csrfToken},body:fd});
        const a=await api(`/api/attachments?task_id=${t.id}`);setAttachments(a);
      }catch(e){alert(e.message);}
      setUploading(false);
    }
    async function deleteAttachment(id){
      if(!confirm("Delete attachment?"))return;
      await api(`/api/attachments/${id}`,{method:"DELETE"});
      setAttachments(prev=>prev.filter(a=>a.id!==id));
    }
    const sectionBtn=(id,label)=><button onClick={()=>setActiveSection(id)} style={{padding:"5px 12px",borderRadius:6,border:"none",background:activeSection===id?"#1e2d3d":"transparent",color:activeSection===id?"#e2e8f0":"#64748b",fontSize:12,cursor:"pointer"}}>{label}</button>;

    return(<div style={{position:"fixed",inset:0,background:"#0008",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setSelectedTask(null)}>
      <div style={{background:"#111827",border:"1px solid #1e2d3d",borderRadius:16,width:580,padding:28,maxHeight:"88vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"#4f8ef7",fontFamily:"'DM Mono',monospace",marginBottom:4}}>{t.category_name}
              {t.recurrence&&t.recurrence!=="none"&&<span style={{marginLeft:8,color:"#64748b"}}>↻ {t.recurrence}</span>}
              {isBlocked&&<span style={{marginLeft:8,color:"#f87171",fontWeight:700}}>⛔ Blocked</span>}
            </div>
            {editMode&&isAdmin
              ?<input className="form-input" defaultValue={t.name} onChange={e=>setEditData(p=>({...p,name:e.target.value}))} style={{fontSize:15,fontWeight:700,width:"100%"}}/>
              :<div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{t.name}</div>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
            {isAdmin&&!editMode&&<button onClick={()=>setEditMode(true)} className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}}>Edit</button>}
            <button onClick={()=>setSelectedTask(null)} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>×</button>
          </div>
        </div>

        <div style={{display:"flex",gap:4,marginBottom:16,background:"#0d1117",borderRadius:8,padding:3}}>
          {sectionBtn("details","Details")}{sectionBtn("deps","Dependencies")}{sectionBtn("files","Attachments")}{sectionBtn("history","History")}
        </div>

        {activeSection==="details"&&<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
              <div className="form-label">Assigned To</div>
              {editMode&&isAdmin
                ?<select className="form-select" defaultValue={t.assignee_id} onChange={e=>setEditData(p=>({...p,assignee_id:parseInt(e.target.value)}))}>
                  {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
                :<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><Avatar user={assignee}/>{assignee?.name}</div>}
            </div>
            <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
              <div className="form-label">Reviewer</div>
              {editMode&&isAdmin
                ?<select className="form-select" defaultValue={t.reviewer_id} onChange={e=>setEditData(p=>({...p,reviewer_id:parseInt(e.target.value)}))}>
                  {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
                :<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><Avatar user={reviewer}/>{reviewer?.name}</div>}
            </div>
            <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
              <div className="form-label">Due Date</div>
              {editMode&&isAdmin
                ?<input type="date" className="form-input" defaultValue={t.due_date||""} onChange={e=>setEditData(p=>({...p,due_date:e.target.value}))}/>
                :<span style={{fontFamily:"'DM Mono',monospace",fontSize:13}}>{fmtDate(t.due_date)}</span>}
            </div>
            <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
              <div className="form-label">Category</div>
              {editMode&&isAdmin
                ?<select className="form-select" defaultValue={t.category_id} onChange={e=>setEditData(p=>({...p,category_id:parseInt(e.target.value)}))}>
                  {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                :<span style={{fontSize:13}}>{t.category_name}</span>}
            </div>
            <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}><div className="form-label">Status</div><Badge status={t.status}/>{t.submitted_at&&<div style={{fontSize:10,color:"#64748b",marginTop:3,fontFamily:"'DM Mono',monospace"}}>Submitted {new Date(t.submitted_at).toLocaleDateString()}</div>}</div>
            <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}><div className="form-label">Review</div><Badge status={t.review_status} type="review"/>{t.approved_at&&<div style={{fontSize:10,color:"#64748b",marginTop:3,fontFamily:"'DM Mono',monospace"}}>Approved {new Date(t.approved_at).toLocaleDateString()}</div>}</div>
            {editMode&&isAdmin&&<div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px",gridColumn:"1/-1"}}>
              <div className="form-label">Recurrence</div>
              <select className="form-select" defaultValue={t.recurrence||"none"} onChange={e=>setEditData(p=>({...p,recurrence:e.target.value}))}>
                <option value="none">None (one-time)</option><option value="monthly">Monthly</option><option value="quarterly">Quarterly</option><option value="yearly">Yearly</option>
              </select>
            </div>}
          </div>
          <div style={{marginBottom:14}}>
            <div className="form-label">Notes</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Add notes or comments…" disabled={!canEdit}
              style={{width:"100%",background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:8,color:"#e2e8f0",padding:"10px 12px",fontSize:13,resize:"vertical",minHeight:72,fontFamily:"'DM Sans',sans-serif",opacity:canEdit?1:.6}}/>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",flexWrap:"wrap"}}>
            {editMode&&isAdmin&&<><button onClick={()=>{setEditMode(false);setEditData({});}} className="btn btn-ghost">Cancel</button><button onClick={saveEdit} className="btn btn-primary">Save Changes</button></>}
            {!editMode&&canEdit&&<>
              <button onClick={()=>patchTask(t.id,{notes}).then(()=>setSelectedTask(null))} className="btn btn-ghost">Save Note</button>
              {(isAssignee||isAdmin)&&t.status==="in_progress"&&<button onClick={()=>patchTask(t.id,{status:"submitted",notes}).then(()=>setSelectedTask(null))} style={{padding:"8px 14px",borderRadius:8,border:"1px solid #f7c94840",background:"#f7c94818",color:"#f7c948",fontSize:13,fontWeight:600,cursor:"pointer"}}>Submit for Review</button>}
              {(isAssignee||isAdmin)&&(t.status==="open"||t.status==="submitted")&&!t.submitted_at&&<button onClick={()=>patchTask(t.id,{status:"in_progress",notes})} className="btn btn-ghost">Mark In Progress</button>}
              {(isAssignee||isAdmin)&&t.status!=="complete"&&t.review_status==="approved"&&<button onClick={()=>patchTask(t.id,{status:"complete",notes}).then(()=>setSelectedTask(null))} className="btn btn-success">Mark Complete</button>}
              {(isAssignee||isAdmin)&&t.status!=="complete"&&t.review_status!=="approved"&&<button onClick={()=>patchTask(t.id,{status:"complete",notes}).then(()=>setSelectedTask(null))} className="btn btn-success">Mark Complete</button>}
              {(isAdmin||isReviewer)&&t.status==="submitted"&&t.review_status!=="approved"&&<button onClick={()=>patchTask(t.id,{review_status:"needs_revision"}).then(()=>setSelectedTask(null))} className="btn btn-danger" style={{fontSize:13}}>Request Revision</button>}
              {(isAdmin||isReviewer)&&(t.status==="submitted"||t.status==="complete")&&<button onClick={()=>patchTask(t.id,{review_status:"approved",notes}).then(()=>setSelectedTask(null))} className="btn btn-primary">Approve ✓</button>}
            </>}
          </div>
        </>}

        {activeSection==="deps"&&<div>
          <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>This task is blocked until the following tasks are complete:</div>
          {deps.length===0&&<div style={{fontSize:13,color:"#475569",padding:"12px 0"}}>No dependencies. This task can start immediately.</div>}
          {deps.map(d=><div key={d.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #1a2535"}}>
            <span style={{fontSize:13,flex:1}}>{d.name}</span>
            <span style={{fontSize:11,color:d.status==="complete"?"#4fd9a0":"#f87171",fontFamily:"'DM Mono',monospace"}}>{d.status}</span>
            {isAdmin&&<button onClick={()=>removeDep(d.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:12}}>✕</button>}
          </div>)}
          {isAdmin&&<div style={{marginTop:14}}>
            <div className="form-label">Add Dependency (task must complete first)</div>
            <select className="form-select" defaultValue="" onChange={e=>{addDep(e.target.value);e.target.value="";}}>
              <option value="">Select task…</option>
              {tasks.filter(tk=>tk.id!==t.id&&!deps.find(d=>d.id===tk.id)).map(tk=><option key={tk.id} value={tk.id}>{tk.name}</option>)}
            </select>
          </div>}
        </div>}

        {activeSection==="files"&&<div>
          {attachments.length===0&&<div style={{fontSize:13,color:"#475569",padding:"12px 0"}}>No attachments yet.</div>}
          {attachments.map(a=><div key={a.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #1a2535"}}>
            <span style={{fontSize:13,flex:1,fontFamily:"'DM Mono',monospace",fontSize:12}}>{a.filename}</span>
            <span style={{fontSize:11,color:"#64748b"}}>{a.uploaded_by_name}</span>
            <a href={`/api/attachments/${a.id}/download`} style={{fontSize:11,color:"#4f8ef7",textDecoration:"none"}} target="_blank">↓ Download</a>
            {isAdmin&&<button onClick={()=>deleteAttachment(a.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:12}}>✕</button>}
          </div>)}
          {canEdit&&<div style={{marginTop:14}}>
            <input ref={fileRef} type="file" style={{display:"none"}} onChange={e=>uploadFile(e.target.files[0])}/>
            <button onClick={()=>fileRef.current?.click()} disabled={uploading} className="btn btn-ghost" style={{fontSize:12}}>{uploading?"Uploading…":"+ Attach File"}</button>
            <span style={{fontSize:11,color:"#475569",marginLeft:10}}>Max 5 MB</span>
          </div>}
        </div>}

        {activeSection==="history"&&<div>
          {activity.length===0&&<div style={{fontSize:13,color:"#475569",padding:"12px 0"}}>No activity yet.</div>}
          {activity.map(a=><div key={a.id} style={{padding:"7px 0",borderBottom:"1px solid #1a2535",fontSize:12}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontWeight:600,color:"#94a3b8"}}>{a.user_name||"System"}</span>
              <span style={{color:"#475569",fontFamily:"'DM Mono',monospace",fontSize:11}}>{new Date(a.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span>
            </div>
            <div style={{color:"#64748b",marginTop:2}}>{a.action.replace(/_/g," ")}{a.old_value&&a.new_value?`: ${a.old_value} → ${a.new_value}`:a.new_value?`: ${a.new_value}`:""}</div>
          </div>)}
        </div>}
      </div>
    </div>);
  }

  // ── Settings (Admin Only) ───────────────────────────────────────────────────
  function Settings(){
    const [settingsTab,setSettingsTab]=useState("users");
    const [showAddUser,setShowAddUser]=useState(false);
    const [showAddCat,setShowAddCat]=useState(false);
    const [showAddTask,setShowAddTask]=useState(false);
    const [editUser,setEditUser]=useState(null);
    const [editCat,setEditCat]=useState(null);

    // Add User Form
    const [newUser,setNewUser]=useState({name:"",initials:"",email:"",role:"preparer",color:"#4f8ef7"});
    async function addUser(){
      try{await api("/api/users",{method:"POST",body:JSON.stringify(newUser)});await loadAll();setShowAddUser(false);setNewUser({name:"",initials:"",email:"",role:"preparer",color:"#4f8ef7"});}
      catch(e){alert(e.message);}
    }
    async function deleteUser(id){
      if(!confirm("Delete this user?"))return;
      try{await api(`/api/users/${id}`,{method:"DELETE"});await loadAll();}catch(e){alert(e.message);}
    }
    async function saveEditUser(){
      try{await api(`/api/users/${editUser.id}`,{method:"PATCH",body:JSON.stringify(editUser)});await loadAll();setEditUser(null);}
      catch(e){alert(e.message);}
    }

    // Add Category Form
    const [newCat,setNewCat]=useState({name:"",sort_order:99});
    async function addCat(){
      try{await api("/api/categories",{method:"POST",body:JSON.stringify(newCat)});await loadAll();setShowAddCat(false);setNewCat({name:"",sort_order:99});}
      catch(e){alert(e.message);}
    }
    async function deleteCat(id){
      if(!confirm("Delete this category?"))return;
      try{await api(`/api/categories/${id}`,{method:"DELETE"});await loadAll();}catch(e){alert(e.message);}
    }
    async function saveEditCat(){
      try{await api(`/api/categories/${editCat.id}`,{method:"PATCH",body:JSON.stringify(editCat)});await loadAll();setEditCat(null);}
      catch(e){alert(e.message);}
    }

    // Add Task Form
    const [newTask,setNewTask]=useState({name:"",category_id:"",assignee_id:"",reviewer_id:"",due_date:"",notes:""});
    async function addTask(){
      if(!newTask.name||!newTask.category_id||!newTask.assignee_id||!newTask.reviewer_id){alert("Name, category, assignee, and reviewer are required.");return;}
      try{
        await api("/api/tasks",{method:"POST",body:JSON.stringify({...newTask,period_id:period.id,category_id:parseInt(newTask.category_id),assignee_id:parseInt(newTask.assignee_id),reviewer_id:parseInt(newTask.reviewer_id)})});
        await loadAll();setShowAddTask(false);setNewTask({name:"",category_id:"",assignee_id:"",reviewer_id:"",due_date:"",notes:""});
      }catch(e){alert(e.message);}
    }
    async function deleteTask(id){
      if(!confirm("Delete this task?"))return;
      try{await api(`/api/tasks/${id}`,{method:"DELETE"});await loadAll();}catch(e){alert(e.message);}
    }

    const [qbStatus,setQbStatus]=useState(null);
    useEffect(()=>{api("/api/qb/status").then(s=>setQbStatus(s)).catch(()=>{});},[]);

    const stabs=["users","categories","tasks","quickbooks","groups","rollforward","templates"];

    // Report Groups state (loaded lazily when groups tab opens)
    const [groupRtype,setGroupRtype]=useState("pl");
    const [groups,setGroups]=useState([]);
    const [newGroupName,setNewGroupName]=useState("");
    const [availAccounts,setAvailAccounts]=useState([]);
    async function loadGroups(){
      try{
        const g=await api(`/api/report_groups?report_type=${groupRtype}`);
        setGroups(g);
        const period=await api("/api/periods/active").catch(()=>null);
        if(period?.id){
          const rep=await api(`/api/reports/${groupRtype}?period_id=${period.id}&auto_compare=0`).catch(()=>({lines:[]}));
          const names=[...new Set((rep.lines||[]).filter(l=>!l.is_subtotal).map(l=>l.account_name))].sort();
          setAvailAccounts(names);
        }
      }catch(e){}
    }
    useEffect(()=>{if(settingsTab==="groups")loadGroups();},[settingsTab,groupRtype]);
    async function addGroup(){
      if(!newGroupName.trim())return;
      try{await api("/api/report_groups",{method:"POST",body:JSON.stringify({name:newGroupName.trim(),report_type:groupRtype,sort_order:groups.length})});setNewGroupName("");await loadGroups();}
      catch(e){alert(e.message);}
    }
    async function saveGroupAccounts(gid,accounts){
      try{await api(`/api/report_groups/${gid}`,{method:"PATCH",body:JSON.stringify({accounts})});await loadGroups();}
      catch(e){alert(e.message);}
    }
    async function deleteGroup(gid){
      if(!confirm("Delete this group?"))return;
      try{await api(`/api/report_groups/${gid}`,{method:"DELETE"});await loadGroups();}
      catch(e){alert(e.message);}
    }
    return(<div>
      <div style={{display:"flex",gap:0,marginBottom:24,background:"#111827",border:"1px solid #1e2d3d",borderRadius:10,padding:4,width:"fit-content"}}>
        {stabs.map(t=><button key={t} onClick={()=>setSettingsTab(t)} style={{padding:"7px 18px",borderRadius:7,border:"none",background:settingsTab===t?"#1e2d3d":"transparent",color:settingsTab===t?"#e2e8f0":"#64748b",fontSize:13,cursor:"pointer",fontWeight:settingsTab===t?600:400,textTransform:"capitalize"}}>{t}</button>)}
      </div>

      {/* USERS */}
      {settingsTab==="users"&&<div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Team Members</div>
          <button className="btn btn-primary" style={{fontSize:12,padding:"6px 14px"}} onClick={()=>setShowAddUser(true)}>+ Add User</button>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Name","Email","Role","Color","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{users.map(u=>(
            <tr key={u.id}>
              <td style={S.td}><div style={{display:"flex",alignItems:"center",gap:8}}><Avatar user={u} size={26}/><span style={{fontWeight:500}}>{u.name}</span></div></td>
              <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{u.email||"—"}</td>
              <td style={S.td}><span className={`tag ${u.role==="admin"?"tag-admin":"tag-user"}`}>{u.role}</span></td>
              <td style={S.td}><div style={{width:22,height:22,borderRadius:6,background:u.color}}/></td>
              <td style={S.td}><div style={{display:"flex",gap:6}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setEditUser({...u})}>Edit</button>
                {u.id!==currentUser.id&&<button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteUser(u.id)}>Delete</button>}
              </div></td>
            </tr>
          ))}</tbody>
        </table>
      </div>}

      {/* CATEGORIES */}
      {settingsTab==="categories"&&<div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Categories</div>
          <button className="btn btn-primary" style={{fontSize:12,padding:"6px 14px"}} onClick={()=>setShowAddCat(true)}>+ Add Category</button>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Category","Sort Order","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{cats.map(c=>(
            <tr key={c.id}>
              <td style={{...S.td,fontWeight:500}}>{c.name}</td>
              <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{c.sort_order}</td>
              <td style={S.td}><div style={{display:"flex",gap:6}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setEditCat({...c})}>Edit</button>
                <button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteCat(c.id)}>Delete</button>
              </div></td>
            </tr>
          ))}</tbody>
        </table>
      </div>}

      {/* TASKS */}
      {settingsTab==="tasks"&&<div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>All Tasks — {period?.label}</div>
          <button className="btn btn-primary" style={{fontSize:12,padding:"6px 14px"}} onClick={()=>setShowAddTask(true)}>+ Add Task</button>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Task","Category","Assignee","Due","Status","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{tasks.map(t=>(
            <tr key={t.id}>
              <td style={{...S.td,fontWeight:500,maxWidth:260}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div></td>
              <td style={{...S.td,fontSize:12,color:"#94a3b8"}}>{t.category_name}</td>
              <td style={S.td}><Avatar user={{initials:t.assignee_initials,color:t.assignee_color}} size={24}/></td>
              <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{fmtDate(t.due_date)}</td>
              <td style={S.td}><Badge status={t.status}/></td>
              <td style={S.td}><div style={{display:"flex",gap:6}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setSelectedTask(t)}>Edit</button>
                <button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteTask(t.id)}>Delete</button>
              </div></td>
            </tr>
          ))}</tbody>
        </table>
      </div>}

      {/* Modals */}
      {showAddUser&&<Modal title="Add Team Member" onClose={()=>setShowAddUser(false)}>
        {[["Full Name","name","text"],["Initials (2-3 chars)","initials","text"],["Email","email","email"]].map(([label,key,type])=>(
          <div key={key} className="form-group"><label className="form-label">{label}</label><input type={type} className="form-input" value={newUser[key]} onChange={e=>setNewUser(p=>({...p,[key]:e.target.value}))}/></div>
        ))}
        <div className="form-group"><label className="form-label">Role</label>
          <select className="form-select" value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value}))}>
            <option value="preparer">User (Preparer)</option><option value="reviewer">Reviewer</option><option value="admin">Admin</option>
          </select>
        </div>
        <div className="form-group"><label className="form-label">Color</label><input type="color" value={newUser.color} onChange={e=>setNewUser(p=>({...p,color:e.target.value}))} style={{width:"100%",height:36,border:"1px solid #1e2d3d",borderRadius:8,background:"#0d1117",cursor:"pointer"}}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowAddUser(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={addUser}>Add User</button>
        </div>
      </Modal>}

      {editUser&&<Modal title="Edit Team Member" onClose={()=>setEditUser(null)}>
        {[["Full Name","name","text"],["Initials","initials","text"],["Email","email","email"]].map(([label,key,type])=>(
          <div key={key} className="form-group"><label className="form-label">{label}</label><input type={type} className="form-input" value={editUser[key]||""} onChange={e=>setEditUser(p=>({...p,[key]:e.target.value}))}/></div>
        ))}
        <div className="form-group"><label className="form-label">Role</label>
          <select className="form-select" value={editUser.role} onChange={e=>setEditUser(p=>({...p,role:e.target.value}))}>
            <option value="preparer">User (Preparer)</option><option value="reviewer">Reviewer</option><option value="admin">Admin</option>
          </select>
        </div>
        <div className="form-group"><label className="form-label">Color</label><input type="color" value={editUser.color} onChange={e=>setEditUser(p=>({...p,color:e.target.value}))} style={{width:"100%",height:36,border:"1px solid #1e2d3d",borderRadius:8,background:"#0d1117",cursor:"pointer"}}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setEditUser(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={saveEditUser}>Save Changes</button>
        </div>
      </Modal>}

      {showAddCat&&<Modal title="Add Category" onClose={()=>setShowAddCat(false)}>
        <div className="form-group"><label className="form-label">Category Name</label><input className="form-input" value={newCat.name} onChange={e=>setNewCat(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Sort Order</label><input type="number" className="form-input" value={newCat.sort_order} onChange={e=>setNewCat(p=>({...p,sort_order:parseInt(e.target.value)}))}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowAddCat(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={addCat}>Add Category</button>
        </div>
      </Modal>}

      {editCat&&<Modal title="Edit Category" onClose={()=>setEditCat(null)}>
        <div className="form-group"><label className="form-label">Category Name</label><input className="form-input" value={editCat.name} onChange={e=>setEditCat(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Sort Order</label><input type="number" className="form-input" value={editCat.sort_order} onChange={e=>setEditCat(p=>({...p,sort_order:parseInt(e.target.value)}))}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setEditCat(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={saveEditCat}>Save Changes</button>
        </div>
      </Modal>}

      {/* QUICKBOOKS */}
      {settingsTab==="quickbooks"&&<div style={S.card}>
        <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:4}}>QuickBooks Online</div>
        <div style={{fontSize:12,color:"#475569",marginBottom:20}}>Connect your QuickBooks Online account to sync account balances automatically.</div>
        <div style={{display:"flex",alignItems:"center",gap:16,padding:"16px 20px",background:"#0d1117",borderRadius:10,border:"1px solid #1e2d3d",marginBottom:16}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0",marginBottom:3}}>Connection Status</div>
            {qbStatus===null&&<div style={{fontSize:12,color:"#64748b"}}>Checking…</div>}
            {qbStatus?.connected&&<div style={{fontSize:12,color:"#4fd9a0"}}>✓ Connected · token expires in {Math.round((qbStatus.token_expires_in||0)/60)} min</div>}
            {qbStatus&&!qbStatus.connected&&<div style={{fontSize:12,color:"#f87171"}}>Not connected</div>}
          </div>
          <a href="/api/qb/connect" style={{padding:"8px 18px",background:"#2CA01C",color:"#fff",borderRadius:8,fontSize:13,fontWeight:600,textDecoration:"none",display:"inline-block"}}>
            {qbStatus?.connected?"Reconnect QuickBooks":"Connect QuickBooks"}
          </a>
        </div>
        {qbStatus?.connected&&<div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <button onClick={bootstrapQB} disabled={syncing} style={{padding:"8px 18px",background:"#2CA01C",border:"none",color:"#fff",borderRadius:8,fontSize:13,fontWeight:600,cursor:syncing?"default":"pointer"}}>{syncing?"Working…":"⇣ Initialize from QuickBooks"}</button>
          <button onClick={syncQB} disabled={syncing} style={{padding:"7px 16px",background:"#4f8ef718",border:"1px solid #4f8ef740",color:syncing?"#64748b":"#4f8ef7",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{syncing?"Syncing…":"↻ Sync Balances Now"}</button>
          <div style={{fontSize:11.5,color:"#64748b",flex:"1 1 100%",marginTop:6}}>
            <b>Initialize</b> activates the current month, creates a reconciliation row for every Asset / Liability / Equity account in your QB, pulls current P&amp;L / BS / CF, and then sweeps every month / quarter / year from 2024-01-01 through today so historical reports and prior-period reconciliations populate. Safe to re-run.
          </div>
        </div>}
        {syncMsg&&<div style={{marginTop:14,padding:"10px 14px",borderRadius:8,fontSize:12,fontFamily:"'DM Mono',monospace",background:syncMsg.kind==="ok"?"#4fd9a018":"#f8717118",border:`1px solid ${syncMsg.kind==="ok"?"#4fd9a040":"#f8717140"}`,color:syncMsg.kind==="ok"?"#4fd9a0":"#f87171"}}>{syncMsg.text}</div>}
      </div>}

      {settingsTab==="groups"&&<div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Custom Report Groups</div>
            <div style={{fontSize:11.5,color:"#64748b",marginTop:2}}>Override QuickBooks' default grouping — toggle &quot;Custom&quot; in Reports to see it applied.</div>
          </div>
          <div style={{display:"flex",gap:0,background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:8,padding:3}}>
            {[["pl","P&L"],["bs","Balance Sheet"],["cf","Cash Flow"]].map(([k,l])=>
              <button key={k} onClick={()=>setGroupRtype(k)} style={{padding:"5px 12px",border:"none",background:groupRtype===k?"#1e2d3d":"transparent",color:groupRtype===k?"#e2e8f0":"#64748b",borderRadius:5,fontSize:11.5,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{l}</button>
            )}
          </div>
        </div>

        <div style={{display:"flex",gap:8,marginBottom:20}}>
          <input value={newGroupName} onChange={e=>setNewGroupName(e.target.value)} placeholder="New group name (e.g. Strategic Initiatives)"
            style={{flex:1,padding:"8px 12px",background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:8,color:"#e2e8f0",fontSize:13,outline:"none"}}/>
          <button className="btn btn-primary" onClick={addGroup}>+ Add Group</button>
        </div>

        {groups.length===0?<div style={{padding:30,textAlign:"center",color:"#64748b",fontSize:13,fontFamily:"'DM Mono',monospace"}}>No groups yet. Create one above.</div>:
        groups.map(g=>(
          <div key={g.id} style={{padding:14,background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:10,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:600,color:"#e2e8f0",fontSize:13}}>{g.name}</div>
              <button onClick={()=>deleteGroup(g.id)} style={{background:"transparent",border:"none",color:"#f87171",cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace"}}>Delete</button>
            </div>
            <div style={{fontSize:11,color:"#64748b",marginBottom:6,fontFamily:"'DM Mono',monospace"}}>{g.accounts.length} account{g.accounts.length===1?"":"s"} · click to toggle</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:260,overflow:"auto"}}>
              {availAccounts.map(a=>{
                const on=g.accounts.includes(a);
                return <button key={a} onClick={()=>{
                  const next=on?g.accounts.filter(x=>x!==a):[...g.accounts,a];
                  saveGroupAccounts(g.id,next);
                }} style={{padding:"4px 10px",fontSize:11,borderRadius:6,border:`1px solid ${on?"#4f8ef740":"#1e2d3d"}`,background:on?"#4f8ef718":"#111827",color:on?"#4f8ef7":"#94a3b8",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{a}</button>;
              })}
              {availAccounts.length===0&&<div style={{fontSize:11,color:"#64748b",fontStyle:"italic"}}>Sync a {groupRtype.toUpperCase()} report first to see available accounts.</div>}
            </div>
          </div>
        ))}
      </div>}

      {/* ROLL FORWARD */}
      {settingsTab==="rollforward"&&(()=>{
        const [rfSrc,setRfSrc]=useState("");
        const [rfDst,setRfDst]=useState("");
        const [rfMsg,setRfMsg]=useState(null);
        async function doRollforward(){
          if(!rfSrc||!rfDst){alert("Select source and target periods.");return;}
          if(rfSrc===rfDst){alert("Source and target must be different periods.");return;}
          if(!confirm("Copy all tasks from the source period into the target period? Existing tasks in the target will not be removed."))return;
          try{
            const r=await api(`/api/periods/${rfSrc}/rollforward`,{method:"POST",body:JSON.stringify({target_period_id:parseInt(rfDst)})});
            setRfMsg({ok:true,text:`Copied ${r.copied} task${r.copied===1?"":"s"} into the target period.`});
            await loadAll();
          }catch(e){setRfMsg({ok:false,text:e.message});}
        }
        return <div style={S.card}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:4}}>Roll Forward Tasks</div>
          <div style={{fontSize:12,color:"#475569",marginBottom:20}}>Copy all tasks from a prior period into a new period to seed the close checklist.</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
            <div><div className="form-label">Source Period (copy from)</div>
              <select className="form-select" value={rfSrc} onChange={e=>setRfSrc(e.target.value)}>
                <option value="">Select…</option>{allPeriods.filter(p=>(p.period_type||"month")==="month").sort((a,b)=>b.start_date.localeCompare(a.start_date)).map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
              </select></div>
            <div><div className="form-label">Target Period (copy into)</div>
              <select className="form-select" value={rfDst} onChange={e=>setRfDst(e.target.value)}>
                <option value="">Select…</option>{allPeriods.filter(p=>(p.period_type||"month")==="month").sort((a,b)=>b.start_date.localeCompare(a.start_date)).map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
              </select></div>
          </div>
          {rfMsg&&<div style={{marginBottom:12,padding:"10px 14px",borderRadius:8,fontSize:12,background:rfMsg.ok?"#4fd9a018":"#f8717118",border:`1px solid ${rfMsg.ok?"#4fd9a040":"#f8717140"}`,color:rfMsg.ok?"#4fd9a0":"#f87171"}}>{rfMsg.text}</div>}
          <button className="btn btn-primary" onClick={doRollforward}>↻ Roll Forward</button>
        </div>;
      })()}

      {/* TEMPLATES */}
      {settingsTab==="templates"&&(()=>{
        const [tmpls,setTmpls]=useState([]);
        const [selTmpl,setSelTmpl]=useState(null);
        const [tmplTasks,setTmplTasks]=useState([]);
        const [newTmpl,setNewTmpl]=useState({name:"",period_type:"monthly",description:""});
        const [newTT,setNewTT]=useState({title:"",category_id:"",assignee_id:"",reviewer_id:"",day_target:""});
        const [applyPeriod,setApplyPeriod]=useState("");
        const [tmplMsg,setTmplMsg]=useState(null);
        useEffect(()=>{api("/api/templates").then(setTmpls).catch(()=>{});},[]);
        useEffect(()=>{if(selTmpl)api(`/api/templates/${selTmpl.id}/tasks`).then(setTmplTasks).catch(()=>{});},[selTmpl?.id]);
        async function addTmpl(){
          if(!newTmpl.name.trim()){alert("Name required.");return;}
          try{const r=await api("/api/templates",{method:"POST",body:JSON.stringify(newTmpl)});const list=await api("/api/templates");setTmpls(list);setNewTmpl({name:"",period_type:"monthly",description:""});}
          catch(e){alert(e.message);}
        }
        async function deleteTmpl(id){
          if(!confirm("Delete template?"))return;
          try{await api(`/api/templates/${id}`,{method:"DELETE"});setTmpls(prev=>prev.filter(t=>t.id!==id));if(selTmpl?.id===id)setSelTmpl(null);}
          catch(e){alert(e.message);}
        }
        async function addTT(){
          if(!newTT.title.trim()||!selTmpl){alert("Title required.");return;}
          try{await api(`/api/templates/${selTmpl.id}/tasks`,{method:"POST",body:JSON.stringify({...newTT,category_id:newTT.category_id?parseInt(newTT.category_id):null,assignee_id:newTT.assignee_id?parseInt(newTT.assignee_id):null,reviewer_id:newTT.reviewer_id?parseInt(newTT.reviewer_id):null,day_target:newTT.day_target?parseInt(newTT.day_target):null})});const tt=await api(`/api/templates/${selTmpl.id}/tasks`);setTmplTasks(tt);setNewTT({title:"",category_id:"",assignee_id:"",reviewer_id:"",day_target:""});}
          catch(e){alert(e.message);}
        }
        async function removeTT(ttid){
          await api(`/api/templates/${selTmpl.id}/tasks/${ttid}`,{method:"DELETE"});setTmplTasks(prev=>prev.filter(t=>t.id!==ttid));
        }
        async function applyTmpl(){
          if(!selTmpl||!applyPeriod){alert("Select a template and target period.");return;}
          try{const r=await api(`/api/templates/${selTmpl.id}/apply`,{method:"POST",body:JSON.stringify({period_id:parseInt(applyPeriod)})});setTmplMsg({ok:true,text:`Created ${r.created} task${r.created===1?"":"s"}.`});await loadAll();}
          catch(e){setTmplMsg({ok:false,text:e.message});}
        }
        return <div style={{display:"grid",gridTemplateColumns:"260px 1fr",gap:16}}>
          <div style={S.card}>
            <div style={{fontSize:12,fontWeight:600,color:"#94a3b8",marginBottom:12}}>Templates</div>
            {tmpls.map(t=><div key={t.id} onClick={()=>setSelTmpl(t)} style={{padding:"8px 10px",borderRadius:8,cursor:"pointer",background:selTmpl?.id===t.id?"#1e2d3d":"transparent",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,color:"#e2e8f0"}}>{t.name}</span>
              <button onClick={e=>{e.stopPropagation();deleteTmpl(t.id);}} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:12}}>✕</button>
            </div>)}
            <div style={{marginTop:12,borderTop:"1px solid #1e2d3d",paddingTop:12}}>
              <input className="form-input" placeholder="Template name" value={newTmpl.name} onChange={e=>setNewTmpl(p=>({...p,name:e.target.value}))} style={{marginBottom:6}}/>
              <select className="form-select" value={newTmpl.period_type} onChange={e=>setNewTmpl(p=>({...p,period_type:e.target.value}))} style={{marginBottom:6}}>
                <option value="monthly">Monthly</option><option value="quarterly">Quarterly</option><option value="yearly">Yearly</option>
              </select>
              <button className="btn btn-primary" style={{width:"100%",fontSize:12}} onClick={addTmpl}>+ New Template</button>
            </div>
          </div>
          <div style={S.card}>
            {!selTmpl&&<div style={{color:"#475569",fontSize:13}}>Select a template to manage its tasks.</div>}
            {selTmpl&&<>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>{selTmpl.name} — Tasks</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <select className="form-select" value={applyPeriod} onChange={e=>setApplyPeriod(e.target.value)} style={{fontSize:12,padding:"5px 8px",minWidth:130}}>
                    <option value="">Apply to period…</option>{allPeriods.filter(p=>(p.period_type||"month")==="month").sort((a,b)=>b.start_date.localeCompare(a.start_date)).map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
                  </select>
                  <button className="btn btn-primary" style={{fontSize:12,padding:"5px 12px"}} onClick={applyTmpl}>Apply</button>
                </div>
              </div>
              {tmplMsg&&<div style={{marginBottom:12,padding:"8px 12px",borderRadius:7,fontSize:12,background:tmplMsg.ok?"#4fd9a018":"#f8717118",color:tmplMsg.ok?"#4fd9a0":"#f87171"}}>{tmplMsg.text}</div>}
              {tmplTasks.map(tt=><div key={tt.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #1a2535",fontSize:12}}>
                <span style={{flex:1,color:"#e2e8f0"}}>{tt.title}</span>
                {tt.day_target&&<span style={{color:"#64748b",fontFamily:"'DM Mono',monospace"}}>Day {tt.day_target}</span>}
                <button onClick={()=>removeTT(tt.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:12}}>✕</button>
              </div>)}
              <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <input className="form-input" placeholder="Task title" value={newTT.title} onChange={e=>setNewTT(p=>({...p,title:e.target.value}))} style={{gridColumn:"1/-1"}}/>
                <select className="form-select" value={newTT.category_id} onChange={e=>setNewTT(p=>({...p,category_id:e.target.value}))}>
                  <option value="">Category…</option>{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                <input className="form-input" type="number" placeholder="Target day #" value={newTT.day_target} onChange={e=>setNewTT(p=>({...p,day_target:e.target.value}))}/>
                <select className="form-select" value={newTT.assignee_id} onChange={e=>setNewTT(p=>({...p,assignee_id:e.target.value}))}>
                  <option value="">Assignee…</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
                <select className="form-select" value={newTT.reviewer_id} onChange={e=>setNewTT(p=>({...p,reviewer_id:e.target.value}))}>
                  <option value="">Reviewer…</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
                <button className="btn btn-primary" style={{gridColumn:"1/-1",fontSize:12}} onClick={addTT}>+ Add Task to Template</button>
              </div>
            </>}
          </div>
        </div>;
      })()}

      {showAddTask&&<Modal title="Add Task" onClose={()=>setShowAddTask(false)}>
        <div className="form-group"><label className="form-label">Task Name</label><input className="form-input" value={newTask.name} onChange={e=>setNewTask(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Category</label>
          <select className="form-select" value={newTask.category_id} onChange={e=>setNewTask(p=>({...p,category_id:e.target.value}))}>
            <option value="">Select category…</option>{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Assignee</label>
          <select className="form-select" value={newTask.assignee_id} onChange={e=>setNewTask(p=>({...p,assignee_id:e.target.value}))}>
            <option value="">Select assignee…</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Reviewer</label>
          <select className="form-select" value={newTask.reviewer_id} onChange={e=>setNewTask(p=>({...p,reviewer_id:e.target.value}))}>
            <option value="">Select reviewer…</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Due Date</label><input type="date" className="form-input" value={newTask.due_date} onChange={e=>setNewTask(p=>({...p,due_date:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Notes</label><textarea className="form-input" value={newTask.notes} onChange={e=>setNewTask(p=>({...p,notes:e.target.value}))} style={{minHeight:60,resize:"vertical"}}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowAddTask(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={addTask}>Add Task</button>
        </div>
      </Modal>}
    </div>);
  }

  // ── Open Items / Issues ─────────────────────────────────────────────────────
  function OpenItems(){
    const [items,setItems]=useState([]);
    const [showNew,setShowNew]=useState(false);
    const [newItem,setNewItem]=useState({title:"",description:"",priority:"medium",assigned_to:""});
    const [busy,setBusy]=useState(false);

    const load=useCallback(async()=>{
      if(!period?.id)return;
      const r=await api(`/api/open_items?period_id=${period.id}`).catch(()=>[]);
      setItems(Array.isArray(r)?r:[]);
      setOpenIssuesCount((Array.isArray(r)?r:[]).filter(x=>x.status==="open").length);
    },[period?.id]);
    useEffect(()=>{load();},[load]);

    async function createItem(){
      if(!newItem.title.trim()){alert("Title required.");return;}
      setBusy(true);
      try{await api("/api/open_items",{method:"POST",body:JSON.stringify({...newItem,period_id:period.id,assigned_to:newItem.assigned_to?parseInt(newItem.assigned_to):null})});
        setShowNew(false);setNewItem({title:"",description:"",priority:"medium",assigned_to:""});await load();}
      catch(e){alert(e.message);}
      setBusy(false);
    }
    async function resolveItem(id){
      await api(`/api/open_items/${id}`,{method:"PATCH",body:JSON.stringify({status:"resolved"})}).catch(()=>{});await load();
    }
    async function reopenItem(id){
      await api(`/api/open_items/${id}`,{method:"PATCH",body:JSON.stringify({status:"open"})}).catch(()=>{});await load();
    }
    async function deleteItem(id){
      if(!confirm("Delete this issue?"))return;
      await api(`/api/open_items/${id}`,{method:"DELETE"}).catch(()=>{});await load();
    }
    const PC={high:"#f87171",medium:"#f7c948",low:"#64748b"};
    const open=items.filter(x=>x.status==="open");
    const resolved=items.filter(x=>x.status!=="open");
    return(<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div/>
        <button className="btn btn-primary" style={{fontSize:12}} onClick={()=>setShowNew(true)}>+ New Issue</button>
      </div>
      {[["Open",open],["Resolved",resolved]].map(([label,list])=>list.length>0&&(
        <div key={label} style={{...S.card,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:label==="Open"?"#f87171":"#4fd9a0",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase",marginBottom:10}}>{label} ({list.length})</div>
          {list.map(item=><div key={item.id} style={{padding:"10px 0",borderBottom:"1px solid #1a2535",display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:PC[item.priority]+"18",color:PC[item.priority],border:`1px solid ${PC[item.priority]}40`,fontFamily:"'DM Mono',monospace",fontWeight:700,textTransform:"uppercase"}}>{item.priority}</span>
                <span style={{fontSize:13,fontWeight:500,color:"#e2e8f0"}}>{item.title}</span>
              </div>
              {item.description&&<div style={{fontSize:12,color:"#64748b",marginBottom:4}}>{item.description}</div>}
              <div style={{fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace"}}>
                {item.assigned_to_name&&`Assigned to ${item.assigned_to_name} · `}
                {new Date(item.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"})}
                {item.resolved_at&&` · Resolved ${new Date(item.resolved_at).toLocaleDateString("en-US",{month:"short",day:"numeric"})}`}
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              {item.status==="open"
                ?<button onClick={()=>resolveItem(item.id)} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #4fd9a040",background:"#4fd9a018",color:"#4fd9a0",fontSize:11,cursor:"pointer"}}>Resolve</button>
                :<button onClick={()=>reopenItem(item.id)} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #1e2d3d",background:"transparent",color:"#64748b",fontSize:11,cursor:"pointer"}}>Reopen</button>}
              {isAdmin&&<button onClick={()=>deleteItem(item.id)} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #f8717140",background:"#f8717118",color:"#f87171",fontSize:11,cursor:"pointer"}}>✕</button>}
            </div>
          </div>)}
        </div>
      ))}
      {items.length===0&&<div style={{...S.card,textAlign:"center",color:"#475569",fontSize:13}}>No issues logged for {period?.label}. 🎉</div>}
      {showNew&&<Modal title="New Issue" onClose={()=>setShowNew(false)}>
        <div className="form-group"><label className="form-label">Title</label><input className="form-input" value={newItem.title} onChange={e=>setNewItem(p=>({...p,title:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Description</label><textarea className="form-input" value={newItem.description} onChange={e=>setNewItem(p=>({...p,description:e.target.value}))} style={{minHeight:60,resize:"vertical"}}/></div>
        <div className="form-group"><label className="form-label">Priority</label>
          <select className="form-select" value={newItem.priority} onChange={e=>setNewItem(p=>({...p,priority:e.target.value}))}>
            <option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
          </select></div>
        <div className="form-group"><label className="form-label">Assign To</label>
          <select className="form-select" value={newItem.assigned_to} onChange={e=>setNewItem(p=>({...p,assigned_to:e.target.value}))}>
            <option value="">Unassigned</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowNew(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={createItem} disabled={busy}>Create Issue</button>
        </div>
      </Modal>}
    </div>);
  }

  // ── Journal Entries ─────────────────────────────────────────────────────────
  function JournalEntries(){
    const [jes,setJes]=useState([]);
    const [showNew,setShowNew]=useState(false);
    const [newJE,setNewJE]=useState({je_number:"",description:"",debit_account:"",credit_account:"",amount:"",notes:"",reviewer_id:""});
    const [busy,setBusy]=useState(false);

    const load=useCallback(async()=>{
      if(!period?.id)return;
      const r=await api(`/api/journal_entries?period_id=${period.id}`).catch(()=>[]);
      setJes(Array.isArray(r)?r:[]);
    },[period?.id]);
    useEffect(()=>{load();},[load]);

    async function createJE(){
      if(!newJE.description.trim()){alert("Description required.");return;}
      setBusy(true);
      try{await api("/api/journal_entries",{method:"POST",body:JSON.stringify({...newJE,period_id:period.id,amount:newJE.amount?parseFloat(newJE.amount):null,reviewer_id:newJE.reviewer_id?parseInt(newJE.reviewer_id):null})});
        setShowNew(false);setNewJE({je_number:"",description:"",debit_account:"",credit_account:"",amount:"",notes:"",reviewer_id:""});await load();}
      catch(e){alert(e.message);}
