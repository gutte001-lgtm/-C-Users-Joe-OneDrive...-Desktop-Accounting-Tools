<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloseTool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d1117;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d1117}::-webkit-scrollbar-thumb{background:#1e2d3d;border-radius:3px}
    select{appearance:none;-webkit-appearance:none}select option{background:#111827}
    input,textarea,select{font-family:inherit}
    .modal-overlay{position:fixed;inset:0;background:#0009;z-index:200;display:flex;align-items:center;justify-content:center}
    .modal-box{background:#111827;border:1px solid #1e2d3d;border-radius:16px;padding:28px;width:460px;max-height:85vh;overflow-y:auto}
    .form-group{margin-bottom:14px}
    .form-label{font-size:11px;color:#64748b;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
    .form-input{width:100%;background:#0d1117;border:1px solid #1e2d3d;border-radius:8px;color:#e2e8f0;padding:9px 12px;font-size:13px;outline:none;transition:border-color .15s}
    .form-input:focus{border-color:#4f8ef7}
    .form-select{width:100%;background:#0d1117;border:1px solid #1e2d3d;border-radius:8px;color:#e2e8f0;padding:9px 12px;font-size:13px;outline:none}
    .btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn-primary{background:#4f8ef7;color:#fff}
    .btn-success{background:#4fd9a018;border:1px solid #4fd9a040;color:#4fd9a0}
    .btn-danger{background:#f8717118;border:1px solid #f8717140;color:#f87171}
    .btn-ghost{background:#1e2d3d;border:1px solid #334155;color:#94a3b8}
    .tag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;font-weight:600}
    .tag-admin{background:#4f8ef718;color:#4f8ef7;border:1px solid #4f8ef730}
    .tag-user{background:#1e2d3d;color:#64748b;border:1px solid #334155}
    tr:hover td{background:#1a2535 !important}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

let _csrfToken="";
async function api(path,opts={}){
  const method=(opts.method||"GET").toUpperCase();
  const headers={"Content-Type":"application/json",...(opts.headers||{})};
  if(["POST","PATCH","PUT","DELETE"].includes(method)&&_csrfToken){
    headers["X-CSRF-Token"]=_csrfToken;
  }
  const res=await fetch(path,{credentials:"include",...opts,headers});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`HTTP ${res.status}`)}
  const data=await res.json();
  if(data&&data.csrf_token)_csrfToken=data.csrf_token;
  return data;
}
function fmt(n){if(n==null)return"—";return"$"+parseFloat(n).toLocaleString("en-US",{minimumFractionDigits:2})}
function fmtDate(d){if(!d)return"—";return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}

const SC={complete:{label:"Complete",color:"#4fd9a0",bg:"rgba(79,217,160,.12)"},in_progress:{label:"In Progress",color:"#f7c948",bg:"rgba(247,201,72,.12)"},open:{label:"Open",color:"#94a3b8",bg:"rgba(148,163,184,.1)"}};
const RC={approved:{label:"Approved",color:"#4fd9a0",icon:"✓"},pending:{label:"Pending Review",color:"#94a3b8",icon:"○"},needs_revision:{label:"Needs Revision",color:"#f87171",icon:"!"}};
const XC={reconciled:{label:"Reconciled",color:"#4fd9a0"},needs_attention:{label:"Variance",color:"#f87171"},open:{label:"Open",color:"#94a3b8"}};

function Avatar({user,size=28}){
  if(!user)return null;
  const color=user.color||user.assignee_color||"#64748b";
  const init=user.initials||user.assignee_initials||"?";
  return <span style={{width:size,height:size,borderRadius:"50%",background:color+"22",border:`1.5px solid ${color}55`,color,fontSize:size*.38,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace",flexShrink:0}}>{init}</span>;
}
function Badge({status,type="status"}){
  const cfg=type==="review"?RC[status]:type==="recon"?XC[status]:SC[status];
  if(!cfg)return null;
  return <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,color:cfg.color,background:cfg.bg||cfg.color+"15",border:`1px solid ${cfg.color}30`,letterSpacing:.3,fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>{type==="review"?cfg.icon+" ":""}{cfg.label}</span>;
}
function ProgressBar({pct,color}){
  return <div style={{height:4,borderRadius:2,background:"#1e2d3d",overflow:"hidden",marginTop:6}}><div style={{height:"100%",width:Math.min(pct||0,100)+"%",background:color,borderRadius:2,transition:"width .6s ease"}}/></div>;
}
function Spinner(){return <div style={{color:"#64748b",padding:40,textAlign:"center",fontFamily:"'DM Mono',monospace"}}>Loading…</div>}
function Modal({title,onClose,children}){
  return <div className="modal-overlay" onClick={onClose}><div className="modal-box" onClick={e=>e.stopPropagation()}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
      <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{title}</div>
      <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>×</button>
    </div>
    {children}
  </div></div>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
// NOTE: Login screen removed intentionally. See AGENTS.md before re-adding auth.
function CloseApp(){
  const [currentUser,setCurrentUser]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [period,setPeriod]=useState(null);
  const [tasks,setTasks]=useState([]);
  const [recons,setRecons]=useState([]);
  const [dash,setDash]=useState(null);
  const [users,setUsers]=useState([]);
  const [cats,setCats]=useState([]);
  const [selectedTask,setSelectedTask]=useState(null);
  const [filterUser,setFilterUser]=useState(null);
  const [filterCat,setFilterCat]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [loading,setLoading]=useState(true);
  const [qbToast,setQbToast]=useState(()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get("qb")==="connected"){window.history.replaceState({},"","/");return {kind:"connected"};}
    if(p.get("qb")==="error"){const reason=p.get("reason")||"";window.history.replaceState({},"","/");return {kind:"error",reason};}
    return null;
  });
  const qbErrorMessage=(reason)=>{
    const map={
      missing_credentials:"QB_CLIENT_ID / QB_CLIENT_SECRET are not set in .env.",
      missing_code:"Intuit didn't return an authorization code.",
      missing_state:"Intuit didn't return the state parameter.",
      state_mismatch:"State mismatch — the auth flow was interrupted. Try again.",
      token_response_not_json:"Intuit returned a non-JSON response at token exchange.",
      token_response_incomplete:"Intuit's token response was missing access/refresh token.",
    };
    if(map[reason])return map[reason];
    if(reason&&reason.startsWith("token_exchange_"))return `Intuit rejected the token exchange (HTTP ${reason.slice("token_exchange_".length)}). Check QB_CLIENT_SECRET and that QB_REDIRECT_URI matches your Intuit app settings.`;
    if(reason&&reason.startsWith("intuit_"))return `Intuit returned an error: ${reason.slice("intuit_".length)}.`;
    if(reason&&reason.startsWith("network:"))return `Network error contacting Intuit (${reason.slice("network:".length)}).`;
    return "QuickBooks connection failed. Try again.";
  };

  const isAdmin=currentUser?.role==="admin";

  useEffect(()=>{
    api("/api/auth/me").then(u=>setCurrentUser(u)).catch(()=>setCurrentUser({id:0,name:"Guest",initials:"?",role:"admin",color:"#4f8ef7"}));
  },[]);

  const [allPeriods,setAllPeriods]=useState([]);
  const loadAll=useCallback(async()=>{
    setLoading(true);
    try{
      const [p,u,c,ps]=await Promise.all([api("/api/periods/active"),api("/api/users"),api("/api/categories"),api("/api/periods")]);
      setPeriod(p);setUsers(u);setCats(c);setAllPeriods(ps);
      const [t,r,d]=await Promise.all([api(`/api/tasks?period_id=${p.id}`),api(`/api/reconciliations?period_id=${p.id}`),api(`/api/dashboard?period_id=${p.id}`)]);
      setTasks(t);setRecons(r);setDash(d);
    }catch(e){console.error(e);}
    setLoading(false);
  },[]);

  useEffect(()=>{if(currentUser)loadAll();},[currentUser,loadAll]);

  async function switchClosePeriod(pid){
    if(!pid||pid===period?.id)return;
    try{
      await api(`/api/periods/${pid}/activate`,{method:"POST"});
      const [p,ps]=await Promise.all([api("/api/periods/active"),api("/api/periods")]);
      setPeriod(p);setAllPeriods(ps);
      const [t,r,d]=await Promise.all([api(`/api/tasks?period_id=${p.id}`),api(`/api/reconciliations?period_id=${p.id}`),api(`/api/dashboard?period_id=${p.id}`)]);
      setTasks(t);setRecons(r);setDash(d);
    }catch(e){alert(e.message);}
  }
  async function closeActivePeriod(){
    if(!period?.id)return;
    if(!confirm(`Mark "${period.label}" as closed? The active close period will advance to the next unclosed month. (You can reopen it later.)`))return;
    try{
      const r=await api(`/api/periods/${period.id}/close`,{method:"POST"});
      const next=r.active;
      const [ps]=await Promise.all([api("/api/periods")]);
      setAllPeriods(ps);
      if(next){
        setPeriod(next);
        const [t,rr,d]=await Promise.all([api(`/api/tasks?period_id=${next.id}`),api(`/api/reconciliations?period_id=${next.id}`),api(`/api/dashboard?period_id=${next.id}`)]);
        setTasks(t);setRecons(rr);setDash(d);
      }
    }catch(e){alert(e.message);}
  }

  async function patchTask(id,patch){
    try{
      const updated=await api(`/api/tasks/${id}`,{method:"PATCH",body:JSON.stringify(patch)});
      setTasks(prev=>prev.map(t=>t.id===id?{...t,...updated}:t));
      if(selectedTask?.id===id)setSelectedTask(prev=>({...prev,...updated}));
      const d=await api(`/api/dashboard?period_id=${period.id}`);setDash(d);
    }catch(e){alert(e.message);}
  }

  async function patchRecon(id,patch){
    try{const updated=await api(`/api/reconciliations/${id}`,{method:"PATCH",body:JSON.stringify(patch)});setRecons(prev=>prev.map(r=>r.id===id?{...r,...updated}:r));}
    catch(e){alert(e.message);}
  }

  const [syncMsg,setSyncMsg]=useState(null);
  async function syncQB(){
    setSyncing(true);setSyncMsg(null);
    try{
      const res=await api("/api/qb/sync",{method:"POST"});
      const r=await api(`/api/reconciliations?period_id=${period?.id}`);setRecons(r);
      if(res.ok===false)setSyncMsg({kind:"error",text:res.error||"Sync failed"});
      else setSyncMsg({kind:"ok",text:`Synced ${res.total||0} balance-sheet accounts · ${res.created||0} created, ${res.updated||0} updated`});
    }
    catch(e){setSyncMsg({kind:"error",text:e.message});}
    setSyncing(false);
  }
  async function bootstrapQB(){
    if(!confirm("This will activate the current month, pull your QuickBooks chart of accounts, create reconciliation rows for every balance-sheet account, and sync P&L / BS / CF. Continue?"))return;
    setSyncing(true);setSyncMsg(null);
    try{
      const res=await api("/api/qb/bootstrap",{method:"POST"});
      if(!res.ok){setSyncMsg({kind:"error",text:res.error||"Bootstrap failed"});}
      else{
        const a=res.accounts||{};
        setSyncMsg({kind:"ok",text:`Ready. ${a.created||0} new accounts, ${a.updated||0} existing updated, P&L/BS/CF synced.`});
      }
      const p=await api("/api/periods/active").catch(()=>null);
      if(p)setPeriod(p);
      if(p?.id){
        const [r,d]=await Promise.all([api(`/api/reconciliations?period_id=${p.id}`),api(`/api/dashboard?period_id=${p.id}`)]);
        setRecons(r);setDash(d);
      }
    }catch(e){setSyncMsg({kind:"error",text:e.message});}
    setSyncing(false);
  }

  const filteredTasks=tasks.filter(t=>(!filterUser||t.assignee_id===filterUser||t.reviewer_id===filterUser)&&(!filterCat||t.category_id===filterCat));
  const groupedTasks=cats.reduce((acc,c)=>{const ct=filteredTasks.filter(t=>t.category_id===c.id);if(ct.length)acc[c.name]={cat:c,tasks:ct};return acc},{});

  const S={
    app:{minHeight:"100vh",background:"#0d1117",color:"#e2e8f0",display:"flex"},
    sidebar:{width:230,background:"#111827",borderRight:"1px solid #1e2d3d",padding:"24px 0",display:"flex",flexDirection:"column",gap:4,flexShrink:0},
    main:{flex:1,overflow:"auto",padding:"28px 32px"},
    card:{background:"#111827",border:"1px solid #1e2d3d",borderRadius:12,padding:"18px 22px"},
    kpiGrid:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24},
    th:{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase",padding:"8px 12px",borderBottom:"1px solid #1e2d3d",textAlign:"left",fontWeight:500},
    td:{padding:"11px 12px",borderBottom:"1px solid #0d1117",fontSize:13.5,verticalAlign:"middle"},
    filterBar:{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"},
    filterBtn:(a)=>({padding:"5px 12px",borderRadius:20,border:`1px solid ${a?"#4f8ef7":"#1e2d3d"}`,background:a?"#4f8ef718":"transparent",color:a?"#4f8ef7":"#64748b",fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}),
    navBtn:(a)=>({padding:"9px 20px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",border:"none",background:a?"#1e2d3d":"transparent",color:a?"#e2e8f0":"#64748b",fontSize:13.5,fontWeight:a?600:400,borderLeft:a?"2px solid #4f8ef7":"2px solid transparent",textAlign:"left",width:"100%",transition:"all .15s"}),
    sel:(color)=>({background:color+"15",color,border:`1px solid ${color}40`,borderRadius:12,padding:"2px 8px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Mono',monospace",appearance:"none"}),
  };

  if(!currentUser)return <div style={{minHeight:"100vh",background:"#0d1117",display:"flex",alignItems:"center",justifyContent:"center",color:"#475569",fontFamily:"'DM Mono',monospace"}}>Loading…</div>;

  // ── Dashboard ───────────────────────────────────────────────────────────────
  function Dashboard(){
    if(!dash)return <Spinner/>;
    const TARGET_DAYS=7;
    let daysValue="—",daysSub="No active period",daysColor="#64748b",daysPct=0;
    if(period?.end_date){
      const end=new Date(period.end_date+"T00:00:00");
      const today=new Date();today.setHours(0,0,0,0);
      let bd=0;
      for(let d=new Date(end);d<today;d.setDate(d.getDate()+1)){
        const dow=d.getDay();if(dow!==0&&dow!==6)bd++;
      }
      daysValue=String(bd);
      daysSub=`Target: ${TARGET_DAYS} business days`;
      daysColor=bd>TARGET_DAYS?"#f87171":bd>=TARGET_DAYS-1?"#f7c948":"#4fd9a0";
      daysPct=Math.min(Math.round(bd/TARGET_DAYS*100),100);
    }
    const kpis=[
      {label:"Close Progress",value:dash.close_pct+"%",sub:`${dash.tasks_complete} of ${dash.tasks_total} tasks`,color:"#4f8ef7",pct:dash.close_pct},
      {label:"Approved",value:dash.approval_pct+"%",sub:`${dash.tasks_approved} reviewed & signed`,color:"#4fd9a0",pct:dash.approval_pct},
      {label:"Reconciliations",value:dash.recon_pct+"%",sub:`${dash.recon_done} of ${dash.recon_total} accounts`,color:"#c084fc",pct:dash.recon_pct},
      {label:"Days to Close",value:daysValue,sub:daysSub,color:daysColor,pct:daysPct},
    ];
    return(<div>
      <div style={S.kpiGrid}>{kpis.map(k=>(
        <div key={k.label} style={S.card}>
          <div style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase"}}>{k.label}</div>
          <div style={{fontSize:32,fontWeight:800,color:k.color,lineHeight:1.1,margin:"6px 0 4px"}}>{k.value}</div>
          <div style={{fontSize:11.5,color:"#64748b"}}>{k.sub}</div>
          <ProgressBar pct={k.pct} color={k.color}/>
        </div>
      ))}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={S.card}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:14}}>Progress by Team Member</div>
          {dash.by_user.filter(u=>u.tasks_total>0).map(u=>{
            const pct=u.tasks_total?Math.round(u.tasks_complete/u.tasks_total*100):0;
            return(<div key={u.id} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><Avatar user={u} size={24}/><span style={{fontSize:13}}>{u.name}</span></div>
                <span style={{fontSize:12,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{u.tasks_complete}/{u.tasks_total}</span>
              </div>
              <div style={{height:5,background:"#1e2d3d",borderRadius:3}}><div style={{height:"100%",width:pct+"%",background:u.color,borderRadius:3,transition:"width .5s"}}/></div>
            </div>);
          })}
        </div>
        <div style={S.card}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:14}}>Progress by Category</div>
          {dash.by_category.filter(c=>c.tasks_total>0).map(c=>{
            const pct=Math.round(c.tasks_complete/c.tasks_total*100);
            const col=pct===100?"#4fd9a0":pct>50?"#4f8ef7":"#f7c948";
            return(<div key={c.id} style={{marginBottom:11}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13}}>{c.name}</span><span style={{fontSize:12,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{pct}%</span></div>
              <div style={{height:5,background:"#1e2d3d",borderRadius:3}}><div style={{height:"100%",width:pct+"%",background:col,borderRadius:3}}/></div>
            </div>);
          })}
        </div>
      </div>
      <div style={{...S.card,marginTop:16}}>
        <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:12}}>Needs Attention</div>
        {dash.attention.length===0&&<div style={{fontSize:13,color:"#475569"}}>All clear! 🎉</div>}
        {dash.attention.map(t=>(
          <div key={t.id} onClick={()=>{const full=tasks.find(x=>x.id===t.id);if(full){setSelectedTask(full);setTab("checklist");}}}
            style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid #1a2535",cursor:"pointer"}}>
            <span style={{color:"#f87171",fontSize:12}}>⚠</span>
            <span style={{fontSize:13,flex:1}}>{t.name}</span>
            <span style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{t.category_name}</span>
            <Badge status={t.review_status} type="review"/>
          </div>
        ))}
      </div>
    </div>);
  }

  // ── Checklist ───────────────────────────────────────────────────────────────
  function Checklist(){
    if(loading)return <Spinner/>;
    const canEdit=(t)=>isAdmin||t.assignee_id===currentUser.id||t.reviewer_id===currentUser.id;
    return(<div>
      <div style={S.filterBar}>
        <button style={S.filterBtn(!filterUser&&!filterCat)} onClick={()=>{setFilterUser(null);setFilterCat(null);}}>All</button>
        {users.map(u=><button key={u.id} style={S.filterBtn(filterUser===u.id)} onClick={()=>setFilterUser(filterUser===u.id?null:u.id)}>{u.initials}</button>)}
        <span style={{width:1,background:"#1e2d3d",margin:"0 4px",height:20,display:"inline-block"}}/>
        {cats.map(c=><button key={c.id} style={S.filterBtn(filterCat===c.id)} onClick={()=>setFilterCat(filterCat===c.id?null:c.id)}>{c.name}</button>)}
      </div>
      {Object.entries(groupedTasks).map(([catName,{tasks:ct}])=>(
        <div key={catName} style={{...S.card,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:700,color:"#4f8ef7",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase"}}>{catName}</span>
            <span style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{ct.filter(t=>t.status==="complete").length}/{ct.length} complete</span>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["Task","Assignee","Due","Status","Reviewer","Review"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>{ct.map(t=>(
              <tr key={t.id} style={{cursor:"pointer"}} onClick={()=>setSelectedTask(t)}>
                <td style={{...S.td,fontWeight:500}}>{t.notes&&<span style={{color:"#f7c948",marginRight:6,fontSize:11}}>●</span>}{t.name}</td>
                <td style={S.td}><Avatar user={{initials:t.assignee_initials,color:t.assignee_color}}/></td>
                <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{fmtDate(t.due_date)}</td>
                <td style={S.td}>
                  {canEdit(t)
                    ?<select value={t.status} style={S.sel(SC[t.status]?.color||"#94a3b8")} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();patchTask(t.id,{status:e.target.value});}}>
                      <option value="open">Open</option><option value="in_progress">In Progress</option><option value="complete">Complete</option>
                    </select>
                    :<Badge status={t.status}/>}
                </td>
                <td style={S.td}><Avatar user={{initials:t.reviewer_initials,color:"#64748b"}}/></td>
                <td style={S.td}>
                  {(isAdmin||t.reviewer_id===currentUser.id)
                    ?<select value={t.review_status} style={S.sel(RC[t.review_status]?.color||"#94a3b8")} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();patchTask(t.id,{review_status:e.target.value});}}>
                      <option value="pending">Pending Review</option><option value="approved">Approved</option><option value="needs_revision">Needs Revision</option>
                    </select>
                    :<Badge status={t.review_status} type="review"/>}
                </td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      ))}
    </div>);
  }

  // ── Reconciliations ─────────────────────────────────────────────────────────
  function Reconciliations(){
    const [reconPeriods,setReconPeriods]=useState([]);
    const [reconPeriodId,setReconPeriodId]=useState(null);
    const [reconBusy,setReconBusy]=useState(false);
    const [reconErr,setReconErr]=useState(null);

    useEffect(()=>{
      const months=allPeriods.filter(p=>(p.period_type||"month")==="month")
                             .sort((a,b)=>b.start_date.localeCompare(a.start_date));
      setReconPeriods(months);
    },[allPeriods]);

    // Follow the global close period by default; user can still override.
    useEffect(()=>{
      if(period?.id&&reconPeriodId!==period.id)setReconPeriodId(period.id);
    },[period?.id]);

    useEffect(()=>{
      if(!reconPeriodId)return;
      api(`/api/reconciliations?period_id=${reconPeriodId}`).then(setRecons).catch(e=>setReconErr(e.message));
    },[reconPeriodId]);

    const selPeriod=reconPeriods.find(p=>p.id===reconPeriodId)||period;
    const stale=selPeriod?.end_date&&((new Date()-new Date(selPeriod.end_date+"T00:00:00"))/86400000>60);

    async function syncThisPeriod(){
      if(!reconPeriodId)return;
      setReconBusy(true);setReconErr(null);setSyncMsg(null);
      try{
        const r=await api("/api/qb/sync_reports",{method:"POST",body:JSON.stringify({period_id:reconPeriodId,types:["bs"],derive_recons:true})});
        if(!r.ok){
          const msgs=Object.entries(r.results||{}).filter(([_,v])=>!v.ok).map(([t,v])=>`${t.toUpperCase()}: ${v.error||"unknown"}`).join(" · ");
          setReconErr(msgs||"Sync failed");
        }else{
          const rc=r.recons||{};
          setSyncMsg({kind:"ok",text:`Synced ${selPeriod?.label||"period"} · ${rc.created||0} new accounts, ${rc.updated||0} updated`});
        }
        const rr=await api(`/api/reconciliations?period_id=${reconPeriodId}`);setRecons(rr);
      }catch(e){setReconErr(e.message);}
      setReconBusy(false);
    }

    if(loading&&!reconPeriods.length)return <Spinner/>;
    return(<div style={S.card}>
      {stale&&!reconBusy&&<div style={{padding:"10px 14px",marginBottom:14,borderRadius:8,background:"#f59e0b18",border:"1px solid #f59e0b40",color:"#f59e0b",fontSize:12.5,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span>⚠ Period "{selPeriod?.label}" ended more than 60 days ago — QB Balance shows ending balances as of {selPeriod?.end_date}. To refresh, click <b>↻ Sync This Period</b>.</span>
      </div>}
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,gap:10,flexWrap:"wrap",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Account Reconciliations</div>
          <div style={{fontSize:11.5,color:"#64748b",marginTop:2}}>Synced from QuickBooks Online · {selPeriod?.label||"—"}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <label style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>PERIOD</label>
          <select value={reconPeriodId||""} onChange={e=>setReconPeriodId(parseInt(e.target.value))}
            style={{padding:"6px 10px",background:"#111827",border:"1px solid #1e2d3d",color:"#e2e8f0",borderRadius:7,fontSize:12,fontFamily:"'DM Mono',monospace",minWidth:140}}>
            {reconPeriods.map(p=><option key={p.id} value={p.id}>{p.label}{p.is_active?" ●":""}</option>)}
          </select>
          {isAdmin&&recons.length===0&&qbStatus?.connected&&<button onClick={bootstrapQB} disabled={syncing||reconBusy} style={{padding:"6px 14px",background:"#2CA01C",border:"none",color:"#fff",borderRadius:8,fontSize:12,fontWeight:600,cursor:syncing?"default":"pointer"}}>{syncing?"Working…":"⇣ Initialize from QuickBooks"}</button>}
          {isAdmin&&qbStatus?.connected&&<button onClick={syncThisPeriod} disabled={reconBusy||syncing} title="Pull this period's Balance Sheet from QuickBooks and derive account balances" style={{padding:"6px 14px",background:"#4f8ef718",border:"1px solid #4f8ef740",color:(reconBusy||syncing)?"#64748b":"#4f8ef7",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{reconBusy?"Syncing…":"↻ Sync This Period"}</button>}
        </div>
      </div>
      {reconErr&&<div style={{marginBottom:14,padding:"10px 14px",borderRadius:8,fontSize:12,fontFamily:"'DM Mono',monospace",background:"#f8717118",border:"1px solid #f8717140",color:"#f87171"}}>{reconErr}</div>}
      {syncMsg&&<div style={{marginBottom:14,padding:"10px 14px",borderRadius:8,fontSize:12,fontFamily:"'DM Mono',monospace",background:syncMsg.kind==="ok"?"#4fd9a018":"#f8717118",border:`1px solid ${syncMsg.kind==="ok"?"#4fd9a040":"#f8717140"}`,color:syncMsg.kind==="ok"?"#4fd9a0":"#f87171"}}>{syncMsg.text}</div>}
      {recons.length===0&&<div style={{padding:30,textAlign:"center",color:"#64748b",fontSize:13,fontFamily:"'DM Mono',monospace"}}>
        {qbStatus?.connected?`No reconciliations for ${selPeriod?.label||"this period"}. Click ↻ Sync This Period to pull it from QuickBooks.`:"Connect QuickBooks in Settings, then Initialize."}
      </div>}
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>{["Account","QB Balance","Expected","Variance","Assignee","Status","Updated"].map((h,i)=><th key={h} style={{...S.th,textAlign:i>=1&&i<=3?"right":"left"}}>{h}</th>)}</tr></thead>
        <tbody>{recons.map(r=>{
          const variance=r.expected_balance!=null?r.qb_balance-r.expected_balance:null;
          const vc=variance===0?"#4fd9a0":variance!=null?"#f87171":"#475569";
          return(<tr key={r.id}>
            <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12.5}}>{r.account_number} – {r.account_name}</td>
            <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5}}>{fmt(r.qb_balance)}</td>
            <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5}}>
              <input type="text" defaultValue={r.expected_balance!=null?r.expected_balance:""} placeholder="—"
                onBlur={e=>{const v=parseFloat(e.target.value.replace(/[$,]/g,""));if(!isNaN(v))patchRecon(r.id,{expected_balance:v});}}
                style={{background:"transparent",border:"none",color:"#e2e8f0",fontFamily:"'DM Mono',monospace",fontSize:12.5,textAlign:"right",width:110,outline:"none",borderBottom:"1px dashed #1e2d3d"}}/>
            </td>
            <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5,color:vc,fontWeight:variance!==0&&variance!=null?700:400}}>{variance!=null?(variance===0?"—":fmt(Math.abs(variance))):"—"}</td>
            <td style={S.td}><Avatar user={{initials:r.assignee_initials,color:r.assignee_color}}/></td>
            <td style={S.td}>
              <select value={r.status} style={S.sel(XC[r.status]?.color||"#94a3b8")} onChange={e=>patchRecon(r.id,{status:e.target.value})}>
                <option value="open">Open</option><option value="needs_attention">Variance</option><option value="reconciled">Reconciled</option>
              </select>
            </td>
            <td style={{...S.td,fontSize:12,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{r.last_updated_at?new Date(r.last_updated_at).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"—"}</td>
          </tr>);
        })}</tbody>
      </table>
    </div>);
  }

  // ── Task Modal ──────────────────────────────────────────────────────────────
  function TaskModal(){
    const [notes,setNotes]=useState(selectedTask?.notes||"");
    const [editMode,setEditMode]=useState(false);
    const [editData,setEditData]=useState({});
    useEffect(()=>{setNotes(selectedTask?.notes||"");setEditMode(false);},[selectedTask?.id]);
    if(!selectedTask)return null;
    const t=selectedTask;
    const assignee=users.find(u=>u.id===t.assignee_id);
    const reviewer=users.find(u=>u.id===t.reviewer_id);
    const canEdit=isAdmin||t.assignee_id===currentUser.id||t.reviewer_id===currentUser.id;

    async function saveEdit(){
      await patchTask(t.id,{...editData,notes});
      setEditMode(false);setEditData({});

    return(<div style={{position:"fixed",inset:0,background:"#0008",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setSelectedTask(null)}>
      <div style={{background:"#111827",border:"1px solid #1e2d3d",borderRadius:16,width:520,padding:28,maxHeight:"80vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
          <div>
            <div style={{fontSize:11,color:"#4f8ef7",fontFamily:"'DM Mono',monospace",marginBottom:4}}>{t.category_name}</div>
            {editMode&&isAdmin
              ?<input className="form-input" defaultValue={t.name} onChange={e=>setEditData(p=>({...p,name:e.target.value}))} style={{fontSize:15,fontWeight:700,width:"100%"}}/>
              :<div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{t.name}</div>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
            {isAdmin&&!editMode&&<button onClick={()=>setEditMode(true)} className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}}>Edit</button>}
            <button onClick={()=>setSelectedTask(null)} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>×</button>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
            <div className="form-label">Assigned To</div>
            {editMode&&isAdmin
              ?<select className="form-select" defaultValue={t.assignee_id} onChange={e=>setEditData(p=>({...p,assignee_id:parseInt(e.target.value)}))}>
                {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
              :<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><Avatar user={assignee}/>{assignee?.name}</div>}
          </div>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
            <div className="form-label">Reviewer</div>
            {editMode&&isAdmin
              ?<select className="form-select" defaultValue={t.reviewer_id} onChange={e=>setEditData(p=>({...p,reviewer_id:parseInt(e.target.value)}))}>
                {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
              :<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><Avatar user={reviewer}/>{reviewer?.name}</div>}
          </div>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
            <div className="form-label">Due Date</div>
            {editMode&&isAdmin
              ?<input type="date" className="form-input" defaultValue={t.due_date||""} onChange={e=>setEditData(p=>({...p,due_date:e.target.value}))}/>
              :<span style={{fontFamily:"'DM Mono',monospace",fontSize:13}}>{fmtDate(t.due_date)}</span>}
          </div>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}>
            <div className="form-label">Category</div>
            {editMode&&isAdmin
              ?<select className="form-select" defaultValue={t.category_id} onChange={e=>setEditData(p=>({...p,category_id:parseInt(e.target.value)}))}>
                {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              :<span style={{fontSize:13}}>{t.category_name}</span>}
          </div>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}><div className="form-label">Status</div><Badge status={t.status}/></div>
          <div style={{background:"#0d1117",borderRadius:8,padding:"10px 12px"}}><div className="form-label">Review</div><Badge status={t.review_status} type="review"/></div>
        </div>

        <div style={{marginBottom:14}}>
          <div className="form-label">Notes</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Add notes or comments…" disabled={!canEdit}
            style={{width:"100%",background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:8,color:"#e2e8f0",padding:"10px 12px",fontSize:13,resize:"vertical",minHeight:80,fontFamily:"'DM Sans',sans-serif",opacity:canEdit?1:.6}}/>
        </div>

        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          {editMode&&isAdmin&&<><button onClick={()=>{setEditMode(false);setEditData({});}} className="btn btn-ghost">Cancel</button><button onClick={saveEdit} className="btn btn-primary">Save Changes</button></>}
          {!editMode&&canEdit&&<>
            <button onClick={()=>patchTask(t.id,{notes}).then(()=>setSelectedTask(null))} className="btn btn-ghost">Save Note</button>
            <button onClick={()=>patchTask(t.id,{status:"complete",notes}).then(()=>setSelectedTask(null))} className="btn btn-success">Mark Complete</button>
            {(isAdmin||t.reviewer_id===currentUser.id)&&<button onClick={()=>patchTask(t.id,{review_status:"approved",notes}).then(()=>setSelectedTask(null))} className="btn btn-primary">Approve ✓</button>}
          </>}
        </div>
      </div>
    </div>);
  }

  // ── Settings (Admin Only) ───────────────────────────────────────────────────
  function Settings(){
    const [settingsTab,setSettingsTab]=useState("users");
    const [showAddUser,setShowAddUser]=useState(false);
    const [showAddCat,setShowAddCat]=useState(false);
    const [showAddTask,setShowAddTask]=useState(false);
    const [editUser,setEditUser]=useState(null);
    const [editCat,setEditCat]=useState(null);

    // Add User Form
    const [newUser,setNewUser]=useState({name:"",initials:"",email:"",role:"preparer",color:"#4f8ef7"});
    async function addUser(){
      try{await api("/api/users",{method:"POST",body:JSON.stringify(newUser)});await loadAll();setShowAddUser(false);setNewUser({name:"",initials:"",email:"",role:"preparer",color:"#4f8ef7"});}
      catch(e){alert(e.message);}
    }
    async function deleteUser(id){
      if(!confirm("Delete this user?"))return;
      try{await api(`/api/users/${id}`,{method:"DELETE"});await loadAll();}catch(e){alert(e.message);}
    }
    async function saveEditUser(){
      try{await api(`/api/users/${editUser.id}`,{method:"PATCH",body:JSON.stringify(editUser)});await loadAll();setEditUser(null);}
      catch(e){alert(e.message);}
    }

    // Add Category Form
    const [newCat,setNewCat]=useState({name:"",sort_order:99});
    async function addCat(){
      try{await api("/api/categories",{method:"POST",body:JSON.stringify(newCat)});await loadAll();setShowAddCat(false);setNewCat({name:"",sort_order:99});}
      catch(e){alert(e.message);}
    }
    async function deleteCat(id){
      if(!confirm("Delete this category?"))return;
      try{await api(`/api/categories/${id}`,{method:"DELETE"});await loadAll();}catch(e){alert(e.message);}
    }
    async function saveEditCat(){
      try{await api(`/api/categories/${editCat.id}`,{method:"PATCH",body:JSON.stringify(editCat)});await loadAll();setEditCat(null);}
      catch(e){alert(e.message);}
    }

    // Add Task Form
    const [newTask,setNewTask]=useState({name:"",category_id:"",assignee_id:"",reviewer_id:"",due_date:"",notes:""});
    async function addTask(){
      if(!newTask.name||!newTask.category_id||!newTask.assignee_id||!newTask.reviewer_id){alert("Name, category, assignee, and reviewer are required.");return;}
      try{
        await api("/api/tasks",{method:"POST",body:JSON.stringify({...newTask,period_id:period.id,category_id:parseInt(newTask.category_id),assignee_id:parseInt(newTask.assignee_id),reviewer_id:parseInt(newTask.reviewer_id)})});
        await loadAll();setShowAddTask(false);setNewTask({name:"",category_id:"",assignee_id:"",reviewer_id:"",due_date:"",notes:""});
      }catch(e){alert(e.message);}
    }
    async function deleteTask(id){
      if(!confirm("Delete this task?"))return;
      try{await api(`/api/tasks/${id}`,{method:"DELETE"});await loadAll();}catch(e){alert(e.message);}
    }

    const [qbStatus,setQbStatus]=useState(null);
    useEffect(()=>{api("/api/qb/status").then(s=>setQbStatus(s)).catch(()=>{});},[]);

    const stabs=["users","categories","tasks","quickbooks","groups"];

    // Report Groups state (loaded lazily when groups tab opens)
    const [groupRtype,setGroupRtype]=useState("pl");
    const [groups,setGroups]=useState([]);
    const [newGroupName,setNewGroupName]=useState("");
    const [availAccounts,setAvailAccounts]=useState([]);
    async function loadGroups(){
      try{
        const g=await api(`/api/report_groups?report_type=${groupRtype}`);
        setGroups(g);
        const period=await api("/api/periods/active").catch(()=>null);
        if(period?.id){
          const rep=await api(`/api/reports/${groupRtype}?period_id=${period.id}&auto_compare=0`).catch(()=>({lines:[]}));
          const names=[...new Set((rep.lines||[]).filter(l=>!l.is_subtotal).map(l=>l.account_name))].sort();
          setAvailAccounts(names);
        }
      }catch(e){}

    async function addGroup(){
      if(!newGroupName.trim())return;
      try{await api("/api/report_groups",{method:"POST",body:JSON.stringify({name:newGroupName.trim(),report_type:groupRtype,sort_order:groups.length})});setNewGroupName("");await loadGroups();}
      catch(e){alert(e.message);}

      </div>

        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>

        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Name","Email","Role","Color","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{users.map(u=>(
            <tr key={u.id}>
              <td style={S.td}><div style={{display:"flex",alignItems:"center",gap:8}}><Avatar user={u} size={26}/><span style={{fontWeight:500}}>{u.name}</span></div></td>
              <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{u.email||"—"}</td>
              <td style={S.td}><span className={`tag ${u.role==="admin"?"tag-admin":"tag-user"}`}>{u.role}</span></td>
              <td style={S.td}><div style={{width:22,height:22,borderRadius:6,background:u.color}}/></td>
              <td style={S.td}><div style={{display:"flex",gap:6}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setEditUser({...u})}>Edit</button>
                {u.id!==currentUser.id&&<button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteUser(u.id)}>Delete</button>}
              </div></td>
            </tr>
          ))}</tbody>
        </table>
      </div>}

      {/* CATEGORIES */}
      {settingsTab==="categories"&&<div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Categories</div>

        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Category","Sort Order","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{cats.map(c=>(
            <tr key={c.id}>
              <td style={{...S.td,fontWeight:500}}>{c.name}</td>
              <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{c.sort_order}</td>
              <td style={S.td}><div style={{display:"flex",gap:6}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setEditCat({...c})}>Edit</button>
                <button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteCat(c.id)}>Delete</button>
              </div></td>
            </tr>

        </table>

          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>All Tasks — {period?.label}</div>
          <button className="btn btn-primary" style={{fontSize:12,padding:"6px 14px"}} onClick={()=>setShowAddTask(true)}>+ Add Task</button>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Task","Category","Assignee","Due","Status","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{tasks.map(t=>(
            <tr key={t.id}>
              <td style={{...S.td,fontWeight:500,maxWidth:260}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div></td>
              <td style={{...S.td,fontSize:12,color:"#94a3b8"}}>{t.category_name}</td>

        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>

        <div className="form-group"><label className="form-label">Color</label><input type="color" value={editUser.color} onChange={e=>setEditUser(p=>({...p,color:e.target.value}))} style={{width:"100%",height:36,border:"1px solid #1e2d3d",borderRadius:8,background:"#0d1117",cursor:"pointer"}}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>

          <button className="btn btn-primary" onClick={saveEditUser}>Save Changes</button>

      {showAddCat&&<Modal title="Add Category" onClose={()=>setShowAddCat(false)}>
        <div className="form-group"><label className="form-label">Category Name</label><input className="form-input" value={newCat.name} onChange={e=>setNewCat(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Sort Order</label><input type="number" className="form-input" value={newCat.sort_order} onChange={e=>setNewCat(p=>({...p,sort_order:parseInt(e.target.value)}))}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowAddCat(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={addCat}>Add Category</button>
        </div>
      </Modal>}

      {editCat&&<Modal title="Edit Category" onClose={()=>setEditCat(null)}>
        <div className="form-group"><label className="form-label">Category Name</label><input className="form-input" value={editCat.name} onChange={e=>setEditCat(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Sort Order</label><input type="number" className="form-input" value={editCat.sort_order} onChange={e=>setEditCat(p=>({...p,sort_order:parseInt(e.target.value)}))}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setEditCat(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={saveEditCat}>Save Changes</button>
        </div>
      </Modal>}

      {/* QUICKBOOKS */}
      {settingsTab==="quickbooks"&&<div style={S.card}>
        <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:4}}>QuickBooks Online</div>
        <div style={{fontSize:12,color:"#475569",marginBottom:20}}>Connect your QuickBooks Online account to sync account balances automatically.</div>
        <div style={{display:"flex",alignItems:"center",gap:16,padding:"16px 20px",background:"#0d1117",borderRadius:10,border:"1px solid #1e2d3d",marginBottom:16}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0",marginBottom:3}}>Connection Status</div>
            {qbStatus===null&&<div style={{fontSize:12,color:"#64748b"}}>Checking…</div>}
            {qbStatus?.connected&&<div style={{fontSize:12,color:"#4fd9a0"}}>✓ Connected · token expires in {Math.round((qbStatus.token_expires_in||0)/60)} min</div>}
            {qbStatus&&!qbStatus.connected&&<div style={{fontSize:12,color:"#f87171"}}>Not connected</div>}
          </div>
          <a href="/api/qb/connect" style={{padding:"8px 18px",background:"#2CA01C",color:"#fff",borderRadius:8,fontSize:13,fontWeight:600,textDecoration:"none",display:"inline-block"}}>
            {qbStatus?.connected?"Reconnect QuickBooks":"Connect QuickBooks"}
          </a>
        </div>
        {qbStatus?.connected&&<div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <button onClick={bootstrapQB} disabled={syncing} style={{padding:"8px 18px",background:"#2CA01C",border:"none",color:"#fff",borderRadius:8,fontSize:13,fontWeight:600,cursor:syncing?"default":"pointer"}}>{syncing?"Working…":"⇣ Initialize from QuickBooks"}</button>
          <button onClick={syncQB} disabled={syncing} style={{padding:"7px 16px",background:"#4f8ef718",border:"1px solid #4f8ef740",color:syncing?"#64748b":"#4f8ef7",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{syncing?"Syncing…":"↻ Sync Balances Now"}</button>
          <div style={{fontSize:11.5,color:"#64748b",flex:"1 1 100%",marginTop:6}}>
            <b>Initialize</b> activates the current month, creates a reconciliation row for every Asset / Liability / Equity account in your QB, pulls current P&amp;L / BS / CF, and then sweeps every month / quarter / year from 2024-01-01 through today so historical reports and prior-period reconciliations populate. Safe to re-run.
          </div>
        </div>}
        {syncMsg&&<div style={{marginTop:14,padding:"10px 14px",borderRadius:8,fontSize:12,fontFamily:"'DM Mono',monospace",background:syncMsg.kind==="ok"?"#4fd9a018":"#f8717118",border:`1px solid ${syncMsg.kind==="ok"?"#4fd9a040":"#f8717140"}`,color:syncMsg.kind==="ok"?"#4fd9a0":"#f87171"}}>{syncMsg.text}</div>}
      </div>}

      {settingsTab==="groups"&&<div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>Custom Report Groups</div>
            <div style={{fontSize:11.5,color:"#64748b",marginTop:2}}>Override QuickBooks' default grouping — toggle &quot;Custom&quot; in Reports to see it applied.</div>
          </div>
          <div style={{display:"flex",gap:0,background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:8,padding:3}}>
            {[["pl","P&L"],["bs","Balance Sheet"],["cf","Cash Flow"]].map(([k,l])=>
              <button key={k} onClick={()=>setGroupRtype(k)} style={{padding:"5px 12px",border:"none",background:groupRtype===k?"#1e2d3d":"transparent",color:groupRtype===k?"#e2e8f0":"#64748b",borderRadius:5,fontSize:11.5,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{l}</button>
            )}
          </div>
        </div>

        <div style={{display:"flex",gap:8,marginBottom:20}}>
          <input value={newGroupName} onChange={e=>setNewGroupName(e.target.value)} placeholder="New group name (e.g. Strategic Initiatives)"
            style={{flex:1,padding:"8px 12px",background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:8,color:"#e2e8f0",fontSize:13,outline:"none"}}/>
          <button className="btn btn-primary" onClick={addGroup}>+ Add Group</button>
        </div>

        {groups.length===0?<div style={{padding:30,textAlign:"center",color:"#64748b",fontSize:13,fontFamily:"'DM Mono',monospace"}}>No groups yet. Create one above.</div>:
        groups.map(g=>(
          <div key={g.id} style={{padding:14,background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:10,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:600,color:"#e2e8f0",fontSize:13}}>{g.name}</div>
              <button onClick={()=>deleteGroup(g.id)} style={{background:"transparent",border:"none",color:"#f87171",cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace"}}>Delete</button>
            </div>
            <div style={{fontSize:11,color:"#64748b",marginBottom:6,fontFamily:"'DM Mono',monospace"}}>{g.accounts.length} account{g.accounts.length===1?"":"s"} · click to toggle</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:260,overflow:"auto"}}>
              {availAccounts.map(a=>{
                const on=g.accounts.includes(a);
                return <button key={a} onClick={()=>{
                  const next=on?g.accounts.filter(x=>x!==a):[...g.accounts,a];
                  saveGroupAccounts(g.id,next);
                }} style={{padding:"4px 10px",fontSize:11,borderRadius:6,border:`1px solid ${on?"#4f8ef740":"#1e2d3d"}`,background:on?"#4f8ef718":"#111827",color:on?"#4f8ef7":"#94a3b8",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{a}</button>;
              })}
              {availAccounts.length===0&&<div style={{fontSize:11,color:"#64748b",fontStyle:"italic"}}>Sync a {groupRtype.toUpperCase()} report first to see available accounts.</div>}
            </div>
          </div>
        ))}
      </div>}

      {showAddTask&&<Modal title="Add Task" onClose={()=>setShowAddTask(false)}>
        <div className="form-group"><label className="form-label">Task Name</label><input className="form-input" value={newTask.name} onChange={e=>setNewTask(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Category</label>
          <select className="form-select" value={newTask.category_id} onChange={e=>setNewTask(p=>({...p,category_id:e.target.value}))}>
            <option value="">Select category…</option>{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Assignee</label>
          <select className="form-select" value={newTask.assignee_id} onChange={e=>setNewTask(p=>({...p,assignee_id:e.target.value}))}>
            <option value="">Select assignee…</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Reviewer</label>
          <select className="form-select" value={newTask.reviewer_id} onChange={e=>setNewTask(p=>({...p,reviewer_id:e.target.value}))}>
            <option value="">Select reviewer…</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Due Date</label><input type="date" className="form-input" value={newTask.due_date} onChange={e=>setNewTask(p=>({...p,due_date:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Notes</label><textarea className="form-input" value={newTask.notes} onChange={e=>setNewTask(p=>({...p,notes:e.target.value}))} style={{minHeight:60,resize:"vertical"}}/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowAddTask(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={addTask}>Add Task</button>
        </div>
      </Modal>}
    </div>);
  }

  function Reports(){
    const [rtype,setRtype]=useState("pl");
    const [view,setView]=useState("native");
    const [periodType,setPeriodType]=useState("month");
    const [compareMode,setCompareMode]=useState("prev");
    const [periods,setPeriods]=useState([]);
    const [periodId,setPeriodId]=useState(null);
    const [compareId,setCompareId]=useState(null);
    const [data,setData]=useState(null);
    const [kpis,setKpis]=useState(null);
    const [busy,setBusy]=useState(false);
    const [err,setErr]=useState(null);
    const [drill,setDrill]=useState(null);
    const [noteLine,setNoteLine]=useState(null);

    useEffect(()=>{
      api("/api/periods").then(ps=>{
        setPeriods(ps);
        const activeMonth=ps.find(p=>p.is_active&&p.period_type==="month")||ps.find(p=>p.is_active)||ps[0];
        if(activeMonth){
          setPeriodId(activeMonth.id);
          setPeriodType(activeMonth.period_type||"month");
        }
      }).catch(e=>setErr(e.message));
    },[]);

    // Filter periods by selected type and auto-pick first on type change
    const periodsOfType=periods.filter(p=>(p.period_type||"month")===periodType)
                               .sort((a,b)=>b.start_date.localeCompare(a.start_date));
    useEffect(()=>{
      if(!periodsOfType.length)return;
      if(!periodsOfType.find(p=>p.id===periodId)){
        const active=periodsOfType.find(p=>p.is_active)||periodsOfType[0];
        setPeriodId(active.id);
      }
    },[periodType,periods.length]);
    // Auto-compute compare_id when compareMode or periodId changes (unless user overrides)
    useEffect(()=>{
      if(!periodId||compareMode==="none"){setCompareId(null);return;}
      const cur=periods.find(p=>p.id===periodId);
      if(!cur)return;
      let target=null;
      if(compareMode==="yoy"&&cur.fiscal_year){
        target=periods.find(p=>p.period_type===cur.period_type&&p.fiscal_year===cur.fiscal_year-1
          &&((cur.period_number==null&&p.period_number==null)||p.period_number===cur.period_number));
      }else if(compareMode==="prev"){
        const sameType=periods.filter(p=>p.period_type===cur.period_type&&p.start_date<cur.start_date)
          .sort((a,b)=>b.start_date.localeCompare(a.start_date));
        target=sameType[0];
      }
      setCompareId(target?target.id:null);
    },[periodId,compareMode,periods.length]);

    async function loadReport(){
      if(!periodId)return;
      setBusy(true);setErr(null);
      try{
        const qs=new URLSearchParams({period_id:periodId,view});
        if(compareId)qs.set("compare_to",compareId);else qs.set("auto_compare","0");
        const r=await api(`/api/reports/${rtype}?${qs}`);
        setData(r);
      }catch(e){setErr(e.message);}
      setBusy(false);
    }
    async function loadKpis(){
      if(!periodId)return;
      try{const r=await api(`/api/reports/kpis?period_id=${periodId}`);setKpis(r.kpis);}catch(e){setKpis(null);}
    }
    useEffect(()=>{loadReport();},[rtype,periodId,compareId,view]);
    useEffect(()=>{loadKpis();},[periodId]);

    async function syncFromQB(){
      if(!periodId)return;
      setBusy(true);setErr(null);
      try{
        const r=await api("/api/qb/sync_reports",{method:"POST",body:JSON.stringify({period_id:periodId,types:[rtype]})});
        if(!r.ok){
          const msgs=Object.entries(r.results||{}).filter(([_,v])=>!v.ok).map(([t,v])=>`${t.toUpperCase()}: ${v.error||"unknown"}`).join(" · ");
          setErr(msgs||"Sync failed");
        }
        await loadReport();await loadKpis();
      }catch(e){setErr(e.message);}
      setBusy(false);
    }
    async function syncHistory(){
      if(!confirm("Pull every P&L / Balance Sheet / Cash Flow from QuickBooks for every month, quarter, and year from 2024-01-01 through today, AND derive reconciliations from each month's Balance Sheet. This can take 1–3 minutes. Continue?"))return;
      setBusy(true);setErr(null);
      try{
        const r=await api("/api/qb/sync_history",{method:"POST",body:JSON.stringify({start_date:"2024-01-01"})});
        await loadReport();await loadKpis();
        const errTxt=r.errors&&r.errors.length?`\n\n${r.errors.length} soft error(s) — first few:\n${r.errors.slice(0,5).join("\n")}`:"";
        alert(`History synced through ${r.end_date}.\n${r.periods} periods · P&L ${r.pl} · BS ${r.bs} · CF ${r.cf}\nReconciliations: ${r.recons_created} created, ${r.recons_updated} updated.${errTxt}`);
      }catch(e){setErr(e.message);}
      setBusy(false);
    }

    function exportReport(fmt){
      const qs=new URLSearchParams({period_id:periodId,view,format:fmt});
      if(compareId)qs.set("compare_to",compareId);else qs.set("auto_compare","0");
      window.location.href=`/api/reports/${rtype}/export?${qs}`;
    }

    const lines=data?.lines||[];
    const hasCompare=!!data?.compare;
    const title={pl:"Profit & Loss",bs:"Balance Sheet",cf:"Cash Flow"}[rtype];

    function varColor(v,name){
      if(v==null||v===0)return "#64748b";
      const isExpense=/expense|cost|cogs/i.test(name||"");
      const favorable=isExpense?v<0:v>0;
      return favorable?"#4fd9a0":"#f87171";
    }

    async function saveNote(){
      if(!noteLine)return;
      try{
        await api("/api/flux_notes",{method:"POST",body:JSON.stringify({
          period_id:periodId,report_type:rtype,account_name:noteLine.account_name,note:noteLine._draft||""
        })});
        setNoteLine(null);await loadReport();
      }catch(e){alert(e.message);}
    }

    async function openDrill(l){
      if(l.is_subtotal||!data?.period)return;
      setDrill({account_name:l.account_name,loading:true,txns:[],cols:[]});
      try{
        const qs=new URLSearchParams({period_id:periodId,account_name:l.account_name});
        if(l.account_id)qs.set("account_id",l.account_id);
        const r=await api(`/api/qb/transactions?${qs}`);
        setDrill({account_name:l.account_name,loading:false,txns:r.transactions||[],cols:r.columns||[]});
      }catch(e){setDrill({account_name:l.account_name,loading:false,error:e.message,txns:[],cols:[]});}
    }

    const kpiBox=(label,val,sub,color)=>
      <div style={{flex:"1 1 150px",minWidth:150,padding:"14px 16px",background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:10}}>
        <div style={{fontSize:10.5,color:"#64748b",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase"}}>{label}</div>
        <div style={{fontSize:18,fontWeight:700,color:color||"#e2e8f0",marginTop:4,fontFamily:"'DM Mono',monospace"}}>{val}</div>
        {sub&&<div style={{fontSize:10.5,color:"#64748b",marginTop:2,fontFamily:"'DM Mono',monospace"}}>{sub}</div>}
      </div>;
    const pct=v=>v==null?"—":(v>0?"+":"")+v+"%";
    const ratio=v=>v==null?"—":v.toFixed(2);

    return(<div>
      <div style={{display:"flex",gap:0,marginBottom:20,background:"#111827",border:"1px solid #1e2d3d",borderRadius:10,padding:4,width:"fit-content"}}>
        {[["pl","Profit & Loss"],["bs","Balance Sheet"],["cf","Cash Flow"]].map(([k,l])=>
          <button key={k} onClick={()=>setRtype(k)} style={{padding:"7px 18px",borderRadius:7,border:"none",background:rtype===k?"#1e2d3d":"transparent",color:rtype===k?"#e2e8f0":"#64748b",fontSize:13,cursor:"pointer",fontWeight:rtype===k?600:400}}>{l}</button>
        )}
      </div>

      {kpis&&<div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>
        {kpiBox("Revenue",fmt(kpis.revenue))}
        {kpiBox("Gross Margin",kpis.gross_margin_pct!=null?kpis.gross_margin_pct+"%":"—",kpis.gross_profit!=null?fmt(kpis.gross_profit):null,"#4fd9a0")}
        {kpiBox("Operating Margin",kpis.operating_margin_pct!=null?kpis.operating_margin_pct+"%":"—",kpis.operating_expenses!=null?"Opex "+fmt(kpis.operating_expenses):null)}
        {kpiBox("Net Income",fmt(kpis.net_income),kpis.net_margin_pct!=null?kpis.net_margin_pct+"% margin":null,(kpis.net_income||0)>=0?"#4fd9a0":"#f87171")}
        {kpiBox("Current Ratio",ratio(kpis.current_ratio),kpis.working_capital!=null?"WC "+fmt(kpis.working_capital):null)}
        {kpiBox("Quick Ratio",ratio(kpis.quick_ratio))}
        {kpiBox("Debt / Equity",ratio(kpis.debt_to_equity))}
        {kpiBox("Cash",fmt(kpis.cash),kpis.total_assets!=null?"Assets "+fmt(kpis.total_assets):null,"#4f8ef7")}
      </div>}

      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#e2e8f0"}}>{title}</div>
            <div style={{fontSize:11.5,color:"#64748b",marginTop:2,fontFamily:"'DM Mono',monospace"}}>
              {data?.pulled_at?`Pulled from QB ${new Date(data.pulled_at).toLocaleString()}`:"Not yet synced from QuickBooks"}
            </div>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{display:"flex",background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:7,padding:3}}>
              {[["month","MTD"],["quarter","QTD"],["year","YTD"]].map(([k,l])=>
                <button key={k} onClick={()=>setPeriodType(k)} style={{padding:"4px 10px",border:"none",background:periodType===k?"#1e2d3d":"transparent",color:periodType===k?"#e2e8f0":"#64748b",borderRadius:5,fontSize:11,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{l}</button>
              )}
            </div>
            <div style={{display:"flex",background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:7,padding:3}}>
              {[["native","QB"],["custom","Custom"]].map(([k,l])=>
                <button key={k} onClick={()=>setView(k)} style={{padding:"4px 10px",border:"none",background:view===k?"#1e2d3d":"transparent",color:view===k?"#e2e8f0":"#64748b",borderRadius:5,fontSize:11,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{l}</button>
              )}
            </div>
            <label style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>PERIOD</label>
            <select value={periodId||""} onChange={e=>setPeriodId(parseInt(e.target.value))}
              style={{padding:"6px 10px",background:"#111827",border:"1px solid #1e2d3d",color:"#e2e8f0",borderRadius:7,fontSize:12,fontFamily:"'DM Mono',monospace",minWidth:140}}>
              {periodsOfType.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
            </select>
            <label style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>vs</label>
            <select value={compareMode} onChange={e=>setCompareMode(e.target.value)}
              style={{padding:"6px 10px",background:"#111827",border:"1px solid #1e2d3d",color:"#e2e8f0",borderRadius:7,fontSize:12,fontFamily:"'DM Mono',monospace"}}>
              <option value="prev">Prior period</option>
              <option value="yoy">Prior year</option>
              <option value="none">No compare</option>
            </select>
            <button onClick={()=>exportReport("xlsx")} disabled={!lines.length} style={{padding:"6px 14px",background:"#4fd9a018",border:"1px solid #4fd9a040",color:"#4fd9a0",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>⇩ Excel</button>
            <button onClick={()=>exportReport("csv")} disabled={!lines.length} style={{padding:"6px 14px",background:"#1a2535",border:"1px solid #1e2d3d",color:"#94a3b8",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>⇩ CSV</button>
            {isAdmin&&<button onClick={syncFromQB} disabled={busy} style={{padding:"6px 14px",background:"#4f8ef718",border:"1px solid #4f8ef740",color:busy?"#64748b":"#4f8ef7",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{busy?"Syncing…":"↻ Sync from QB"}</button>}
            {isAdmin&&<button onClick={syncHistory} disabled={busy} title="Pull P&L / BS / CF + derive recons for every month, quarter, and year from 2024-01-01 through today" style={{padding:"6px 14px",background:"#2CA01C18",border:"1px solid #2CA01C40",color:busy?"#64748b":"#2CA01C",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{busy?"Working…":"⇣ Sync History"}</button>}
          </div>
        </div>

        {err&&<div style={{padding:10,background:"#f8717118",border:"1px solid #f8717140",color:"#f87171",borderRadius:8,fontSize:12,marginBottom:12,fontFamily:"'DM Mono',monospace"}}>{err}</div>}

        {lines.length===0?<div style={{padding:40,textAlign:"center",color:"#64748b",fontFamily:"'DM Mono',monospace",fontSize:13}}>
          {busy?"Loading…":"No data. Click ↻ Sync from QB to pull this report."}
        </div>:
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={{...S.th,textAlign:"left"}}>Account</th>
            <th style={{...S.th,textAlign:"right"}}>{data?.period?.label||"Current"}</th>
            {hasCompare&&<th style={{...S.th,textAlign:"right"}}>{data.compare.label}</th>}
            {hasCompare&&<th style={{...S.th,textAlign:"right"}}>Variance $</th>}
            {hasCompare&&<th style={{...S.th,textAlign:"right"}}>Variance %</th>}
            <th style={{...S.th,textAlign:"center",width:40}}>Note</th>
          </tr></thead>
          <tbody>{lines.map((l,i)=>{
            const isSub=l.is_subtotal===1;
            const canDrill=!isSub&&rtype!=="cf";
            const nameStyle={...S.td,paddingLeft:12+(l.depth||0)*14,fontWeight:isSub?700:400,color:isSub?"#e2e8f0":"#94a3b8",fontSize:12.5,borderTop:isSub?"1px solid #1e2d3d":"none",cursor:canDrill?"pointer":"default"};
            const numStyle={...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5,fontWeight:isSub?700:400,color:isSub?"#e2e8f0":"#94a3b8",borderTop:isSub?"1px solid #1e2d3d":"none"};
            const vc=varColor(l.variance,l.account_name);
            const hasNote=!!(l.flux_note&&l.flux_note.length);
            return(<tr key={i} style={isSub?{background:"#0f172a55"}:{}}>
              <td style={nameStyle} onClick={()=>canDrill&&openDrill(l)} title={canDrill?"Click for transaction detail":""}>
                {canDrill&&<span style={{color:"#475569",marginRight:6,fontSize:11}}>▸</span>}{l.account_name}
              </td>
              <td style={numStyle}>{fmt(l.amount)}</td>
              {hasCompare&&<td style={numStyle}>{l.prior_amount!=null?fmt(l.prior_amount):"—"}</td>}
              {hasCompare&&<td style={{...numStyle,color:l.variance!=null?vc:"#475569"}}>{l.variance!=null?fmt(l.variance):"—"}</td>}
              {hasCompare&&<td style={{...numStyle,color:l.variance_pct!=null?vc:"#475569"}}>{l.variance_pct!=null?(l.variance_pct>0?"+":"")+l.variance_pct+"%":"—"}</td>}
              <td style={{...S.td,textAlign:"center",borderTop:isSub?"1px solid #1e2d3d":"none"}}>
                {!isSub&&<button onClick={()=>setNoteLine({...l,_draft:l.flux_note||""})} title={hasNote?l.flux_note:"Add flux note"}
                  style={{background:"transparent",border:"none",color:hasNote?"#4f8ef7":"#475569",cursor:"pointer",fontSize:14}}>
                  {hasNote?"✎":"+"}
                </button>}
              </td>
            </tr>);
          })}</tbody>
        </table>}
      </div>

      {drill&&<Modal title={`Transactions — ${drill.account_name}`} onClose={()=>setDrill(null)}>
        {drill.loading?<div style={{padding:30,textAlign:"center",color:"#64748b",fontFamily:"'DM Mono',monospace"}}>Loading from QB…</div>:
         drill.error?<div style={{padding:20,color:"#f87171",fontSize:12,fontFamily:"'DM Mono',monospace"}}>{drill.error}</div>:
         drill.txns.length===0?<div style={{padding:30,textAlign:"center",color:"#64748b",fontSize:12,fontFamily:"'DM Mono',monospace"}}>No transactions in this period.</div>:
         <div style={{maxHeight:"60vh",overflow:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{drill.cols.map(c=><th key={c} style={{...S.th,textAlign:"left",position:"sticky",top:0,background:"#0f172a"}}>{c}</th>)}</tr></thead>
            <tbody>{drill.txns.map((t,i)=><tr key={i}>{drill.cols.map(c=><td key={c} style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:11.5,color:"#94a3b8"}}>{t[c]||"—"}</td>)}</tr>)}</tbody>
          </table>
         </div>
        }
      </Modal>}

      {noteLine&&<Modal title={`Flux Note — ${noteLine.account_name}`} onClose={()=>setNoteLine(null)}>
        <div style={{fontSize:12,color:"#64748b",fontFamily:"'DM Mono',monospace",marginBottom:10}}>
          {data?.period?.label} · {fmt(noteLine.amount)} {hasCompare&&noteLine.prior_amount!=null&&` vs. ${fmt(noteLine.prior_amount)} (${noteLine.variance_pct!=null?(noteLine.variance_pct>0?"+":"")+noteLine.variance_pct+"%":"—"})`}
        </div>
        <textarea value={noteLine._draft||""} onChange={e=>setNoteLine({...noteLine,_draft:e.target.value})}
          placeholder="Explain the variance — drivers, one-time items, seasonality, mix, etc."
          style={{width:"100%",minHeight:120,padding:10,background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:8,color:"#e2e8f0",fontSize:13,fontFamily:"inherit",resize:"vertical",outline:"none"}}/>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:10}}>
          <button className="btn btn-ghost" onClick={()=>setNoteLine(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={saveNote}>Save</button>
        </div>
      </Modal>}
    </div>);
  }

  const navItems=[
    {id:"dashboard",label:"Dashboard",icon:"⬡"},
    {id:"checklist",label:"Close Checklist",icon:"☑"},
    {id:"recons",label:"Reconciliations",icon:"⇌"},
    {id:"reports",label:"Reports",icon:"◨"},
    ...(isAdmin?[{id:"settings",label:"Settings",icon:"⚙"}]:[]),
  ];

  return(<div style={S.app}>
    {qbToast&&<div style={{position:"fixed",top:20,right:20,zIndex:999,padding:"12px 20px",borderRadius:10,fontSize:13,fontWeight:600,background:qbToast.kind==="connected"?"#4fd9a018":"#f8717118",border:`1px solid ${qbToast.kind==="connected"?"#4fd9a040":"#f8717140"}`,color:qbToast.kind==="connected"?"#4fd9a0":"#f87171",maxWidth:420,lineHeight:1.4}}>
      {qbToast.kind==="connected"?"✓ QuickBooks connected successfully!":<span>✗ {qbErrorMessage(qbToast.reason)}{qbToast.reason&&<span style={{display:"block",fontWeight:400,fontSize:11,opacity:0.7,marginTop:3,fontFamily:"'DM Mono',monospace"}}>reason: {qbToast.reason}</span>}</span>}
      <button onClick={()=>setQbToast(null)} style={{marginLeft:12,background:"none",border:"none",color:"inherit",cursor:"pointer",fontSize:16}}>×</button>
    </div>}
    <div style={S.sidebar}>
      <div style={{padding:"0 20px 20px",borderBottom:"1px solid #1e2d3d",marginBottom:8}}>
        <div style={{fontSize:17,fontWeight:800,color:"#fff",letterSpacing:-0.5}}>CloseTool<span style={{fontSize:10,background:"#4f8ef722",color:"#4f8ef7",border:"1px solid #4f8ef740",padding:"1px 6px",borderRadius:4,fontFamily:"'DM Mono',monospace",marginLeft:6}}>QB</span></div>
        <div style={{fontSize:11,color:"#475569",marginTop:4}}>{period?.label||"Loading…"}</div>
      </div>
      <div style={{margin:"0 12px 8px",padding:"8px 12px",background:"#1a2535",border:"1px solid #1e2d3d",borderRadius:8}}>
        <div style={{fontSize:10,color:"#475569",marginBottom:4,fontFamily:"'DM Mono',monospace",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>CLOSE PERIOD</span>
          {period&&(period.is_closed?<span style={{color:"#4fd9a0"}}>✓ CLOSED</span>:<span style={{color:"#f7c948"}}>OPEN</span>)}
        </div>
        {isAdmin?
          <select value={period?.id||""} onChange={e=>switchClosePeriod(parseInt(e.target.value))}
            style={{width:"100%",padding:"4px 6px",background:"#0f172a",border:"1px solid #1e2d3d",color:"#e2e8f0",borderRadius:6,fontSize:12.5,fontWeight:600,fontFamily:"'DM Sans',sans-serif",outline:"none",cursor:"pointer"}}>
            {allPeriods.filter(p=>(p.period_type||"month")==="month")
              .sort((a,b)=>b.start_date.localeCompare(a.start_date))
              .map(p=><option key={p.id} value={p.id}>{p.label}{p.is_closed?" ✓":""}{p.is_active?" ●":""}</option>)}
          </select>
          :<div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>{period?.label}</div>}
        <div style={{marginTop:6,height:3,background:"#1e2d3d",borderRadius:2}}><div style={{height:"100%",width:(dash?.close_pct||0)+"%",background:"#4f8ef7",borderRadius:2}}/></div>
        <div style={{fontSize:10,color:"#4f8ef7",marginTop:3}}>{dash?.close_pct||0}% complete</div>
        {isAdmin&&period&&!period.is_closed&&<button onClick={closeActivePeriod} title="Mark this period closed and advance to the next unclosed month"
          style={{marginTop:8,width:"100%",padding:"5px 8px",background:"#4fd9a018",border:"1px solid #4fd9a040",color:"#4fd9a0",borderRadius:6,fontSize:11,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>✓ Close This Period</button>}
      </div>
      {navItems.map(n=><button key={n.id} style={S.navBtn(tab===n.id)} onClick={()=>setTab(n.id)}><span style={{fontSize:15}}>{n.icon}</span>{n.label}</button>)}
      <div style={{marginTop:"auto",padding:"16px 20px",borderTop:"1px solid #1e2d3d"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <Avatar user={currentUser} size={28}/>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"#94a3b8"}}>{currentUser.name}</div>
            <span className={`tag ${currentUser.role==="admin"?"tag-admin":"tag-user"}`}>{currentUser.role}</span>
          </div>
        </div>
      </div>
    </div>

    <div style={S.main}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:"#f1f5f9",letterSpacing:-0.5}}>{navItems.find(n=>n.id===tab)?.label}</div>
          <div style={{fontSize:13,color:"#64748b",marginTop:3}}>
            {tab==="dashboard"&&`${period?.label} · ${dash?.tasks_complete||0}/${dash?.tasks_total||0} tasks complete`}
            {tab==="checklist"&&`${filteredTasks.length} tasks · Click any row to open detail`}
            {tab==="recons"&&`${dash?.recon_done||0}/${dash?.recon_total||0} accounts reconciled`}
            {tab==="reports"&&"Financial reports pulled live from QuickBooks"}
            {tab==="settings"&&"Admin only — manage team, categories, and tasks"}
          </div>
        </div>
      </div>
      {tab==="dashboard"&&<Dashboard/>}
      {tab==="checklist"&&<Checklist/>}
      {tab==="recons"&&<Reconciliations/>}
      {tab==="reports"&&<Reports/>}
      {tab==="settings"&&isAdmin&&<Settings/>}
    </div>
    {selectedTask&&<TaskModal/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<CloseApp/>);
</script>
</body>
</html>
