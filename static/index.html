<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloseTool</title>
  <script>
    // Diagnostics: if the page renders blank, surface why. Sets a flag when
    // each CDN dep finishes loading; if any is still missing when the Babel
    // script should have run, or an uncaught error fires, paint a visible
    // message in #root instead of leaving the user staring at a black page.
    window.__closetool_diag = {react:false, reactDom:false, babel:false, mounted:false, cdnFailed:[]};
    function __ct_showDiag(title, detail){
      var root = document.getElementById("root");
      if(!root || window.__closetool_diag.mounted) return;
      root.innerHTML = ""
        + "<div style=\"padding:24px 28px;background:#0d1117;color:#f87171;font-family:'DM Mono',monospace;font-size:13px;line-height:1.55;min-height:100vh\">"
        + "<div style=\"font-size:16px;font-weight:700;margin-bottom:12px\">&#9888; CloseTool failed to load</div>"
        + "<div style=\"color:#e2e8f0;margin-bottom:10px\"></div>"
        + "<pre style=\"background:#111827;padding:12px;border-radius:8px;color:#94a3b8;font-size:12px;white-space:pre-wrap;overflow:auto;max-height:320px\"></pre>"
        + "<div style=\"color:#64748b;margin-top:14px;font-size:12px\">Open DevTools &rarr; Console for the full stack. If the three CDN scripts (react, react-dom, babel-standalone) are blocked by your network, the page can't render.</div>"
        + "</div>";
      root.querySelector("div:nth-child(2)").textContent = title || "Unknown error";
      root.querySelector("pre").textContent = detail || "";
    }
    window.addEventListener("error", function(e){
      if(window.__closetool_diag.mounted) return;
      var msg = e.message || "Script error";
      var src = (e.error && e.error.stack) || (e.filename ? (e.filename + ":" + e.lineno + ":" + e.colno) : "");
      __ct_showDiag(msg, src);
    });
    window.addEventListener("unhandledrejection", function(e){
      if(window.__closetool_diag.mounted) return;
      var r = e.reason;
      __ct_showDiag("Unhandled promise rejection: " + (r && r.message || r), (r && r.stack) || "");
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
          onload="window.__closetool_diag.react=true"
          onerror="window.__closetool_diag.cdnFailed.push('react'); __ct_showDiag('Failed to load React from cdnjs.cloudflare.com','The CDN script tag for react.production.min.js failed. Check your internet connection or corporate firewall.')"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"
          onload="window.__closetool_diag.reactDom=true"
          onerror="window.__closetool_diag.cdnFailed.push('react-dom'); __ct_showDiag('Failed to load ReactDOM from cdnjs.cloudflare.com','The CDN script tag for react-dom.production.min.js failed. Check your internet connection or corporate firewall.')"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"
          onload="window.__closetool_diag.babel=true"
          onerror="window.__closetool_diag.cdnFailed.push('babel'); __ct_showDiag('Failed to load Babel-standalone from cdnjs.cloudflare.com','The CDN script tag for babel.min.js failed. Check your internet connection or corporate firewall.')"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d1117;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d1117}::-webkit-scrollbar-thumb{background:#1e2d3d;border-radius:3px}
    select{appearance:none;-webkit-appearance:none}select option{background:#111827}
    input,textarea,select{font-family:inherit}
    .modal-overlay{position:fixed;inset:0;background:#0009;z-index:200;display:flex;align-items:center;justify-content:center}
    .modal-box{background:#111827;border:1px solid #1e2d3d;border-radius:16px;padding:28px;width:460px;max-height:85vh;overflow-y:auto}
    .form-group{margin-bottom:14px}
    .form-label{font-size:11px;color:#64748b;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
    .form-input{width:100%;background:#0d1117;border:1px solid #1e2d3d;border-radius:8px;color:#e2e8f0;padding:9px 12px;font-size:13px;outline:none;transition:border-color .15s}
    .form-input:focus{border-color:#4f8ef7}
    .form-select{width:100%;background:#0d1117;border:1px solid #1e2d3d;border-radius:8px;color:#e2e8f0;padding:9px 12px;font-size:13px;outline:none}
    .btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn-primary{background:#4f8ef7;color:#fff}
    .btn-success{background:#4fd9a018;border:1px solid #4fd9a040;color:#4fd9a0}
    .btn-danger{background:#f8717118;border:1px solid #f8717140;color:#f87171}
    .btn-ghost{background:#1e2d3d;border:1px solid #334155;color:#94a3b8}
    .tag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;font-weight:600}
    .tag-admin{background:#4f8ef718;color:#4f8ef7;border:1px solid #4f8ef730}
    .tag-user{background:#1e2d3d;color:#64748b;border:1px solid #334155}
    tr:hover td{background:#1a2535 !important}
  </style>
</head>
<body>
<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#64748b;font-family:'DM Mono',monospace;font-size:13px">Loading CloseTool&hellip;</div></div>
<script>
  // Watchdog: if React hasn't mounted after 8s, show a diagnostic so the
  // user sees something actionable instead of a blank screen.
  setTimeout(function(){
    var d = window.__closetool_diag || {};
    if(d.mounted) return;
    var missing = [];
    if(!d.react) missing.push("react");
    if(!d.reactDom) missing.push("react-dom");
    if(!d.babel) missing.push("babel-standalone");
    if(missing.length){
      __ct_showDiag("CDN scripts did not load: " + missing.join(", "),
        "These are fetched from cdnjs.cloudflare.com. If your network blocks that host, the app cannot render.");
    } else {
      __ct_showDiag("React did not mount within 8 seconds",
        "The three CDN scripts loaded but <CloseApp/> never rendered. Check the browser console for an error from the inline <script type='text/babel'> block.");
    }
  }, 8000);
</script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// Error boundary — without this, any render error in a child collapses the
// whole tree to a blank screen. This renders the stack inline so we can see
// what went wrong in production (there is no separate dev build).
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:e};}
  componentDidCatch(e,info){console.error("ErrorBoundary caught:",e,info);this.setState({err:e,info});}
  reset=()=>this.setState({err:null,info:null});
  render(){
    if(!this.state.err)return this.props.children;
    const msg=this.state.err?.message||String(this.state.err);
    const stack=this.state.err?.stack||"";
    const compStack=this.state.info?.componentStack||"";
    return <div style={{padding:"24px 28px",background:"#0d1117",color:"#f87171",fontFamily:"'DM Mono',monospace",fontSize:12.5,lineHeight:1.5,minHeight:"100vh"}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:12}}>⚠ React crashed while rendering {this.props.label||"this tab"}</div>
      <div style={{color:"#e2e8f0",marginBottom:8}}>{msg}</div>
      {stack&&<pre style={{background:"#111827",padding:12,borderRadius:8,overflow:"auto",maxHeight:260,color:"#94a3b8",fontSize:11.5,whiteSpace:"pre-wrap"}}>{stack}</pre>}
      {compStack&&<pre style={{background:"#111827",padding:12,borderRadius:8,overflow:"auto",maxHeight:200,color:"#64748b",fontSize:11.5,whiteSpace:"pre-wrap",marginTop:10}}>{compStack}</pre>}
      <button onClick={this.reset} style={{marginTop:12,padding:"6px 14px",background:"#4f8ef718",border:"1px solid #4f8ef740",color:"#4f8ef7",borderRadius:8,fontSize:12,cursor:"pointer"}}>Try again</button>
    </div>;
  }
}

let _csrfToken="";
async function api(path,opts={}){
  const method=(opts.method||"GET").toUpperCase();
  const headers={"Content-Type":"application/json",...(opts.headers||{})};
  if(["POST","PATCH","PUT","DELETE"].includes(method)&&_csrfToken){
    headers["X-CSRF-Token"]=_csrfToken;
  }
  const res=await fetch(path,{credentials:"include",...opts,headers});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`HTTP ${res.status}`)}
  const data=await res.json();
  if(data&&data.csrf_token)_csrfToken=data.csrf_token;
  return data;
}
function fmt(n){if(n==null)return"—";return"$"+parseFloat(n).toLocaleString("en-US",{minimumFractionDigits:2})}
function fmtDate(d){if(!d)return"—";return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}

const SC={complete:{label:"Complete",color:"#4fd9a0",bg:"rgba(79,217,160,.12)"},in_progress:{label:"In Progress",color:"#f7c948",bg:"rgba(247,201,72,.12)"},open:{label:"Open",color:"#94a3b8",bg:"rgba(148,163,184,.1)"}};
const RC={approved:{label:"Approved",color:"#4fd9a0",icon:"✓"},pending:{label:"Pending Review",color:"#94a3b8",icon:"○"},needs_revision:{label:"Needs Revision",color:"#f87171",icon:"!"}};
const XC={reconciled:{label:"Reconciled",color:"#4fd9a0"},needs_attention:{label:"Variance",color:"#f87171"},open:{label:"Open",color:"#94a3b8"}};

function Avatar({user,size=28}){
  if(!user)return null;
  const color=user.color||user.assignee_color||"#64748b";
  const init=user.initials||user.assignee_initials||"?";
  return <span style={{width:size,height:size,borderRadius:"50%",background:color+"22",border:`1.5px solid ${color}55`,color,fontSize:size*.38,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace",flexShrink:0}}>{init}</span>;
}
function Badge({status,type="status"}){
  const cfg=type==="review"?RC[status]:type==="recon"?XC[status]:SC[status];
  if(!cfg)return null;
  return <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,color:cfg.color,background:cfg.bg||cfg.color+"15",border:`1px solid ${cfg.color}30`,letterSpacing:.3,fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>{type==="review"?cfg.icon+" ":""}{cfg.label}</span>;
}
function ProgressBar({pct,color}){
  return <div style={{height:4,borderRadius:2,background:"#1e2d3d",overflow:"hidden",marginTop:6}}><div style={{height:"100%",width:Math.min(pct||0,100)+"%",background:color,borderRadius:2,transition:"width .6s ease"}}/></div>;
}
function Spinner(){return <div style={{color:"#64748b",padding:40,textAlign:"center",fontFamily:"'DM Mono',monospace"}}>Loading…</div>}
function Modal({title,onClose,children}){
  return <div className="modal-overlay" onClick={onClose}><div className="modal-box" onClick={e=>e.stopPropagation()}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
      <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{title}</div>
      <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>×</button>
    </div>
    {children}
  </div></div>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
// NOTE: Login screen removed intentionally. See AGENTS.md before re-adding auth.
function CloseApp(){
  const [currentUser,setCurrentUser]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [period,setPeriod]=useState(null);
  const [tasks,setTasks]=useState([]);
  const [recons,setRecons]=useState([]);
  const [dash,setDash]=useState(null);
  const [users,setUsers]=useState([]);
  const [cats,setCats]=useState([]);
  const [selectedTask,setSelectedTask]=useState(null);
  const [filterUser,setFilterUser]=useState(null);
  const [filterCat,setFilterCat]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [loading,setLoading]=useState(true);
  const [myTasksOnly,setMyTasksOnly]=useState(false);
  const [openIssuesCount,setOpenIssuesCount]=useState(0);
  const [qbToast,setQbToast]=useState(()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get("qb")==="connected"){window.history.replaceState({},"","/");return {kind:"connected"};}
    if(p.get("qb")==="error"){const reason=p.get("reason")||"";window.history.replaceState({},"","/");return {kind:"error",reason};}
    return null;
  });
  const qbErrorMessage=(reason)=>{
    const map={
      missing_credentials:"QB_CLIENT_ID / QB_CLIENT_SECRET are not set in .env.",
      missing_code:"Intuit didn't return an authorization code.",
      missing_state:"Intuit didn't return the state parameter.",
      state_mismatch:"State mismatch — the auth flow was interrupted. Try again.",
      token_response_not_json:"Intuit returned a non-JSON response at token exchange.",
      token_response_incomplete:"Intuit's token response was missing access/refresh token.",
    };
    if(map[reason])return map[reason];
    if(reason&&reason.startsWith("token_exchange_"))return `Intuit rejected the token exchange (HTTP ${reason.slice("token_exchange_".length)}). Check QB_CLIENT_SECRET and that QB_REDIRECT_URI matches your Intuit app settings.`;
    if(reason&&reason.startsWith("intuit_"))return `Intuit returned an error: ${reason.slice("intuit_".length)}.`;
    if(reason&&reason.startsWith("network:"))return `Network error contacting Intuit (${reason.slice("network:".length)}).`;
    return "QuickBooks connection failed. Try again.";
  };

  const isAdmin=currentUser?.role==="admin";

  useEffect(()=>{
    api("/api/auth/me").then(u=>setCurrentUser(u)).catch(()=>setCurrentUser({id:0,name:"Guest",initials:"?",role:"admin",color:"#4f8ef7"}));
  },[]);

  const [allPeriods,setAllPeriods]=useState([]);
  const loadAll=useCallback(async()=>{
    setLoading(true);
    try{
      const [p,u,c,ps]=await Promise.all([api("/api/periods/active"),api("/api/users"),api("/api/categories"),api("/api/periods")]);
      setPeriod(p);setUsers(u);setCats(c);setAllPeriods(ps);
      const [t,r,d]=await Promise.all([api(`/api/tasks?period_id=${p.id}`),api(`/api/reconciliations?period_id=${p.id}`),api(`/api/dashboard?period_id=${p.id}`)]);
      setTasks(t);setRecons(r);setDash(d);
    }catch(e){console.error(e);}
    setLoading(false);
  },[]);

  useEffect(()=>{if(currentUser)loadAll();},[currentUser,loadAll]);

  async function switchClosePeriod(pid){
    if(!pid||pid===period?.id)return;
    try{
      await api(`/api/periods/${pid}/activate`,{method:"POST"});
      const [p,ps]=await Promise.all([api("/api/periods/active"),api("/api/periods")]);
      setPeriod(p);setAllPeriods(ps);
      const [t,r,d]=await Promise.all([api(`/api/tasks?period_id=${p.id}`),api(`/api/reconciliations?period_id=${p.id}`),api(`/api/dashboard?period_id=${p.id}`)]);
      setTasks(t);setRecons(r);setDash(d);
    }catch(e){alert(e.message);}
  }
  async function closeActivePeriod(){
    if(!period?.id)return;
    if(!confirm(`Mark "${period.label}" as closed? The active close period will advance to the next unclosed month. (You can reopen it later.)`))return;
    try{
      const r=await api(`/api/periods/${period.id}/close`,{method:"POST"});
      const next=r.active;
      const [ps]=await Promise.all([api("/api/periods")]);
      setAllPeriods(ps);
      if(next){
        setPeriod(next);
        const [t,rr,d]=await Promise.all([api(`/api/tasks?period_id=${next.id}`),api(`/api/reconciliations?period_id=${next.id}`),api(`/api/dashboard?period_id=${next.id}`)]);
        setTasks(t);setRecons(rr);setDash(d);
      }
    }catch(e){alert(e.message);}
  }

  async function patchTask(id,patch){
    try{
      const updated=await api(`/api/tasks/${id}`,{method:"PATCH",body:JSON.stringify(patch)});
      setTasks(prev=>prev.map(t=>t.id===id?{...t,...updated}:t));
      if(selectedTask?.id===id)setSelectedTask(prev=>({...prev,...updated}));
      const d=await api(`/api/dashboard?period_id=${period.id}`);setDash(d);
    }catch(e){alert(e.message);}
  }

  async function patchRecon(id,patch){
    try{const updated=await api(`/api/reconciliations/${id}`,{method:"PATCH",body:JSON.stringify(patch)});setRecons(prev=>prev.map(r=>r.id===id?{...r,...updated}:r));}
    catch(e){alert(e.message);}
  }

  const [syncMsg,setSyncMsg]=useState(null);
  async function syncQB(){
    setSyncing(true);setSyncMsg(null);
    try{
      const res=await api("/api/qb/sync",{method:"POST"});
      const r=await api(`/api/reconciliations?period_id=${period?.id}`);setRecons(r);
      if(res.ok===false)setSyncMsg({kind:"error",text:res.error||"Sync failed"});
      else setSyncMsg({kind:"ok",text:`Synced ${res.total||0} balance-sheet accounts · ${res.created||0} created, ${res.updated||0} updated`});
    }
    catch(e){setSyncMsg({kind:"error",text:e.message});}
    setSyncing(false);
  }
  async function bootstrapQB(){
    if(!confirm("This will activate the current month, pull your QuickBooks chart of accounts, create reconciliation rows for every balance-sheet account, and sync P&L / BS / CF. Continue?"))return;
    setSyncing(true);setSyncMsg(null);
    try{
      const res=await api("/api/qb/bootstrap",{method:"POST"});
      if(!res.ok){setSyncMsg({kind:"error",text:res.error||"Bootstrap failed"});}
      else{
        const a=res.accounts||{};
        setSyncMsg({kind:"ok",text:`Ready. ${a.created||0} new accounts, ${a.updated||0} existing updated, P&L/BS/CF synced.`});
      }
      const p=await api("/api/periods/active").catch(()=>null);
      if(p)setPeriod(p);
      if(p?.id){
        const [r,d]=await Promise.all([api(`/api/reconciliations?period_id=${p.id}`),api(`/api/dashboard?period_id=${p.id}`)]);
        setRecons(r);setDash(d);
      }
    }catch(e){setSyncMsg({kind:"error",text:e.message});}
    setSyncing(false);
  }

  const filteredTasks=tasks.filter(t=>
    (!filterUser||t.assignee_id===filterUser||t.reviewer_id===filterUser)&&
    (!filterCat||t.category_id===filterCat)&&
    (!myTasksOnly||(t.assignee_id===currentUser?.id||t.reviewer_id===currentUser?.id))
  );
  const groupedTasks=cats.reduce((acc,c)=>{const ct=filteredTasks.filter(t=>t.category_id===c.id);if(ct.length)acc[c.name]={cat:c,tasks:ct};return acc},{});

  const S={
    app:{minHeight:"100vh",background:"#0d1117",color:"#e2e8f0",display:"flex"},
    sidebar:{width:230,background:"#111827",borderRight:"1px solid #1e2d3d",padding:"24px 0",display:"flex",flexDirection:"column",gap:4,flexShrink:0},
    main:{flex:1,overflow:"auto",padding:"28px 32px"},
    card:{background:"#111827",border:"1px solid #1e2d3d",borderRadius:12,padding:"18px 22px"},
    kpiGrid:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:24},
    th:{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase",padding:"8px 12px",borderBottom:"1px solid #1e2d3d",textAlign:"left",fontWeight:500},
    td:{padding:"11px 12px",borderBottom:"1px solid #0d1117",fontSize:13.5,verticalAlign:"middle"},
    filterBar:{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"},
    filterBtn:(a)=>({padding:"5px 12px",borderRadius:20,border:`1px solid ${a?"#4f8ef7":"#1e2d3d"}`,background:a?"#4f8ef718":"transparent",color:a?"#4f8ef7":"#64748b",fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}),
    navBtn:(a)=>({padding:"9px 20px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",border:"none",background:a?"#1e2d3d":"transparent",color:a?"#e2e8f0":"#64748b",fontSize:13.5,fontWeight:a?600:400,borderLeft:a?"2px solid #4f8ef7":"2px solid transparent",textAlign:"left",width:"100%",transition:"all .15s"}),
    sel:(color)=>({background:color+"15",color,border:`1px solid ${color}40`,borderRadius:12,padding:"2px 8px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Mono',monospace",appearance:"none"}),
  };

  if(!currentUser)return <div style={{minHeight:"100vh",background:"#0d1117",display:"flex",alignItems:"center",justifyContent:"center",color:"#475569",fontFamily:"'DM Mono',monospace"}}>Loading…</div>;

  // ── Dashboard ───────────────────────────────────────────────────────────────
  function Dashboard(){
    if(!dash)return <Spinner/>;
    const TARGET_DAYS=7;
    let daysValue="—",daysSub="No active period",daysColor="#64748b",daysPct=0;
    if(period?.end_date){
      const end=new Date(period.end_date+"T00:00:00");
      const today=new Date();today.setHours(0,0,0,0);
      let bd=0;
      for(let d=new Date(end);d<today;d.setDate(d.getDate()+1)){
        const dow=d.getDay();if(dow!==0&&dow!==6)bd++;
      }
      daysValue=String(bd);
      daysSub=`Target: ${TARGET_DAYS} business days`;
      daysColor=bd>TARGET_DAYS?"#f87171":bd>=TARGET_DAYS-1?"#f7c948":"#4fd9a0";
      daysPct=Math.min(Math.round(bd/TARGET_DAYS*100),100);
    }
    const issuesBadgeColor=dash.open_issues>0?"#f87171":"#4fd9a0";
    const avgDays=dash.avg_days_to_close;
    const kpis=[
      {label:"Close Progress",value:dash.close_pct+"%",sub:`${dash.tasks_complete} of ${dash.tasks_total} tasks`,color:"#4f8ef7",pct:dash.close_pct},
      {label:"Approved",value:dash.approval_pct+"%",sub:`${dash.tasks_approved} reviewed & signed`,color:"#4fd9a0",pct:dash.approval_pct},
      {label:"Reconciliations",value:dash.recon_pct+"%",sub:`${dash.recon_done} of ${dash.recon_total} accounts`,color:"#c084fc",pct:dash.recon_pct},
      {label:"Days to Close",value:daysValue,sub:daysSub,color:daysColor,pct:daysPct},
      {label:"Open Issues",value:String(dash.open_issues||0),sub:dash.open_issues?"Needs resolution":"All clear",color:issuesBadgeColor,pct:0,noBar:true,link:"issues"},
      {label:"Avg Days to Close",value:avgDays!=null?String(avgDays)+"d":"—",sub:avgDays!=null?`Historical avg across ${avgDays!=null?"closed":"0"} periods`:"No closed periods yet",color:"#f7c948",pct:0,noBar:true},
    ];
    return(<div>
      <div style={S.kpiGrid}>{kpis.map(k=>(

  // ── Checklist ───────────────────────────────────────────────────────────────
  function Checklist(){
    if(loading)return <Spinner/>;
    const today=new Date();today.setHours(0,0,0,0);
    const isOverdue=(t)=>t.due_date&&t.status!=="complete"&&new Date(t.due_date+"T00:00:00")<today;
    const overdueDays=(t)=>{if(!isOverdue(t))return 0;return Math.round((today-new Date(t.due_date+"T00:00:00"))/86400000);};
    const canEdit=(t)=>isAdmin||t.assignee_id===currentUser.id||t.reviewer_id===currentUser.id;
    return(<div>
      <div style={S.filterBar}>
        <button style={S.filterBtn(!filterUser&&!filterCat&&!myTasksOnly)} onClick={()=>{setFilterUser(null);setFilterCat(null);setMyTasksOnly(false);}}>All</button>
        <button style={S.filterBtn(myTasksOnly)} onClick={()=>setMyTasksOnly(!myTasksOnly)}>My Tasks</button>
        <span style={{width:1,background:"#1e2d3d",margin:"0 4px",height:20,display:"inline-block"}}/>
        {users.map(u=><button key={u.id} style={S.filterBtn(filterUser===u.id)} onClick={()=>setFilterUser(filterUser===u.id?null:u.id)}>{u.initials}</button>)}
        <span style={{width:1,background:"#1e2d3d",margin:"0 4px",height:20,display:"inline-block"}}/>
        {cats.map(c=><button key={c.id} style={S.filterBtn(filterCat===c.id)} onClick={()=>setFilterCat(filterCat===c.id?null:c.id)}>{c.name}</button>)}
      </div>
      {Object.entries(groupedTasks).map(([catName,{tasks:ct}])=>(
        <div key={catName} style={{...S.card,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:700,color:"#4f8ef7",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase"}}>{catName}</span>
            <span style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{ct.filter(t=>t.status==="complete").length}/{ct.length} complete</span>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["Task","Assignee","Due","Status","Reviewer","Review"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>{ct.map(t=>{
              const od=isOverdue(t);
              return(<tr key={t.id} style={{cursor:"pointer",borderLeft:od?"3px solid #f87171":"3px solid transparent"}} onClick={()=>setSelectedTask(t)}>
                <td style={{...S.td,fontWeight:500}}>
                  {t.notes&&<span style={{color:"#f7c948",marginRight:6,fontSize:11}}>●</span>}
                  {t.recurrence&&t.recurrence!=="none"&&<span title={`Recurring: ${t.recurrence}`} style={{color:"#4f8ef7",marginRight:5,fontSize:10}}>↻</span>}
                  {t.name}
                  {od&&<span style={{marginLeft:8,fontSize:10,color:"#f87171",fontFamily:"'DM Mono',monospace"}}>{overdueDays(t)}d overdue</span>}
                </td>
                <td style={S.td}><Avatar user={{initials:t.assignee_initials,color:t.assignee_color}}/></td>
                <td style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:12,color:od?"#f87171":"#94a3b8"}}>{fmtDate(t.due_date)}</td>
                <td style={S.td}>
                  {canEdit(t)
                    ?<select value={t.status} style={S.sel(SC[t.status]?.color||"#94a3b8")} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();patchTask(t.id,{status:e.target.value});}}>
                      <option value="open">Open</option><option value="in_progress">In Progress</option><option value="submitted">Submitted</option><option value="complete">Complete</option>
                    </select>
                    :<Badge status={t.status}/>}
                </td>
                <td style={S.td}><Avatar user={{initials:t.reviewer_initials,color:"#64748b"}}/></td>
                <td style={S.td}>
                  {(isAdmin||t.reviewer_id===currentUser.id)
                    ?<select value={t.review_status} style={S.sel(RC[t.review_status]?.color||"#94a3b8")} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();patchTask(t.id,{review_status:e.target.value});}}>
                      <option value="pending">Pending Review</option><option value="approved">Approved</option><option value="needs_revision">Needs Revision</option>
                    </select>
                    :<Badge status={t.review_status} type="review"/>}
