  // ── Close Calendar ──────────────────────────────────────────────────────────
  function CloseCalendar(){
    const [ttc,setTtc]=useState([]);
    useEffect(()=>{api("/api/analytics/time_to_close").then(setTtc).catch(()=>{});},[]);

    const calPeriod=period;
    const calTasks=tasks;

    // Build calendar grid for the active period's month
    function buildGrid(){
      if(!calPeriod?.start_date)return{weeks:[],year:0,month:0};
      const start=new Date(calPeriod.start_date+"T00:00:00");
      const year=start.getFullYear(),month=start.getMonth();
      const firstDay=new Date(year,month,1).getDay();
      const daysInMonth=new Date(year,month+1,0).getDate();
      const cells=[];
      for(let i=0;i<firstDay;i++)cells.push(null);
      for(let d=1;d<=daysInMonth;d++)cells.push(d);
      while(cells.length%7!==0)cells.push(null);
      const weeks=[];
      for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
      return{weeks,year,month};
    }
    const {weeks,year,month}=buildGrid();
    const today=new Date();today.setHours(0,0,0,0);
    const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
    const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    function tasksOnDay(d){
      if(!d)return[];
      const iso=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      return calTasks.filter(t=>t.due_date===iso);
    }
    function isInPeriod(d){
      if(!d||!calPeriod)return false;
      const iso=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      return iso>=calPeriod.start_date&&iso<=calPeriod.end_date;
    }
    function isToday(d){
      if(!d)return false;
      return today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d;
    }

    const maxDays=ttc.length?Math.max(...ttc.map(r=>r.days_to_close||0),1):1;
    return(<div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
        <div style={S.card}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:12}}>{monthNames[month]} {year}</div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{dayNames.map(d=><th key={d} style={{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",padding:"4px 2px",textAlign:"center",fontWeight:500}}>{d}</th>)}</tr></thead>
            <tbody>{weeks.map((week,wi)=><tr key={wi}>{week.map((d,di)=>{
              const dayTasks=tasksOnDay(d);
              const inPeriod=isInPeriod(d);
              const isTod=isToday(d);
              return<td key={di} style={{padding:"3px 2px",verticalAlign:"top",background:inPeriod?"#1a2535":"transparent",borderRadius:4}}>
                {d!=null&&<div style={{minHeight:52}}>
                  <div style={{fontSize:11,fontWeight:isTod?700:400,color:isTod?"#4f8ef7":"#94a3b8",fontFamily:"'DM Mono',monospace",textAlign:"center",marginBottom:2,width:22,height:22,borderRadius:11,background:isTod?"#4f8ef720":"transparent",margin:"0 auto 2px",lineHeight:"22px"}}>{d}</div>
                  {dayTasks.slice(0,2).map(t=><div key={t.id} title={t.name} onClick={()=>setSelectedTask(t)} style={{fontSize:9,padding:"1px 4px",borderRadius:3,marginBottom:1,background:(SC[t.status]?.color||"#64748b")+"22",color:SC[t.status]?.color||"#64748b",cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div>)}
                  {dayTasks.length>2&&<div style={{fontSize:9,color:"#64748b",textAlign:"center"}}>+{dayTasks.length-2}</div>}
                </div>}
              </td>;
            })}</tr>)}</tbody>
          </table>
          <div style={{marginTop:10,display:"flex",gap:12,fontSize:11,color:"#64748b"}}>
            <span style={{background:"#1a2535",borderRadius:3,padding:"2px 6px"}}>Period range</span>
            {Object.entries(SC).map(([k,v])=><span key={k} style={{color:v.color}}>● {v.label}</span>)}
          </div>
        </div>
        <div style={S.card}>
          <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:12}}>Close History — Days After Period End</div>
          {ttc.length===0&&<div style={{color:"#475569",fontSize:13}}>No closed periods yet. Data will appear here after you close a period.</div>}
          {ttc.map((r,i)=>{
            const prev=i>0?ttc[i-1]:null;
            const faster=prev&&r.days_to_close!=null&&prev.days_to_close!=null&&r.days_to_close<prev.days_to_close;
            const slower=prev&&r.days_to_close!=null&&prev.days_to_close!=null&&r.days_to_close>prev.days_to_close;
            const barW=r.days_to_close!=null?Math.round(r.days_to_close/maxDays*100):0;
            const barColor=faster?"#4fd9a0":slower?"#f87171":"#4f8ef7";
            return<div key={r.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,color:"#e2e8f0"}}>{r.label}</span>
                <span style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:barColor}}>
                  {r.days_to_close!=null?`${r.days_to_close}d`:"—"}
                  {faster&&<span style={{marginLeft:6,fontSize:10}}>▼ faster</span>}
                  {slower&&<span style={{marginLeft:6,fontSize:10}}>▲ slower</span>}
                </span>
              </div>
              <div style={{height:5,background:"#1e2d3d",borderRadius:3}}><div style={{height:"100%",width:barW+"%",background:barColor,borderRadius:3}}/></div>
            </div>;
          })}
        </div>
      </div>
    </div>);
  }

  function Reports(){
    const [rtype,setRtype]=useState("pl");
    const [view,setView]=useState("native");
    const [periodType,setPeriodType]=useState("month");
    const [compareMode,setCompareMode]=useState("prev");
    const [periods,setPeriods]=useState([]);
    const [periodId,setPeriodId]=useState(null);
    const [compareId,setCompareId]=useState(null);
    const [data,setData]=useState(null);
    const [kpis,setKpis]=useState(null);
    const [busy,setBusy]=useState(false);
    const [err,setErr]=useState(null);
    const [drill,setDrill]=useState(null);
    const [noteLine,setNoteLine]=useState(null);

    useEffect(()=>{
      api("/api/periods").then(ps=>{
        setPeriods(ps);
        const activeMonth=ps.find(p=>p.is_active&&p.period_type==="month")||ps.find(p=>p.is_active)||ps[0];
        if(activeMonth){
          setPeriodId(activeMonth.id);
          setPeriodType(activeMonth.period_type||"month");
        }
      }).catch(e=>setErr(e.message));
    },[]);

    // Filter periods by selected type and auto-pick first on type change
    const periodsOfType=periods.filter(p=>(p.period_type||"month")===periodType)
                               .sort((a,b)=>b.start_date.localeCompare(a.start_date));
    useEffect(()=>{
      if(!periodsOfType.length)return;
      if(!periodsOfType.find(p=>p.id===periodId)){
        const active=periodsOfType.find(p=>p.is_active)||periodsOfType[0];
        setPeriodId(active.id);
      }
    },[periodType,periods.length]);
    // Auto-compute compare_id from mode. 'custom' keeps whatever the user picked.
    useEffect(()=>{
      if(!periodId||compareMode==="none"){setCompareId(null);return;}
      if(compareMode==="custom")return; // let the second dropdown drive it
      const cur=periods.find(p=>p.id===periodId);
      if(!cur)return;
      const sameTypeOlder=periods.filter(p=>p.period_type===cur.period_type&&p.start_date<cur.start_date)
                                 .sort((a,b)=>b.start_date.localeCompare(a.start_date));
      const byFY=(fy,pt,pn)=>periods.find(p=>p.period_type===pt&&p.fiscal_year===fy&&((pn==null&&p.period_number==null)||p.period_number===pn));
      let target=null;
      if(compareMode==="prev")target=sameTypeOlder[0];
      else if(compareMode==="prev2")target=sameTypeOlder[1];
      else if(compareMode==="prev3")target=sameTypeOlder[2];
      else if(compareMode==="yoy"&&cur.fiscal_year)target=byFY(cur.fiscal_year-1,cur.period_type,cur.period_number);
      else if(compareMode==="yoy2"&&cur.fiscal_year)target=byFY(cur.fiscal_year-2,cur.period_type,cur.period_number);
      else if(compareMode==="ytd"&&cur.fiscal_year)target=periods.find(p=>p.period_type==="year"&&p.fiscal_year===cur.fiscal_year);
      else if(compareMode==="ytd_ly"&&cur.fiscal_year)target=periods.find(p=>p.period_type==="year"&&p.fiscal_year===cur.fiscal_year-1);
      setCompareId(target?target.id:null);
    },[periodId,compareMode,periods.length]);

    async function loadReport(){
      if(!periodId)return;
      setBusy(true);setErr(null);
      try{
        const qs=new URLSearchParams({period_id:periodId,view});
        if(compareId)qs.set("compare_to",compareId);else qs.set("auto_compare","0");
        const r=await api(`/api/reports/${rtype}?${qs}`);
        setData(r);
      }catch(e){setErr(e.message);}
      setBusy(false);
    }
    async function loadKpis(){
      if(!periodId)return;
      try{const r=await api(`/api/reports/kpis?period_id=${periodId}`);setKpis(r.kpis);}catch(e){setKpis(null);}
    }
    useEffect(()=>{loadReport();},[rtype,periodId,compareId,view]);
    useEffect(()=>{loadKpis();},[periodId]);

    async function syncFromQB(){
      if(!periodId)return;
      setBusy(true);setErr(null);
      try{
        const r=await api("/api/qb/sync_reports",{method:"POST",body:JSON.stringify({period_id:periodId,types:[rtype]})});
        if(!r.ok){
          const msgs=Object.entries(r.results||{}).filter(([_,v])=>!v.ok).map(([t,v])=>`${t.toUpperCase()}: ${v.error||"unknown"}`).join(" · ");
          setErr(msgs||"Sync failed");
        }
        await loadReport();await loadKpis();
      }catch(e){setErr(e.message);}
      setBusy(false);
    }
    async function syncHistory(){
      if(!confirm("Pull every P&L / Balance Sheet / Cash Flow from QuickBooks for every month, quarter, and year from 2024-01-01 through today, AND derive reconciliations from each month's Balance Sheet. This can take 1–3 minutes. Continue?"))return;
      setBusy(true);setErr(null);
      try{
        const r=await api("/api/qb/sync_history",{method:"POST",body:JSON.stringify({start_date:"2024-01-01"})});
        await loadReport();await loadKpis();
        const errTxt=r.errors&&r.errors.length?`\n\n${r.errors.length} soft error(s) — first few:\n${r.errors.slice(0,5).join("\n")}`:"";
        alert(`History synced through ${r.end_date}.\n${r.periods} periods · P&L ${r.pl} · BS ${r.bs} · CF ${r.cf}\nReconciliations: ${r.recons_created} created, ${r.recons_updated} updated.${errTxt}`);
      }catch(e){setErr(e.message);}
      setBusy(false);
    }
    const [diag,setDiag]=useState(null);
    async function diagnose(){
      if(!periodId)return;
      setDiag({loading:true});
      try{
        const r=await api(`/api/qb/diagnose?period_id=${periodId}&rtype=${rtype}`);
        setDiag({loading:false,data:r});
      }catch(e){setDiag({loading:false,error:e.message});}
    }

    function exportReport(fmt){
      const qs=new URLSearchParams({period_id:periodId,view,format:fmt});
      if(compareId)qs.set("compare_to",compareId);else qs.set("auto_compare","0");
      window.location.href=`/api/reports/${rtype}/export?${qs}`;
    }

    const lines=data?.lines||[];
    const hasCompare=!!data?.compare;
    const title={pl:"Profit & Loss",bs:"Balance Sheet",cf:"Cash Flow"}[rtype];

    function varColor(v,name){
      if(v==null||v===0)return "#64748b";
      const isExpense=/expense|cost|cogs/i.test(name||"");
      const favorable=isExpense?v<0:v>0;
      return favorable?"#4fd9a0":"#f87171";
    }

    async function saveNote(){
      if(!noteLine)return;
      try{
        await api("/api/flux_notes",{method:"POST",body:JSON.stringify({
          period_id:periodId,report_type:rtype,account_name:noteLine.account_name,note:noteLine._draft||""
        })});
        setNoteLine(null);await loadReport();
      }catch(e){alert(e.message);}
    }

    async function openDrill(l){
      if(l.is_subtotal||!data?.period)return;
      setDrill({account_name:l.account_name,loading:true,txns:[],cols:[]});
      try{
        const qs=new URLSearchParams({period_id:periodId,account_name:l.account_name});
        if(l.account_id)qs.set("account_id",l.account_id);
        const r=await api(`/api/qb/transactions?${qs}`);
        setDrill({account_name:l.account_name,loading:false,txns:r.transactions||[],cols:r.columns||[]});
      }catch(e){setDrill({account_name:l.account_name,loading:false,error:e.message,txns:[],cols:[]});}
    }

    const kpiBox=(label,val,sub,color)=>
      <div style={{flex:"1 1 150px",minWidth:150,padding:"14px 16px",background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:10}}>
        <div style={{fontSize:10.5,color:"#64748b",fontFamily:"'DM Mono',monospace",letterSpacing:.5,textTransform:"uppercase"}}>{label}</div>
        <div style={{fontSize:18,fontWeight:700,color:color||"#e2e8f0",marginTop:4,fontFamily:"'DM Mono',monospace"}}>{val}</div>
        {sub&&<div style={{fontSize:10.5,color:"#64748b",marginTop:2,fontFamily:"'DM Mono',monospace"}}>{sub}</div>}
      </div>;
    const pct=v=>v==null?"—":(v>0?"+":"")+v+"%";
    const ratio=v=>v==null?"—":v.toFixed(2);

    return(<div>
      <div style={{display:"flex",gap:0,marginBottom:20,background:"#111827",border:"1px solid #1e2d3d",borderRadius:10,padding:4,width:"fit-content"}}>
        {[["pl","Profit & Loss"],["bs","Balance Sheet"],["cf","Cash Flow"]].map(([k,l])=>
          <button key={k} onClick={()=>setRtype(k)} style={{padding:"7px 18px",borderRadius:7,border:"none",background:rtype===k?"#1e2d3d":"transparent",color:rtype===k?"#e2e8f0":"#64748b",fontSize:13,cursor:"pointer",fontWeight:rtype===k?600:400}}>{l}</button>
        )}
      </div>

      {kpis&&<div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>
        {kpiBox("Revenue",fmt(kpis.revenue))}
        {kpiBox("Gross Margin",kpis.gross_margin_pct!=null?kpis.gross_margin_pct+"%":"—",kpis.gross_profit!=null?fmt(kpis.gross_profit):null,"#4fd9a0")}
        {kpiBox("Operating Margin",kpis.operating_margin_pct!=null?kpis.operating_margin_pct+"%":"—",kpis.operating_expenses!=null?"Opex "+fmt(kpis.operating_expenses):null)}
        {kpiBox("Net Income",fmt(kpis.net_income),kpis.net_margin_pct!=null?kpis.net_margin_pct+"% margin":null,(kpis.net_income||0)>=0?"#4fd9a0":"#f87171")}
        {kpiBox("Current Ratio",ratio(kpis.current_ratio),kpis.working_capital!=null?"WC "+fmt(kpis.working_capital):null)}
        {kpiBox("Quick Ratio",ratio(kpis.quick_ratio))}
        {kpiBox("Debt / Equity",ratio(kpis.debt_to_equity))}
        {kpiBox("Cash",fmt(kpis.cash),kpis.total_assets!=null?"Assets "+fmt(kpis.total_assets):null,"#4f8ef7")}
      </div>}

      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#e2e8f0"}}>{title}</div>
            <div style={{fontSize:11.5,color:"#64748b",marginTop:2,fontFamily:"'DM Mono',monospace"}}>
              {data?.pulled_at?`Pulled from QB ${new Date(data.pulled_at).toLocaleString()}`:"Not yet synced from QuickBooks"}
            </div>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{display:"flex",background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:7,padding:3}}>
              {[["month","MTD"],["quarter","QTD"],["year","YTD"]].map(([k,l])=>
                <button key={k} onClick={()=>setPeriodType(k)} style={{padding:"4px 10px",border:"none",background:periodType===k?"#1e2d3d":"transparent",color:periodType===k?"#e2e8f0":"#64748b",borderRadius:5,fontSize:11,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{l}</button>
              )}
            </div>
            <div style={{display:"flex",background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:7,padding:3}}>
              {[["native","QB"],["custom","Custom"]].map(([k,l])=>
                <button key={k} onClick={()=>setView(k)} style={{padding:"4px 10px",border:"none",background:view===k?"#1e2d3d":"transparent",color:view===k?"#e2e8f0":"#64748b",borderRadius:5,fontSize:11,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{l}</button>
              )}
            </div>
            <label style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>PERIOD</label>
            <select value={periodId||""} onChange={e=>setPeriodId(parseInt(e.target.value))}
              style={{padding:"6px 10px",background:"#111827",border:"1px solid #1e2d3d",color:"#e2e8f0",borderRadius:7,fontSize:12,fontFamily:"'DM Mono',monospace",minWidth:140}}>
              {periodsOfType.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
            </select>
            <label style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>vs</label>
            <select value={compareMode} onChange={e=>setCompareMode(e.target.value)}
              style={{padding:"6px 10px",background:"#111827",border:"1px solid #1e2d3d",color:"#e2e8f0",borderRadius:7,fontSize:12,fontFamily:"'DM Mono',monospace"}}>
              <option value="prev">Prior period (MoM/QoQ)</option>
              <option value="prev2">2 periods ago</option>
              <option value="prev3">3 periods ago</option>
              <option value="yoy">Prior year (YoY)</option>
              <option value="yoy2">Two years ago</option>
              <option value="ytd">This fiscal year (YTD)</option>
              <option value="ytd_ly">Prior fiscal year</option>
              <option value="custom">Custom…</option>
              <option value="none">No compare</option>
            </select>
            {compareMode==="custom"&&<select value={compareId||""} onChange={e=>setCompareId(parseInt(e.target.value)||null)}
              style={{padding:"6px 10px",background:"#111827",border:"1px solid #4f8ef740",color:"#e2e8f0",borderRadius:7,fontSize:12,fontFamily:"'DM Mono',monospace",minWidth:180}}>
              <option value="">(pick any period)</option>
              {[...periods].sort((a,b)=>b.start_date.localeCompare(a.start_date))
                .filter(p=>p.id!==periodId)
                .map(p=>{
                  const t=(p.period_type||"month").slice(0,1).toUpperCase();
                  return <option key={p.id} value={p.id}>[{t}] {p.label}</option>;
                })}
            </select>}
            <button onClick={()=>exportReport("xlsx")} disabled={!lines.length} style={{padding:"6px 14px",background:"#4fd9a018",border:"1px solid #4fd9a040",color:"#4fd9a0",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>⇩ Excel</button>
            <button onClick={()=>exportReport("csv")} disabled={!lines.length} style={{padding:"6px 14px",background:"#1a2535",border:"1px solid #1e2d3d",color:"#94a3b8",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>⇩ CSV</button>
            {isAdmin&&<button onClick={syncFromQB} disabled={busy} style={{padding:"6px 14px",background:"#4f8ef718",border:"1px solid #4f8ef740",color:busy?"#64748b":"#4f8ef7",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{busy?"Syncing…":"↻ Sync from QB"}</button>}
            {isAdmin&&<button onClick={syncHistory} disabled={busy} title="Pull P&L / BS / CF + derive recons for every month, quarter, and year from 2024-01-01 through today" style={{padding:"6px 14px",background:"#2CA01C18",border:"1px solid #2CA01C40",color:busy?"#64748b":"#2CA01C",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{busy?"Working…":"⇣ Sync History"}</button>}
            {isAdmin&&<button onClick={diagnose} disabled={busy||!periodId} title="Call QuickBooks directly and show the raw response — helps debug empty reports" style={{padding:"6px 14px",background:"#f59e0b18",border:"1px solid #f59e0b40",color:"#f59e0b",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>🔎 Diagnose</button>}
          </div>
        </div>

        {err&&<div style={{padding:10,background:"#f8717118",border:"1px solid #f8717140",color:"#f87171",borderRadius:8,fontSize:12,marginBottom:12,fontFamily:"'DM Mono',monospace"}}>{err}</div>}

        {lines.length===0?<div style={{padding:40,textAlign:"center",color:"#64748b",fontFamily:"'DM Mono',monospace",fontSize:13}}>
          {busy?"Loading…":
            data?.pulled_at
              ?<>QuickBooks returned this report with <b>zero rows</b> for {data?.period?.label}.<br/><br/>Likely causes: your QB company has no activity in this date range · the wrong <code>QB_ENVIRONMENT</code> (sandbox vs production) · the accounting method (we ask for Accrual).<br/><br/>Click <b>🔎 Diagnose</b> to see the raw QuickBooks response.</>
              :<>Not yet synced. Click <b>↻ Sync from QB</b> (this period only) or <b>⇣ Sync History</b> (2024→today).</>
          }
        </div>:
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={{...S.th,textAlign:"left"}}>Account</th>
            <th style={{...S.th,textAlign:"right"}}>{data?.period?.label||"Current"}</th>
            {hasCompare&&<th style={{...S.th,textAlign:"right"}}>{data.compare.label}</th>}
            {hasCompare&&<th style={{...S.th,textAlign:"right"}}>Variance $</th>}
            {hasCompare&&<th style={{...S.th,textAlign:"right"}}>Variance %</th>}
            <th style={{...S.th,textAlign:"center",width:40}}>Note</th>
          </tr></thead>
          <tbody>{lines.map((l,i)=>{
            const isSub=l.is_subtotal===1;
            const canDrill=!isSub&&rtype!=="cf";
            const nameStyle={...S.td,paddingLeft:12+(l.depth||0)*14,fontWeight:isSub?700:400,color:isSub?"#e2e8f0":"#94a3b8",fontSize:12.5,borderTop:isSub?"1px solid #1e2d3d":"none",cursor:canDrill?"pointer":"default"};
            const numStyle={...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5,fontWeight:isSub?700:400,color:isSub?"#e2e8f0":"#94a3b8",borderTop:isSub?"1px solid #1e2d3d":"none"};
            const vc=varColor(l.variance,l.account_name);
            const hasNote=!!(l.flux_note&&l.flux_note.length);
            return(<tr key={i} style={isSub?{background:"#0f172a55"}:{}}>
              <td style={nameStyle} onClick={()=>canDrill&&openDrill(l)} title={canDrill?"Click for transaction detail":""}>
                {canDrill&&<span style={{color:"#475569",marginRight:6,fontSize:11}}>▸</span>}{l.account_name}
              </td>
              <td style={numStyle}>{fmt(l.amount)}</td>
              {hasCompare&&<td style={numStyle}>{l.prior_amount!=null?fmt(l.prior_amount):"—"}</td>}
              {hasCompare&&<td style={{...numStyle,color:l.variance!=null?vc:"#475569"}}>{l.variance!=null?fmt(l.variance):"—"}</td>}
              {hasCompare&&<td style={{...numStyle,color:l.variance_pct!=null?vc:"#475569"}}>{l.variance_pct!=null?(l.variance_pct>0?"+":"")+l.variance_pct+"%":"—"}</td>}
              <td style={{...S.td,textAlign:"center",borderTop:isSub?"1px solid #1e2d3d":"none"}}>
                {!isSub&&<button onClick={()=>setNoteLine({...l,_draft:l.flux_note||""})} title={hasNote?l.flux_note:"Add flux note"}
                  style={{background:"transparent",border:"none",color:hasNote?"#4f8ef7":"#475569",cursor:"pointer",fontSize:14}}>
                  {hasNote?"✎":"+"}
                </button>}
              </td>
            </tr>);
          })}</tbody>
        </table>}
      </div>

      {drill&&<Modal title={`Transactions — ${drill.account_name}`} onClose={()=>setDrill(null)}>
        {drill.loading?<div style={{padding:30,textAlign:"center",color:"#64748b",fontFamily:"'DM Mono',monospace"}}>Loading from QB…</div>:
         drill.error?<div style={{padding:20,color:"#f87171",fontSize:12,fontFamily:"'DM Mono',monospace"}}>{drill.error}</div>:
         drill.txns.length===0?<div style={{padding:30,textAlign:"center",color:"#64748b",fontSize:12,fontFamily:"'DM Mono',monospace"}}>No transactions in this period.</div>:
         <div style={{maxHeight:"60vh",overflow:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{drill.cols.map(c=><th key={c} style={{...S.th,textAlign:"left",position:"sticky",top:0,background:"#0f172a"}}>{c}</th>)}</tr></thead>
            <tbody>{drill.txns.map((t,i)=><tr key={i}>{drill.cols.map(c=><td key={c} style={{...S.td,fontFamily:"'DM Mono',monospace",fontSize:11.5,color:"#94a3b8"}}>{t[c]||"—"}</td>)}</tr>)}</tbody>
          </table>
         </div>
        }
      </Modal>}

      {noteLine&&<Modal title={`Flux Note — ${noteLine.account_name}`} onClose={()=>setNoteLine(null)}>
        <div style={{fontSize:12,color:"#64748b",fontFamily:"'DM Mono',monospace",marginBottom:10}}>
          {data?.period?.label} · {fmt(noteLine.amount)} {hasCompare&&noteLine.prior_amount!=null&&` vs. ${fmt(noteLine.prior_amount)} (${noteLine.variance_pct!=null?(noteLine.variance_pct>0?"+":"")+noteLine.variance_pct+"%":"—"})`}
        </div>
        <textarea value={noteLine._draft||""} onChange={e=>setNoteLine({...noteLine,_draft:e.target.value})}
          placeholder="Explain the variance — drivers, one-time items, seasonality, mix, etc."
          style={{width:"100%",minHeight:120,padding:10,background:"#0f172a",border:"1px solid #1e2d3d",borderRadius:8,color:"#e2e8f0",fontSize:13,fontFamily:"inherit",resize:"vertical",outline:"none"}}/>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:10}}>
          <button className="btn btn-ghost" onClick={()=>setNoteLine(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={saveNote}>Save</button>
        </div>
      </Modal>}
      {diag&&<Modal title="QuickBooks Diagnose" onClose={()=>setDiag(null)}>
        {diag.loading?<div style={{padding:20,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>Calling QuickBooks…</div>:
         diag.error?<div style={{padding:12,color:"#f87171",fontSize:12,fontFamily:"'DM Mono',monospace"}}>{diag.error}</div>:
         <div style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:"#94a3b8",maxHeight:"60vh",overflow:"auto"}}>
          <div style={{marginBottom:10}}>
            <div><b>Connected:</b> {String(diag.data?.connected)}</div>
            <div><b>Realm ID:</b> {diag.data?.realm_id||"—"}</div>
            <div><b>Environment:</b> {diag.data?.environment}</div>
            {diag.data?.period&&<div><b>Period:</b> {diag.data.period.label} ({diag.data.period.start_date} → {diag.data.period.end_date})</div>}
            <div style={{wordBreak:"break-all",marginTop:6}}><b>URL:</b> {diag.data?.url}</div>
          </div>
          {diag.data?.qb_error?<div style={{padding:10,background:"#f8717118",border:"1px solid #f8717140",color:"#f87171",borderRadius:6,marginBottom:10}}><b>QB error:</b> {diag.data.qb_error}</div>:
           <>
            <div style={{padding:10,background:(diag.data.row_count_flattened||0)===0?"#f59e0b18":"#4fd9a018",border:`1px solid ${(diag.data.row_count_flattened||0)===0?"#f59e0b40":"#4fd9a040"}`,color:(diag.data.row_count_flattened||0)===0?"#f59e0b":"#4fd9a0",borderRadius:6,marginBottom:10}}>
              <b>Top-level QB rows:</b> {diag.data.row_count_top_level}<br/>
              <b>Flattened rows:</b> {diag.data.row_count_flattened}<br/>
              {(diag.data.row_count_flattened||0)===0&&<span>→ QuickBooks returned an empty report for this period. Not a bug in CloseTool. Check: company activity in date range, sandbox vs production, or try a different period.</span>}
            </div>
            {diag.data.sample_rows?.length>0&&<>
              <div style={{color:"#64748b",marginBottom:4}}>Sample rows:</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11.5}}>
                <thead><tr><th style={{...S.th,textAlign:"left"}}>Account</th><th style={{...S.th,textAlign:"right"}}>Amount</th><th style={{...S.th}}>Section</th></tr></thead>
                <tbody>{diag.data.sample_rows.map((r,i)=><tr key={i}><td style={S.td}>{r.name||"—"}{r.is_subtotal?" ▸ subtotal":""}</td><td style={{...S.td,textAlign:"right"}}>{fmt(r.amount)}</td><td style={S.td}>{r.section||"—"}</td></tr>)}</tbody>
              </table>
            </>}
           </>}
         </div>
        }
      </Modal>}
    </div>);
  }

  const navItems=[
    {id:"dashboard",label:"Dashboard",icon:"⬡"},
    {id:"checklist",label:"Close Checklist",icon:"☑"},
    {id:"recons",label:"Reconciliations",icon:"⇌"},
    {id:"issues",label:"Issues",icon:"⚠",badge:openIssuesCount||null},
    {id:"je",label:"Journal Entries",icon:"📒"},
    {id:"calendar",label:"Calendar",icon:"📅"},
    {id:"reports",label:"Reports",icon:"◨"},
    ...(isAdmin?[{id:"settings",label:"Settings",icon:"⚙"}]:[]),
  ];

  return(<div style={S.app}>
    {qbToast&&<div style={{position:"fixed",top:20,right:20,zIndex:999,padding:"12px 20px",borderRadius:10,fontSize:13,fontWeight:600,background:qbToast.kind==="connected"?"#4fd9a018":"#f8717118",border:`1px solid ${qbToast.kind==="connected"?"#4fd9a040":"#f8717140"}`,color:qbToast.kind==="connected"?"#4fd9a0":"#f87171",maxWidth:420,lineHeight:1.4}}>
      {qbToast.kind==="connected"?"✓ QuickBooks connected successfully!":<span>✗ {qbErrorMessage(qbToast.reason)}{qbToast.reason&&<span style={{display:"block",fontWeight:400,fontSize:11,opacity:0.7,marginTop:3,fontFamily:"'DM Mono',monospace"}}>reason: {qbToast.reason}</span>}</span>}
      <button onClick={()=>setQbToast(null)} style={{marginLeft:12,background:"none",border:"none",color:"inherit",cursor:"pointer",fontSize:16}}>×</button>
    </div>}
    <div style={S.sidebar}>
      <div style={{padding:"0 20px 20px",borderBottom:"1px solid #1e2d3d",marginBottom:8}}>
        <div style={{fontSize:17,fontWeight:800,color:"#fff",letterSpacing:-0.5}}>CloseTool<span style={{fontSize:10,background:"#4f8ef722",color:"#4f8ef7",border:"1px solid #4f8ef740",padding:"1px 6px",borderRadius:4,fontFamily:"'DM Mono',monospace",marginLeft:6}}>QB</span></div>
        <div style={{fontSize:11,color:"#475569",marginTop:4}}>{period?.label||"Loading…"}</div>
      </div>
      <div style={{margin:"0 12px 8px",padding:"8px 12px",background:"#1a2535",border:"1px solid #1e2d3d",borderRadius:8}}>
        <div style={{fontSize:10,color:"#475569",marginBottom:4,fontFamily:"'DM Mono',monospace",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>CLOSE PERIOD</span>
          {period&&(period.is_closed?<span style={{color:"#4fd9a0"}}>✓ CLOSED</span>:<span style={{color:"#f7c948"}}>OPEN</span>)}
        </div>
        {isAdmin?
          <select value={period?.id||""} onChange={e=>switchClosePeriod(parseInt(e.target.value))}
            style={{width:"100%",padding:"4px 6px",background:"#0f172a",border:"1px solid #1e2d3d",color:"#e2e8f0",borderRadius:6,fontSize:12.5,fontWeight:600,fontFamily:"'DM Sans',sans-serif",outline:"none",cursor:"pointer"}}>
            {allPeriods.filter(p=>(p.period_type||"month")==="month")
              .sort((a,b)=>b.start_date.localeCompare(a.start_date))
              .map(p=><option key={p.id} value={p.id}>{p.label}{p.is_closed?" ✓":""}{p.is_active?" ●":""}</option>)}
          </select>
          :<div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>{period?.label}</div>}
        <div style={{marginTop:6,height:3,background:"#1e2d3d",borderRadius:2}}><div style={{height:"100%",width:(dash?.close_pct||0)+"%",background:"#4f8ef7",borderRadius:2}}/></div>
        <div style={{fontSize:10,color:"#4f8ef7",marginTop:3}}>{dash?.close_pct||0}% complete</div>
        {isAdmin&&period&&!period.is_closed&&<button onClick={closeActivePeriod} title="Mark this period closed and advance to the next unclosed month"
          style={{marginTop:8,width:"100%",padding:"5px 8px",background:"#4fd9a018",border:"1px solid #4fd9a040",color:"#4fd9a0",borderRadius:6,fontSize:11,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>✓ Close This Period</button>}
      </div>
      {navItems.map(n=><button key={n.id} style={S.navBtn(tab===n.id)} onClick={()=>setTab(n.id)}>
        <span style={{fontSize:15}}>{n.icon}</span>
        <span style={{flex:1,textAlign:"left"}}>{n.label}</span>
        {n.badge?<span style={{fontSize:10,background:"#f87171",color:"#fff",borderRadius:10,padding:"1px 6px",fontFamily:"'DM Mono',monospace",fontWeight:700}}>{n.badge}</span>:null}
      </button>)}
      <div style={{marginTop:"auto",padding:"16px 20px",borderTop:"1px solid #1e2d3d"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <Avatar user={currentUser} size={28}/>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"#94a3b8"}}>{currentUser.name}</div>
            <span className={`tag ${currentUser.role==="admin"?"tag-admin":"tag-user"}`}>{currentUser.role}</span>
          </div>
        </div>
      </div>
    </div>

    <div style={S.main}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:"#f1f5f9",letterSpacing:-0.5}}>{navItems.find(n=>n.id===tab)?.label}</div>
          <div style={{fontSize:13,color:"#64748b",marginTop:3}}>
            {tab==="dashboard"&&`${period?.label} · ${dash?.tasks_complete||0}/${dash?.tasks_total||0} tasks complete`}
            {tab==="checklist"&&`${filteredTasks.length} tasks · Click any row to open detail`}
            {tab==="recons"&&`${dash?.recon_done||0}/${dash?.recon_total||0} accounts reconciled`}
            {tab==="issues"&&`${openIssuesCount} open issue${openIssuesCount===1?"":"s"} · ${period?.label}`}
            {tab==="je"&&`Journal entries for ${period?.label}`}
            {tab==="calendar"&&`Close calendar · ${period?.label}`}
            {tab==="reports"&&"Financial reports pulled live from QuickBooks"}
            {tab==="settings"&&"Admin only — manage team, categories, and tasks"}
          </div>
        </div>
      </div>
      {tab==="dashboard"&&<ErrorBoundary label="Dashboard"><Dashboard/></ErrorBoundary>}
      {tab==="checklist"&&<ErrorBoundary label="Checklist"><Checklist/></ErrorBoundary>}
      {tab==="recons"&&<ErrorBoundary label="Reconciliations"><Reconciliations/></ErrorBoundary>}
      {tab==="issues"&&<ErrorBoundary label="Issues"><OpenItems/></ErrorBoundary>}
      {tab==="je"&&<ErrorBoundary label="Journal Entries"><JournalEntries/></ErrorBoundary>}
      {tab==="calendar"&&<ErrorBoundary label="Calendar"><CloseCalendar/></ErrorBoundary>}
      {tab==="reports"&&<ErrorBoundary label="Reports"><Reports/></ErrorBoundary>}
      {tab==="settings"&&isAdmin&&<ErrorBoundary label="Settings"><Settings/></ErrorBoundary>}
    </div>
    {selectedTask&&<TaskModal/>}
  </div>);
}

window.__closetool_diag.mounted = true;
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary label="the app"><CloseApp/></ErrorBoundary>);
</script>
</body>
</html>
