              <td style={{...S.td,fontWeight:500}}>{s.label}</td>
              <td style={{...S.td,fontSize:12,color:"#94a3b8",fontFamily:"'DM Mono',monospace"}}>{new Date(s.snapshotted_at+"Z").toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</td>
              <td style={S.td}><Avatar user={{initials:s.user_initials,color:"#64748b"}} size={22}/></td>
              <td style={{...S.td,fontSize:12,fontFamily:"'DM Mono',monospace",color:"#94a3b8"}}>{s.row_count}</td>
              <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5}}>{fmt(s.total_assets||0)}</td>
              <td style={S.td} onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",gap:6}}>
                  <a className="btn btn-ghost" href={`/api/tb_snapshots/${s.id}/export.csv`} style={{fontSize:11,padding:"4px 10px",textDecoration:"none"}}>CSV</a>
                  {isAdmin&&<button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteTbSnapshot(s.id)}>×</button>}
                </div>
              </td>
            </tr>
          ))}</tbody>
        </table>}
    </div></div>);
  }

  // ── Review Queue ────────────────────────────────────────────────────────────
  function ReviewQueue(){
    const statusColor={pending:"#f7c948",posted:"#4fd9a0",dismissed:"#94a3b8",error:"#f87171"};
    async function doAction(id,action,body){
      try{
        if(action==="post")await api(`/api/pending_posts/${id}/post`,{method:"POST"});
        else if(action==="link")await api(`/api/pending_posts/${id}/link`,{method:"POST",body:JSON.stringify(body)});
        else if(action==="dismiss")await api(`/api/pending_posts/${id}`,{method:"PATCH",body:JSON.stringify({status:"dismissed"})});
        else if(action==="reopen")await api(`/api/pending_posts/${id}`,{method:"PATCH",body:JSON.stringify({status:"pending"})});
        else if(action==="delete"){if(!confirm("Delete this queue item?"))return;await api(`/api/pending_posts/${id}`,{method:"DELETE"});}
        await loadQueue();
        if(queueSelected?.id===id){
          if(action==="delete")setQueueSelected(null);
          else{const d=await api(`/api/pending_posts/${id}`);setQueueSelected(d);}
        }
      }catch(e){alert(e.message);}
    }
    async function openDetail(id){try{const d=await api(`/api/pending_posts/${id}`);setQueueSelected(d);}catch(e){alert(e.message);}}
    return(<div>
      <div style={{...S.card,marginBottom:14,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>STATUS</span>
        {["pending","posted","dismissed","error",""].map(s=>
          <button key={s||"all"} style={S.filterBtn(queueStatusFilter===s)} onClick={()=>setQueueStatusFilter(s)}>{s||"All"}</button>
        )}
        <span style={{width:1,background:"#1e2d3d",margin:"0 4px",height:20}}/>
        <span style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>SOURCE</span>
        {["","manual","authnet","pandadoc","billcom","shopify"].map(s=>
          <button key={s||"all"} style={S.filterBtn(queueSourceFilter===s)} onClick={()=>setQueueSourceFilter(s)}>{s||"All"}</button>
        )}
        <button className="btn btn-ghost" style={{fontSize:11,padding:"5px 12px",marginLeft:"auto"}} onClick={loadQueue}>↻ Refresh</button>
      </div>
      <div style={S.card}>
        {queue.length===0?<div style={{color:"#475569",fontSize:13,padding:"20px 0",textAlign:"center"}}>No items in the queue.</div>:
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Source","Type","Ref / Customer","Amount","Ext ID","Status","Created",""].map((h,i)=><th key={h} style={{...S.th,textAlign:i===3?"right":"left"}}>{h}</th>)}</tr></thead>
          <tbody>{queue.map(p=>{
            const sc=statusColor[p.status]||"#94a3b8";
            return(<tr key={p.id} style={{cursor:"pointer"}} onClick={()=>openDetail(p.id)}>
              <td style={{...S.td,fontSize:12,fontFamily:"'DM Mono',monospace",color:"#94a3b8"}}>{p.source}</td>
              <td style={{...S.td,fontSize:12}}><span style={{padding:"2px 6px",background:"#1e2d3d",color:"#94a3b8",borderRadius:4,fontFamily:"'DM Mono',monospace",fontSize:10.5}}>{p.target_type}</span></td>
              <td style={{...S.td,maxWidth:260,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                <div style={{fontWeight:500}}>{p.customer_vendor||"—"}</div>
                <div style={{fontSize:11,color:"#64748b",marginTop:1}}>{p.reference||""}</div>
              </td>
              <td style={{...S.td,textAlign:"right",fontFamily:"'DM Mono',monospace",fontSize:12.5}}>{p.amount!=null?fmt(p.amount):"—"}</td>
              <td style={{...S.td,fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{p.external_id||"—"}</td>
              <td style={S.td}>
                <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,color:sc,border:`1px solid ${sc}40`,background:sc+"15",fontFamily:"'DM Mono',monospace"}}>{p.status}</span>
                {p.qb_id&&<div style={{fontSize:10,color:"#4fd9a0",fontFamily:"'DM Mono',monospace",marginTop:2}}>QB #{p.qb_id}</div>}
              </td>
              <td style={{...S.td,fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{new Date(p.created_at+"Z").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</td>
              <td style={S.td} onClick={e=>e.stopPropagation()}>
                {p.status==="pending"&&isAdmin&&<div style={{display:"flex",gap:4}}>
                  <button className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>doAction(p.id,"post")} title="Post to QuickBooks">⇨ Post</button>
                  <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>doAction(p.id,"dismiss")}>Skip</button>
                </div>}
                {p.status==="error"&&isAdmin&&<button className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>doAction(p.id,"post")}>Retry</button>}
                {p.status==="dismissed"&&isAdmin&&<button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>doAction(p.id,"reopen")}>Reopen</button>}
              </td>
            </tr>);
          })}</tbody>
        </table>}
      </div>
      {queueSelected&&<div className="modal-overlay" onClick={()=>setQueueSelected(null)}>
        <div className="modal-box" style={{width:640}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div>
              <div style={{fontSize:11,color:"#4f8ef7",fontFamily:"'DM Mono',monospace",marginBottom:4}}>{queueSelected.source} → {queueSelected.target_type}</div>
              <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{queueSelected.customer_vendor||queueSelected.reference||"Pending Post"}</div>
              <div style={{fontSize:11,color:"#64748b",marginTop:3,fontFamily:"'DM Mono',monospace"}}>ID {queueSelected.id} · ext {queueSelected.external_id||"—"} · {queueSelected.amount!=null?fmt(queueSelected.amount):""}</div>
            </div>
            <button onClick={()=>setQueueSelected(null)} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>×</button>
          </div>
          {queueSelected.status==="error"&&queueSelected.error_message&&
            <div style={{background:"#f8717118",border:"1px solid #f8717140",color:"#f87171",padding:"10px 12px",borderRadius:8,fontSize:12,marginBottom:12,fontFamily:"'DM Mono',monospace",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{queueSelected.error_message}</div>}
          {queueSelected.qb_id&&
            <div style={{background:"#4fd9a018",border:"1px solid #4fd9a040",color:"#4fd9a0",padding:"8px 12px",borderRadius:8,fontSize:12,marginBottom:12,fontFamily:"'DM Mono',monospace"}}>Posted to QB as #{queueSelected.qb_id}</div>}
          <div className="form-label">QuickBooks Payload</div>
          <pre style={{background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:8,padding:12,fontSize:11,color:"#cbd5e1",maxHeight:240,overflow:"auto",fontFamily:"'DM Mono',monospace",margin:0}}>{queueSelected.payload_obj?JSON.stringify(queueSelected.payload_obj,null,2):queueSelected.payload}</pre>
          <div className="form-label" style={{marginTop:12}}>Notes</div>
          <div style={{background:"#0d1117",border:"1px solid #1e2d3d",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#cbd5e1",whiteSpace:"pre-wrap",minHeight:30}}>{queueSelected.notes||<span style={{color:"#475569"}}>—</span>}</div>
          {isAdmin&&<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14,flexWrap:"wrap"}}>
            {queueSelected.status!=="posted"&&<button className="btn btn-ghost" onClick={()=>{const qid=prompt("Enter existing QuickBooks document ID to link:");if(qid)doAction(queueSelected.id,"link",{qb_id:qid});}}>🔗 Link existing</button>}
            {queueSelected.status==="pending"&&<button className="btn btn-ghost" onClick={()=>doAction(queueSelected.id,"dismiss")}>Dismiss</button>}
            {queueSelected.status==="dismissed"&&<button className="btn btn-ghost" onClick={()=>doAction(queueSelected.id,"reopen")}>Reopen</button>}
            <button className="btn btn-danger" onClick={()=>doAction(queueSelected.id,"delete")}>Delete</button>
            {(queueSelected.status==="pending"||queueSelected.status==="error")&&<button className="btn btn-primary" onClick={()=>doAction(queueSelected.id,"post")}>⇨ Post to QuickBooks</button>}
          </div>}
        </div>
      </div>}
    </div>);
  }

  const navItems=[
    {id:"dashboard",label:"Dashboard",icon:"⬡"},
    {id:"checklist",label:"Close Checklist",icon:"☑"},
    {id:"calendar",label:"Calendar",icon:"▦"},
    {id:"recons",label:"Reconciliations",icon:"⇌"},
    {id:"tb",label:"Trial Balance",icon:"Σ"},
    {id:"queue",label:"Review Queue",icon:"⇥"},
    {id:"activity",label:"Activity Log",icon:"◷"},
    ...(isAdmin?[{id:"settings",label:"Settings",icon:"⚙"}]:[]),
  ];

  useEffect(()=>{
    if(tab==="activity"&&period)loadActivity();
    if(tab==="settings"&&isAdmin){loadTemplates();loadQbStatus();}
    if(tab==="tb"&&period){
      if(tbMode==="snapshots"){loadTbSnapshots();setTbDetail(null);}
      if(tbMode==="flux"){loadAllSnapshots();}
    }
    if(tab==="queue")loadQueue();
  },[tab,period?.id,tbMode,queueStatusFilter,queueSourceFilter]);

  return(<div style={S.app}>
    <div style={S.sidebar}>
      <div style={{padding:"0 20px 20px",borderBottom:"1px solid #1e2d3d",marginBottom:8}}>
        <div style={{fontSize:17,fontWeight:800,color:"#fff",letterSpacing:-0.5}}>CloseTool<span style={{fontSize:10,background:"#4f8ef722",color:"#4f8ef7",border:"1px solid #4f8ef740",padding:"1px 6px",borderRadius:4,fontFamily:"'DM Mono',monospace",marginLeft:6}}>QB</span></div>
        <div style={{fontSize:11,color:"#475569",marginTop:4}}>{period?.label||"Loading…"}</div>
      </div>
      <div style={{margin:"0 12px 8px",padding:"8px 12px",background:"#1a2535",border:"1px solid #1e2d3d",borderRadius:8}}>
        <div style={{fontSize:10,color:"#475569",marginBottom:2,fontFamily:"'DM Mono',monospace"}}>CLOSE PERIOD</div>
        <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>{period?.label}</div>
        <div style={{marginTop:6,height:3,background:"#1e2d3d",borderRadius:2}}><div style={{height:"100%",width:(dash?.close_pct||0)+"%",background:"#4f8ef7",borderRadius:2}}/></div>
        <div style={{fontSize:10,color:"#4f8ef7",marginTop:3}}>{dash?.close_pct||0}% complete</div>
      </div>
      {navItems.map(n=><button key={n.id} style={S.navBtn(tab===n.id)} onClick={()=>setTab(n.id)}><span style={{fontSize:15}}>{n.icon}</span>{n.label}</button>)}
      <div style={{marginTop:"auto",padding:"16px 20px",borderTop:"1px solid #1e2d3d"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <Avatar user={currentUser} size={28}/>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"#94a3b8"}}>{currentUser.name}</div>
            <span className={`tag ${currentUser.role==="admin"?"tag-admin":"tag-user"}`}>{currentUser.role}</span>
          </div>
        </div>
        <button onClick={handleLogout} style={{width:"100%",padding:"7px",background:"#1a2535",border:"1px solid #1e2d3d",borderRadius:8,color:"#64748b",fontSize:12,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>Sign Out</button>
      </div>
    </div>

    <div style={S.main}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:"#f1f5f9",letterSpacing:-0.5}}>{navItems.find(n=>n.id===tab)?.label}</div>
          <div style={{fontSize:13,color:"#64748b",marginTop:3}}>
            {tab==="dashboard"&&`${period?.label} · ${dash?.tasks_complete||0}/${dash?.tasks_total||0} tasks complete`}{"  "}
            {tab==="dashboard"&&period&&<a href={`/api/periods/${period.id}/report.pdf`} style={{marginLeft:10,color:"#4f8ef7",fontSize:12,fontFamily:"'DM Mono',monospace",textDecoration:"none"}}>⇣ Export Close Report (PDF)</a>}
            {tab==="checklist"&&`${filteredTasks.length} tasks · Click any row to open detail`}
            {tab==="calendar"&&`${tasks.filter(t=>t.due_date).length} tasks with due dates`}
            {tab==="recons"&&`${dash?.recon_done||0}/${dash?.recon_total||0} accounts reconciled`}
            {tab==="tb"&&(tbMode==="flux"?"Compare two snapshots and flag material variance":`${tbSnapshots.length} snapshot${tbSnapshots.length===1?"":"s"} for ${period?.label||""}`)}
            {tab==="queue"&&`${queue.length} items · filter: ${queueStatusFilter||"all"}${queueSourceFilter?" / "+queueSourceFilter:""}`}
            {tab==="activity"&&`${activityLog.length} events · period ${period?.label||""}`}
            {tab==="settings"&&"Admin only — manage team, categories, templates, and tasks"}
          </div>
        </div>
      </div>
      {tab==="dashboard"&&<Dashboard/>}
      {tab==="checklist"&&<Checklist/>}
      {tab==="calendar"&&<CalendarView/>}
      {tab==="recons"&&<Reconciliations/>}
      {tab==="tb"&&<TrialBalance/>}
      {tab==="queue"&&<ReviewQueue/>}
      {tab==="activity"&&<ActivityLog/>}
      {tab==="settings"&&isAdmin&&<Settings/>}
    </div>
    {selectedTask&&<TaskModal/>}
    {attachRecon&&<AttachmentsModal recon={attachRecon} onClose={()=>setAttachRecon(null)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<CloseApp/>);
</script>
</body>
</html>
